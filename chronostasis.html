                                en.hp -= DRONE_MISSILE_DAMAGE;
                                droneMissiles.splice(i, 1);
                                if (en.hp <= 0) {
                                    cash += en.isDarkRed ? 5 : (en.specialType ? 3 : en.maxHp);
                                    score += 100 * en.maxHp;
                                    killCount++;
                                    enemies.splice(e, 1);
                                    playEnemyKill();
                                    if (!bossActive && score >= nextDarkRedScore) { nextDarkRedScore += 1500;
                                        spawnDarkRed(); }
                                    if (!bossActive && killCount >= 20) {
                                        if (bossType === 'black') spawnBlackBoss();
                                        else if (bossType === 'white') spawnWhiteBoss();
                                        else spawnGoldenBoss();
                                    }
                                } else { playEnemyHit(); }
                                dmHit = true;
                                break;
                            }
                        }
                        if (!dmHit && bossActive && boss) {
                            const dProx = boss.radius + dm.radius + (boss.type === 'white' ? DODGE_MARGIN : 0);
                            if (dist(dm, boss) < dProx) {
                                if (boss.type === 'white' && !boss.isDashing) {
                                    if (Math.random() < 0.93) { triggerWhiteBossDodge(dm.vx, dm.vy);
                                        droneMissiles.splice(i, 1); continue; }
                                }
                                if (boss.type === 'golden' && boss.shieldActive) {
                                    // Shield absorbs drone missiles too
                                    droneMissiles.splice(i, 1);
                                    continue;
                                }
                                if (boss.type === 'black' || boss.type === 'golden' || (boss.type === 'white' && !
                                        boss.isDashing)) {
                                    boss.hp -= DRONE_MISSILE_DAMAGE;
                                    droneMissiles.splice(i, 1);
                                    if (boss.hp <= 0) { startBossDeathAnimation(); } else { playEnemyHit(); }
                                }
                            }
                        }
                    }

                    if (!bossActive && !freezeEnemies && !abilityShop && postDeathDelay <= 0) {
                        for (const enemy of enemies) {
                            enemy.pathFrameCounter = (enemy.pathFrameCounter || 0) + 1;
                            if (enemy.pathFrameCounter % 30 === 0 || enemy.path.length === 0) {
                                const p = findPath(enemy.x, enemy.y, player.x, player.y);
                                if (p) { enemy.path = p;
                                    enemy.pathIndex = 0; }
                            }
                            let targetX = player.x,
                                targetY = player.y;
                            if (enemy.path.length > 0) {
                                const wp = enemy.path[enemy.pathIndex];
                                if (wp) {
                                    targetX = wp.x;
                                    targetY = wp.y;
                                    if (dist(enemy, wp) < enemy.radius * 2) { enemy.pathIndex++; if (enemy.pathIndex >=
                                            enemy.path.length) enemy.path = []; }
                                }
                            }
                            const ang = Math.atan2(targetY - enemy.y, targetX - enemy.x);
                            enemy.x += Math.cos(ang) * enemy.speed * gameDelta;
                            enemy.y += Math.sin(ang) * enemy.speed * gameDelta;
                            for (const w of walls) {
                                if (circleRectCollision(enemy.x, enemy.y, enemy.radius, w.x, w.y, w.w, w.h)) {
                                    const cx = clamp(enemy.x, w.x, w.x + w.w),
                                        cy = clamp(enemy.y, w.y, w.y + w.h);
                                    const dx = enemy.x - cx,
                                        dy = enemy.y - cy,
                                        d = Math.sqrt(dx * dx + dy * dy) || 1;
                                    enemy.x += (dx / d) * (enemy.radius - d);
                                    enemy.y += (dy / d) * (enemy.radius - d);
                                }
                            }
                            enemy.x = clamp(enemy.x, enemy.radius, WORLD_WIDTH - enemy.radius);
                            enemy.y = clamp(enemy.y, enemy.radius, WORLD_HEIGHT - enemy.radius);

                            if (enemy.isDarkRed) {
                                enemy.missileTimer = (enemy.missileTimer || 3) - gameDelta;
                                if (enemy.missileTimer <= 0 && dist(enemy, player) < 900) {
                                    const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                                    missiles.push({
                                        x: enemy.x,
                                        y: enemy.y,
                                        vx: Math.cos(angle) * BBLACK_MISSILE_START_SPEED * 0.85,
                                        vy: Math.sin(angle) * BBLACK_MISSILE_START_SPEED * 0.85,
                                        radius: BBLACK_MISSILE_RADIUS * 1.0,
                                        life: 5.0,
                                        age: 0,
                                        accelerating: true,
                                        startSpeed: BBLACK_MISSILE_START_SPEED * 0.85,
                                        endSpeed: BBLACK_MISSILE_END_SPEED * 0.75,
                                        accelTime: BBLACK_MISSILE_ACCEL_TIME * 0.7,
                                        turnRate: BBLACK_MISSILE_TURN_RATE * 0.8
                                    });
                                    enemy.missileTimer = 2.5 + Math.random() * 1.5;
                                }
                            }

                            if (enemy.specialType === 'green') {
                                enemy.shootTimer -= gameDelta;
                                if (enemy.shootTimer <= 0 && dist(enemy, player) < 700) {
                                    if (hasLineOfSight(enemy.x, enemy.y, player.x, player.y)) {
                                        const base = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                                        const startAngle = base - GREEN_SHOTGUN_SPREAD / 2;
                                        for (let i = 0; i < GREEN_SHOTGUN_COUNT; i++) {
                                            const a = startAngle + (i / (GREEN_SHOTGUN_COUNT - 1)) *
                                                GREEN_SHOTGUN_SPREAD;
                                            bullets.push({
                                                x: enemy.x,
                                                y: enemy.y,
                                                vx: Math.cos(a) * ENEMY_BULLET_SPEED * 0.8,
                                                vy: Math.sin(a) * ENEMY_BULLET_SPEED * 0.8,
                                                radius: BULLET_RADIUS,
                                                owner: 'enemy'
                                            });
                                        }
                                    }
                                    enemy.shootTimer = enemy.shootCooldown;
                                }
                            } else if (enemy.specialType === 'blue') {
                                enemy.shootTimer -= gameDelta;
                                if (!enemy.burstActive) {
                                    if (enemy.shootTimer <= 0 && dist(enemy, player) < 700) {
                                        if (hasLineOfSight(enemy.x, enemy.y, player.x, player.y)) {
                                            enemy.burstActive = true;
                                            enemy.burstCount = BLUE_RAPID_COUNT;
                                            enemy.burstTimer = 0;
                                        }
                                    }
                                } else {
                                    enemy.burstTimer -= gameDelta;
                                    while (enemy.burstTimer <= 0 && enemy.burstCount > 0) {
                                        if (hasLineOfSight(enemy.x, enemy.y, player.x, player.y)) {
                                            const base = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                                            const spread = (Math.random() - 0.5) * 2 * BLUE_RAPID_SPREAD;
                                            bullets.push({
                                                x: enemy.x,
                                                y: enemy.y,
                                                vx: Math.cos(base + spread) * ENEMY_BULLET_SPEED,
                                                vy: Math.sin(base + spread) * ENEMY_BULLET_SPEED,
                                                radius: BULLET_RADIUS,
                                                owner: 'enemy'
                                            });
                                        }
                                        enemy.burstCount--;
                                        enemy.burstTimer += BLUE_RAPID_DELAY;
                                    }
                                    if (enemy.burstCount <= 0) { enemy.burstActive = false;
                                        enemy.shootTimer = enemy.shootCooldown; }
                                }
                            } else {
                                enemy.shootTimer -= gameDelta;
                                if (enemy.shootTimer <= 0 && dist(enemy, player) < 700) {
                                    if (hasLineOfSight(enemy.x, enemy.y, player.x, player.y)) {
                                        const base = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                                        const spread = (Math.random() - 0.5) * 2 * ENEMY_SPREAD;
                                        bullets.push({
                                            x: enemy.x,
                                            y: enemy.y,
                                            vx: Math.cos(base + spread) * ENEMY_BULLET_SPEED,
                                            vy: Math.sin(base + spread) * ENEMY_BULLET_SPEED,
                                            radius: BULLET_RADIUS,
                                            owner: 'enemy'
                                        });
                                        enemy.shootTimer = enemy.shootCooldown;
                                    }
                                }
                            }
                        }
                    }

                    // Player bullets vs boss
                    if (bossActive && boss) {
                        const proximityThreshold = boss.radius + BULLET_RADIUS + (boss.type === 'white' ? DODGE_MARGIN : 0);
                        const shieldProximity = (boss.type === 'golden' && boss.shieldActive)
                            ? boss.radius * GOLDEN_SHIELD_RADIUS_MULT + BULLET_RADIUS
                            : proximityThreshold;
                        for (let b = bullets.length - 1; b >= 0; b--) {
                            const bullet = bullets[b];
                            if (bullet.owner !== 'player') continue;
                            // Shield captures bullets at full shield radius
                            if (boss.type === 'golden' && boss.shieldActive && dist(bullet, boss) < shieldProximity) {
                                goldenShieldBullets.push({ x: bullet.x, y: bullet.y });
                                bullets.splice(b, 1);
                                playEnemyHit();
                                continue;
                            }
                            if (dist(bullet, boss) < proximityThreshold) {
                                if (boss.type === 'white' && !boss.isDashing) {
                                    const doDodge = Math.random() < 0.93;
                                    if (doDodge) { triggerWhiteBossDodge(bullet.vx, bullet.vy);
                                        bullets.splice(b, 1); }
                                }
                                if (boss.type === 'black' || boss.type === 'golden' || (boss.type === 'white' && !boss
                                        .isDashing)) {
                                    boss.hp--;
                                    if (boss.hp <= 0) { startBossDeathAnimation(); break; } else { playEnemyHit();
                                        bullets.splice(b, 1); }
                                    break;
                                }
                            }
                        }
                    }

                    const enemiesToRemove = [];
                    const bulletsToRemove = new Set();
                    for (let b = bullets.length - 1; b >= 0; b--) {
                        const bullet = bullets[b];
                        if (bullet.owner !== 'player') continue;
                        for (let e = enemies.length - 1; e >= 0; e--) {
                            const en = enemies[e];
                            if (circleRectCollision(bullet.x, bullet.y, bullet.radius,
                                    en.x - en.radius, en.y - en.radius, en.radius * 2, en.radius * 2)) {
                                en.hp--;
                                if (en.hp <= 0) { enemiesToRemove.push(e); } else { playEnemyHit(); }
                                bulletsToRemove.add(b);
                                break;
                            }
                        }
                    }
                    for (const idx of bulletsToRemove) { if (idx >= 0 && idx < bullets.length) bullets.splice(idx, 1); }
                    for (const eIdx of enemiesToRemove.sort((a, b) => b - a)) {
                        if (eIdx >= 0 && eIdx < enemies.length) {
                            const deadEnemy = enemies[eIdx];
                            if (deadEnemy.isDarkRed) cash += 5;
                            else if (deadEnemy.specialType === 'green' || deadEnemy.specialType === 'blue') cash += 3;
                            else cash += deadEnemy.maxHp;
                            score += 100 * deadEnemy.maxHp;
                            killCount++;
                            enemies.splice(eIdx, 1);
                            playEnemyKill();
                            if (!bossActive && score >= nextDarkRedScore) { nextDarkRedScore += 1500;
                                spawnDarkRed(); }
                            if (!bossActive && killCount >= 20) {
                                if (bossType === 'black') spawnBlackBoss();
                                else if (bossType === 'white') spawnWhiteBoss();
                                else spawnGoldenBoss();
                            }
                        }
                    }

                    for (let b = bullets.length - 1; b >= 0; b--) {
                        const bullet = bullets[b];
                        if (bullet.owner !== 'enemy') continue;
                        if (pointInPlayerArrow(bullet.x, bullet.y)) {
                            if (playerStompFrozen) {
                                // Hit while stunned: cancel stun, apply 7.5s dilation disable
                                playerStompFrozen = false;
                                playerStompFrozenTimer = 0;
                                timeDilationDisabled = true;
                                timeDilationDisabledTimer = 7.5;
                                bullets.splice(b, 1);
                            } else {
                                gameState = 'gameover'; playPlayerDeath(); return;
                            }
                        }
                    }
                    for (let i = missiles.length - 1; i >= 0; i--) {
                        const m = missiles[i];
                        if (pointInPlayerArrow(m.x, m.y)) {
                            if (playerStompFrozen) {
                                playerStompFrozen = false;
                                playerStompFrozenTimer = 0;
                                timeDilationDisabled = true;
                                timeDilationDisabledTimer = 7.5;
                                missiles.splice(i, 1);
                            } else {
                                gameState = 'gameover'; playPlayerDeath(); return;
                            }
                        }
                    }

                    if (bossActive && boss && dist(player, boss) < player.radius * 0.5 + boss.radius) {
                        if (playerStompFrozen) {
                            playerStompFrozen = false;
                            playerStompFrozenTimer = 0;
                            timeDilationDisabled = true;
                            timeDilationDisabledTimer = 7.5;
                        } else {
                            gameState = 'gameover'; playPlayerDeath(); return;
                        }
                    }
                    for (const enemy of enemies) {
                        if (dist(player, enemy) < player.radius * 0.5 + enemy.radius) { gameState = 'gameover';
                            playPlayerDeath(); return; }
                    }

                    if (!bossActive && !freezeEnemies && !abilityShop && postDeathDelay <= 0) {
                        spawnTimer += gameDelta;
                        if (spawnTimer >= SPAWN_INTERVAL) { spawnTimer -= SPAWN_INTERVAL;
                            spawnEnemy(); }
                    }
                }

                const targetCamX = player.x - VIEW_W / 2;
                const targetCamY = player.y - VIEW_H / 2;
                const clampedCamX = clamp(targetCamX, 0, WORLD_WIDTH - VIEW_W);
                const clampedCamY = clamp(targetCamY, 0, WORLD_HEIGHT - VIEW_H);
                const lerp = 1 - Math.exp(-6 * realDeltaSec);
                cameraX += (clampedCamX - cameraX) * lerp;
                cameraY += (clampedCamY - cameraY) * lerp;
                mouseWorldX = mouseCanvasX + cameraX;
                mouseWorldY = mouseCanvasY + cameraY;

                // Wave transition
                if (waveTransition.active) {
                    waveTransition.t = Math.min(1, waveTransition.t + realDeltaSec / waveTransition.duration);
                    const te = waveTransition.t < 0.5 ?
                        2 * waveTransition.t * waveTransition.t :
                        1 - Math.pow(-2 * waveTransition.t + 2, 2) / 2;
                    const fromW = waveTransition.fromWalls || wallsWave1;
                    const toW = waveTransition.toWalls || wallsWave2;
                    for (let i = 0; i < fromW.length; i++) {
                        const a = fromW[i],
                            b = toW[i];
                        if (a && b) {
                            walls[i].x = a.x + (b.x - a.x) * te;
                            walls[i].y = a.y + (b.y - a.y) * te;
                            walls[i].w = a.w + (b.w - a.w) * te;
                            walls[i].h = a.h + (b.h - a.h) * te;
                        }
                    }
                    if (waveTransition.t >= 1) {
                        waveTransition.active = false;
                        for (let i = 0; i < toW.length; i++) {
                            walls[i].x = toW[i].x;
                            walls[i].y = toW[i].y;
                            walls[i].w = toW[i].w;
                            walls[i].h = toW[i].h;
                        }
                    }
                }
            }

            // helper for rounded rectangles
            function fillRoundedRect(x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
                ctx.fill();
            }

            function draw() {
                ctx.clearRect(0, 0, VIEW_W, VIEW_H);
                if (gameState === 'menu') {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    ctx.fillStyle = '#aaaaaa';
                    ctx.font = '18px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('Developed by Muhammad Shayan Faheem', VIEW_W / 2, 40);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 48px "Courier New"';
                    ctx.fillText('CHRONOSTASIS', VIEW_W / 2, 120);
                    ctx.font = '22px "Courier New"';
                    ctx.fillText('Select Difficulty', VIEW_W / 2, 200);
                    const btnW = 200,
                        btnH = 44,
                        startY = 240,
                        gap = 16;
                    const buttons = [
                        { text: 'EASY', diff: 'easy', y: startY },
                        { text: 'MODERATE', diff: 'medium', y: startY + btnH + gap },
                        { text: 'HARD', diff: 'hard', y: startY + (btnH + gap) * 2 }
                    ];
                    for (const btn of buttons) {
                        const x = VIEW_W / 2 - btnW / 2;
                        ctx.fillStyle = '#2a2a4a';
                        ctx.fillRect(x, btn.y, btnW, btnH);
                        ctx.strokeStyle = '#4a4a7a';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, btn.y, btnW, btnH);
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '20px "Courier New"';
                        ctx.fillText(btn.text, VIEW_W / 2, btn.y + btnH / 2 + 7);
                    }
                    ctx.fillStyle = '#aaa';
                    ctx.font = '14px "Courier New"';
                    ctx.fillText('Click difficulty to start', VIEW_W / 2, startY + (btnH + gap) * 3 + 20);
                    const ulBtnW = 160,
                        ulBtnH = 36,
                        ulBtnX = VIEW_W / 2 - ulBtnW / 2,
                        ulBtnY = startY + (btnH + gap) * 3 + 40;
                    ctx.fillStyle = '#1a2a1a';
                    ctx.fillRect(ulBtnX, ulBtnY, ulBtnW, ulBtnH);
                    ctx.strokeStyle = '#4a8a4a';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(ulBtnX, ulBtnY, ulBtnW, ulBtnH);
                    ctx.fillStyle = '#90ee90';
                    ctx.font = '14px "Courier New"';
                    ctx.fillText('📋 UPDATE LOG', VIEW_W / 2, ulBtnY + ulBtnH / 2 + 5);
                    const controlsX = VIEW_W - 260,
                        controlsY = VIEW_H - 140;
                    ctx.fillStyle = 'rgba(20,20,40,0.85)';
                    ctx.fillRect(controlsX, controlsY, 250, 120);
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(controlsX, controlsY, 250, 120);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '14px "Courier New"';
                    ctx.textAlign = 'left';
                    let cy = controlsY + 20;
                    ctx.fillText('WASD = Movement', controlsX + 10, cy);
                    cy += 22;
                    ctx.fillText('MB1 = Shoot', controlsX + 10, cy);
                    cy += 22;
                    ctx.fillText('Shift = Slow ability', controlsX + 10, cy);
                    cy += 22;
                    ctx.fillText('Q, E, R = Extra', controlsX + 10, cy);
                    if (!debugMode) {
                        ctx.fillStyle = '#444';
                        ctx.font = '12px "Courier New"';
                        ctx.textAlign = 'left';
                        ctx.fillText('Debug: ' + debugCodeString + '_', 10, 20);
                    }
                    if (showUpdateLog) {
                        const logW = 620,
                            logH = 560;
                        const logX = VIEW_W / 2 - logW / 2,
                            logY = VIEW_H / 2 - logH / 2;
                        ctx.fillStyle = 'rgba(0,0,0,0.92)';
                        ctx.fillRect(logX, logY, logW, logH);
                        ctx.strokeStyle = '#90ee90';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(logX, logY, logW, logH);
                        ctx.textAlign = 'center';
                        ctx.fillStyle = '#90ee90';
                        ctx.font = 'bold 20px "Courier New"';
                        ctx.fillText('📋 UPDATE LOG', VIEW_W / 2, logY + 34);
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(logX + 20, logY + 46);
                        ctx.lineTo(logX + logW - 20, logY + 46);
                        ctx.stroke();
                        const entries = [
                            { tag: 'NEW', color: '#90ee90', text: 'Golden Arbiter: teleports to player, fixed attack cycle Mirror → Gravity (→ Stomp <60% HP)' },
                            { tag: 'NEW', color: '#90ee90', text: 'Wave 3 arena redesigned: open layout with scattered obstacles' },
                            { tag: 'TWEAK', color: '#ffd700', text: 'Stomp activates only when boss HP < 60% (GOLDEN_STOMP_HP_THRESHOLD)' },
                        ];
                        ctx.textAlign = 'left';
                        ctx.font = '12px "Courier New"';
                        let ey = logY + 66;
                        const lineH = 28;
                        for (const e of entries) {
                            if (ey + lineH > logY + logH - 30) break;
                            const tagW = e.tag === 'NEW' ? 42 : 58;
                            ctx.fillStyle = e.color + '33';
                            ctx.fillRect(logX + 18, ey - 13, tagW, 18);
                            ctx.strokeStyle = e.color;
                            ctx.lineWidth = 1;
                            ctx.strokeRect(logX + 18, ey - 13, tagW, 18);
                            ctx.fillStyle = e.color;
                            ctx.font = 'bold 11px "Courier New"';
                            ctx.fillText(e.tag, logX + 21, ey);
                            ctx.fillStyle = '#cccccc';
                            ctx.font = '12px "Courier New"';
                            ctx.fillText(e.text, logX + 22 + tagW, ey);
                            ey += lineH;
                        }
                        const cbW = 100,
                            cbH = 32;
                        const cbX = VIEW_W / 2 - cbW / 2,
                            cbY = logY + logH - 48;
                        ctx.fillStyle = '#2a1a1a';
                        ctx.fillRect(cbX, cbY, cbW, cbH);
                        ctx.strokeStyle = '#ff6666';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(cbX, cbY, cbW, cbH);
                        ctx.fillStyle = '#ff9999';
                        ctx.font = '13px "Courier New"';
                        ctx.textAlign = 'center';
                        ctx.fillText('✕  CLOSE', VIEW_W / 2, cbY + cbH / 2 + 5);
                    }
                }

                if (gameState === 'playing' || gameState === 'gameover') {
                    // Compute lerp factor for color theme
                    let colorT = 0;
                    if (waveTransition.active) {
                        const te = waveTransition.t < 0.5 ? 2 * waveTransition.t * waveTransition.t : 1 - Math.pow(-2 *
                            waveTransition.t + 2, 2) / 2;
                        if (waveTransition.targetWave === 2) colorT = te;
                        else if (waveTransition.targetWave === 3) colorT = 1 + te;
                        else if (waveTransition.targetWave === 1 && currentWave === 3) colorT = 2 - te;
                        else colorT = 0;
                    } else {
                        if (currentWave === 2) colorT = 1;
                        else if (currentWave === 3) colorT = 2;
                        else colorT = 0;
                    }

                    // Grid color
                    let gr, gg, gb;
                    if (colorT < 1) {
                        const t = colorT;
                        gr = Math.round(0x1a + (0x2e - 0x1a) * t);
                        gg = 0x1a;
                        gb = Math.round(0x2e + (0x1a - 0x2e) * t);
                    } else {
                        const t = colorT - 1;
                        gr = Math.round(0x2e + (0x2e - 0x2e) * t);
                        gg = Math.round(0x1a + (0x2e - 0x1a) * t);
                        gb = Math.round(0x1a + (0x1a - 0x1a) * t);
                    }
                    const gridSize = CELL_SIZE;
                    ctx.strokeStyle = `rgb(${gr},${gg},${gb})`;
                    ctx.lineWidth = 1;
                    const startX = Math.floor(cameraX / gridSize) * gridSize;
                    const startY = Math.floor(cameraY / gridSize) * gridSize;
                    for (let wx = startX; wx < cameraX + VIEW_W + gridSize; wx += gridSize) {
                        const sx = wx - cameraX;
                        ctx.beginPath();
                        ctx.moveTo(sx, 0);
                        ctx.lineTo(sx, VIEW_H);
                        ctx.stroke();
                    }
                    for (let wy = startY; wy < cameraY + VIEW_H + gridSize; wy += gridSize) {
                        const sy = wy - cameraY;
                        ctx.beginPath();
                        ctx.moveTo(0, sy);
                        ctx.lineTo(VIEW_W, sy);
                        ctx.stroke();
                    }

                    // Wall colors
                    let wfR, wfG, wfB, wsR, wsG, wsB;
                    if (colorT < 1) {
                        const t = colorT;
                        wfR = Math.round(0x2a + (0x4a - 0x2a) * t);
                        wfG = Math.round(0x2a + (0x1a - 0x2a) * t);
                        wfB = Math.round(0x4a + (0x1a - 0x4a) * t);
                        wsR = Math.round(0x4a + (0x7a - 0x4a) * t);
                        wsG = Math.round(0x4a + (0x3a - 0x4a) * t);
                        wsB = Math.round(0x7a + (0x3a - 0x7a) * t);
                    } else {
                        const t = colorT - 1;
                        wfR = Math.round(0x4a + (0x4a - 0x4a) * t);
                        wfG = Math.round(0x1a + (0x4a - 0x1a) * t);
                        wfB = Math.round(0x1a + (0x1a - 0x1a) * t);
                        wsR = Math.round(0x7a + (0xaa - 0x7a) * t);
                        wsG = Math.round(0x3a + (0xaa - 0x3a) * t);
                        wsB = Math.round(0x3a + (0x22 - 0x3a) * t);
                    }
                    ctx.fillStyle = `rgb(${wfR},${wfG},${wfB})`;
                    ctx.strokeStyle = `rgb(${wsR},${wsG},${wsB})`;
                    ctx.lineWidth = 2;
                    for (const w of walls) {
                        const sx = w.x - cameraX,
                            sy = w.y - cameraY;
                        if (sx + w.w < 0 || sx > VIEW_W || sy + w.h < 0 || sy > VIEW_H) continue;
                        ctx.fillRect(sx, sy, w.w, w.h);
                        ctx.strokeRect(sx, sy, w.w, w.h);
                    }

                    if (beam && beam.active) {
                        const aimAngle = (beam.phase === 'dmg' || beam.phase === 'fade') ? beam.aimAngle : Math.atan2(
                            mouseWorldY - player.y, mouseWorldX - player.x);
                        const x1 = player.x - cameraX;
                        const y1 = player.y - cameraY;
                        const beamRange = 400;
                        const x2 = x1 + Math.cos(aimAngle) * beamRange;
                        const y2 = y1 + Math.sin(aimAngle) * beamRange;
                        if (beam.phase === 'charge') {
                            const hue = (performance.now() / 10) % 360;
                            ctx.beginPath();
                            ctx.moveTo(x1, y1);
                            ctx.lineTo(x2, y2);
                            ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                            ctx.lineWidth = 3;
                            ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                            ctx.shadowBlur = 10;
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                            ctx.beginPath();
                            ctx.arc(x2, y2, 1.5, 0, Math.PI * 2);
                            ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                            ctx.fill();
                        } else if (beam.phase === 'dmg') {
                            for (let i = -2; i <= 2; i++) {
                                const hue = (performance.now() / 10 + i * 20) % 360;
                                ctx.beginPath();
                                ctx.moveTo(x1, y1);
                                ctx.lineTo(x2, y2);
                                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                                ctx.lineWidth = 12 + i * 4;
                                ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                                ctx.shadowBlur = 15;
                                ctx.stroke();
                            }
                            ctx.shadowBlur = 0;
                            const tipHue = (performance.now() / 10 + 40) % 360;
                            ctx.beginPath();
                            ctx.arc(x2, y2, 10, 0, Math.PI * 2);
                            ctx.fillStyle = `hsl(${tipHue}, 100%, 70%)`;
                            ctx.fill();
                        } else if (beam.phase === 'fade') {
                            const fadeProgress = (beam.timer - 6.0) / 2.0;
                            const alpha = 1 - fadeProgress;
                            ctx.globalAlpha = alpha;
                            for (let i = -2; i <= 2; i++) {
                                const hue = (performance.now() / 10 + i * 20) % 360;
                                ctx.beginPath();
                                ctx.moveTo(x1, y1);
                                ctx.lineTo(x2, y2);
                                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                                ctx.lineWidth = 12 + i * 4;
                                ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                                ctx.shadowBlur = 15;
                                ctx.stroke();
                            }
                            ctx.shadowBlur = 0;
                            ctx.globalAlpha = 1;
                            const tipHueFade = (performance.now() / 10 + 40) % 360;
                            ctx.beginPath();
                            ctx.arc(x2, y2, 10, 0, Math.PI * 2);
                            ctx.fillStyle = `hsl(${tipHueFade}, 100%, 70%)`;
                            ctx.fill();
                        }
                    }

                    for (const b of bullets) {
                        const sx = b.x - cameraX,
                            sy = b.y - cameraY;
                        if (sx < -20 || sx > VIEW_W + 20 || sy < -20 || sy > VIEW_H + 20) continue;
                        ctx.beginPath();
                        ctx.arc(sx, sy, b.radius, 0, Math.PI * 2);
                        if (b.isGolden) ctx.fillStyle = '#ffd700';
                        else ctx.fillStyle = b.owner === 'player' ? '#ffdd44' : '#ff3366';
                        ctx.fill();
                        if (b.isGolden) {
                            ctx.strokeStyle = '#fff8dc';
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                    for (const m of missiles) {
                        const sx = m.x - cameraX,
                            sy = m.y - cameraY;
                        if (sx < -20 || sx > VIEW_W + 20 || sy < -20 || sy > VIEW_H + 20) continue;
                        ctx.beginPath();
                        ctx.arc(sx, sy, m.radius, 0, Math.PI * 2);
                        ctx.fillStyle = '#ff6600';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(sx - m.vx * 0.02, sy - m.vy * 0.02, m.radius * 0.6, 0, Math.PI * 2);
                        ctx.fillStyle = '#ff9933';
                        ctx.fill();
                    }
                    for (const dm of droneMissiles) {
                        const sx = dm.x - cameraX,
                            sy = dm.y - cameraY;
                        if (sx < -20 || sx > VIEW_W + 20 || sy < -20 || sy > VIEW_H + 20) continue;
                        ctx.beginPath();
                        ctx.arc(sx, sy, dm.radius, 0, Math.PI * 2);
                        ctx.fillStyle = '#00ffaa';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(sx - dm.vx * 0.025, sy - dm.vy * 0.025, dm.radius * 0.55, 0, Math.PI * 2);
                        ctx.fillStyle = '#00cc88';
                        ctx.fill();
                    }
                    if (missileDrone.active) {
                        const droneScreenX = player.x - cameraX + Math.cos(missileDrone.angle) * DRONE_ORBIT_RADIUS;
                        const droneScreenY = player.y - cameraY + Math.sin(missileDrone.angle) * DRONE_ORBIT_RADIUS;
                        ctx.beginPath();
                        ctx.arc(player.x - cameraX, player.y - cameraY, DRONE_ORBIT_RADIUS, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(0,255,170,0.12)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.save();
                        ctx.translate(droneScreenX, droneScreenY);
                        ctx.rotate(missileDrone.angle + Math.PI / 4);
                        ctx.fillStyle = '#00ffaa';
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.rect(-6, -6, 12, 12);
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                        ctx.font = 'bold 10px "Courier New"';
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'center';
                        ctx.fillText(missileDrone.missilesLeft, droneScreenX, droneScreenY - 12);
                    }
                    // Golden boss trail
                    if (bossActive && boss && boss.type === 'golden') {
                        for (let t = goldenBossTrail.length - 1; t >= 0; t--) {
                            const tr = goldenBossTrail[t];
                            const alpha = Math.max(0, 0.35 - tr.age / 1.2);
                            if (alpha <= 0) continue;
                            const sx = tr.x - cameraX;
                            const sy = tr.y - cameraY;
                            ctx.beginPath();
                            ctx.arc(sx, sy, GOLDEN_SIZE * 0.85, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255,215,0,${alpha})`;
                            ctx.fill();
                        }
                    }
                    // Chronal Mirror stored bullets
                    if (bossActive && boss && boss.type === 'golden' && boss.mirrorActive) {
                        for (const sb of goldenMirrorStoredBullets) {
                            const sx = sb.x - cameraX;
                            const sy = sb.y - cameraY;
                            ctx.beginPath();
                            ctx.arc(sx, sy, BULLET_RADIUS + 2, 0, Math.PI * 2);
                            ctx.fillStyle = '#ffd700';
                            ctx.fill();
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 1;
                            ctx.stroke();
                            const orbitAngle = performance.now() / 600 + goldenMirrorStoredBullets.indexOf(sb);
                            const orbitDist = boss.radius + 15;
                            ctx.beginPath();
                            ctx.arc(boss.x - cameraX + Math.cos(orbitAngle) * orbitDist,
                                boss.y - cameraY + Math.sin(orbitAngle) * orbitDist,
                                2, 0, Math.PI * 2);
                            ctx.fillStyle = '#ffe066';
                            ctx.fill();
                        }
                    }
                    for (const en of enemies) {
                        const sx = en.x - cameraX,
                            sy = en.y - cameraY;
                        if (sx < -40 || sx > VIEW_W + 40 || sy < -40 || sy > VIEW_H + 40) continue;
                        let bodyColor;
                        if (en.isDarkRed) bodyColor = '#5a1a1a';
                        else if (en.specialType === 'green') bodyColor = '#00cc44';
                        else if (en.specialType === 'blue') bodyColor = '#3366ff';
                        else {
                            switch (Math.max(0, en.hp)) {
                                case 3:
                                    bodyColor = '#ff3333';
                                    break;
                                case 2:
                                    bodyColor = '#ff9933';
                                    break;
                                case 1:
                                    bodyColor = '#ffdd44';
                                    break;
                                default:
                                    bodyColor = '#fff';
                            }
                        }
                        ctx.beginPath();
                        ctx.arc(sx, sy, en.radius, 0, Math.PI * 2);
                        ctx.fillStyle = bodyColor;
                        ctx.fill();
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.font = 'bold 12px "Courier New"';
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'center';
                        ctx.fillText('●'.repeat(Math.max(0, en.hp)), sx, sy - en.radius - 6);
                    }
                    if (bossActive && boss) {
                        let sx = boss.x - cameraX;
                        let sy = boss.y - cameraY;
                        if (deathAnimation && deathAnimation.active && deathAnimation.phase === 'shake') {
                            sx += deathAnimation.shakeOffsetX;
                            sy += deathAnimation.shakeOffsetY;
                        }
                        if (boss.type === 'white') {
                            ctx.save();
                            ctx.shadowColor = 'rgba(255,255,255,0.9)';
                            ctx.shadowBlur = 18;
                            ctx.beginPath();
                            ctx.arc(sx, sy, boss.radius, 0, 2 * Math.PI);
                            ctx.fillStyle = '#ffffff';
                            ctx.fill();
                            ctx.restore();
                            ctx.strokeStyle = '#cccccc';
                            ctx.lineWidth = 3;
                            ctx.stroke();
                            ctx.font = 'bold 12px "Courier New"';
                            ctx.fillStyle = '#000';
                            ctx.textAlign = 'center';
                            ctx.fillText('WHITE BOSS', sx, sy - 14);
                        } else if (boss.type === 'golden') {
                            const pulse = 0.8 + 0.2 * Math.sin(performance.now() / 300);
                            ctx.save();
                            ctx.shadowColor = 'rgba(255,215,0,0.8)';
                            ctx.shadowBlur = 30 * pulse;
                            const sides = 12;
                            const r = boss.radius;
                            ctx.beginPath();
                            for (let i = 0; i < sides; i++) {
                                const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
                                const vx = sx + Math.cos(a) * r;
                                const vy = sy + Math.sin(a) * r;
                                if (i === 0) ctx.moveTo(vx, vy);
                                else ctx.lineTo(vx, vy);
                            }
                            ctx.closePath();
                            ctx.fillStyle = '#ffd700';
                            ctx.fill();
                            ctx.strokeStyle = '#fff8dc';
                            ctx.lineWidth = 3;
                            ctx.stroke();
                            ctx.restore();
                            const ringAngle1 = performance.now() / 800;
                            const ringAngle2 = -performance.now() / 600;
                            ctx.save();
                            ctx.translate(sx, sy);
                            ctx.rotate(ringAngle1);
                            ctx.beginPath();
                            ctx.ellipse(0, 0, r * 1.35, r * 0.45, 0, 0, Math.PI * 2);
                            ctx.strokeStyle = 'rgba(255,215,0,0.7)';
                            ctx.lineWidth = 3;
                            ctx.stroke();
                            ctx.rotate(ringAngle2 - ringAngle1);
                            ctx.beginPath();
                            ctx.ellipse(0, 0, r * 1.35, r * 0.45, 0, 0, Math.PI * 2);
                            ctx.strokeStyle = 'rgba(255,255,200,0.6)';
                            ctx.lineWidth = 2.5;
                            ctx.stroke();
                            ctx.restore();
                            if (boss.mirrorActive) {
                                const mirrorPulse = 0.7 + 0.3 * Math.sin(performance.now() / 200);
                                ctx.beginPath();
                                ctx.arc(sx, sy, r * 1.5, 0, Math.PI * 2);
                                ctx.strokeStyle = `rgba(255,215,0,${0.7 * mirrorPulse})`;
                                ctx.lineWidth = 4;
                                ctx.setLineDash([10, 5]);
                                ctx.stroke();
                                ctx.setLineDash([]);
                                ctx.fillStyle = `rgba(255,215,0,${0.08 * mirrorPulse})`;
                                ctx.fill();
                            }
                            // (stomp visuals handled inline above)
                            ctx.font = 'bold 13px "Courier New"';
                            ctx.fillStyle = '#fff8dc';
                            ctx.textAlign = 'center';
                            ctx.fillText('GOLDEN ARBITER', sx, sy - boss.radius - 18);
                            // Phase label
                            ctx.font = '10px "Courier New"';
                            ctx.fillStyle = 'rgba(255,215,0,0.7)';
                            ctx.fillText('[' + goldenPhase.toUpperCase().replace('_',' ') + ']', sx, sy - boss.radius - 5);

                            // ═══ TP WARN CIRCLE ═══
                            if (goldenPhase === 'tp_warn') {
                                const wx = boss.tpWarnX - cameraX, wy = boss.tpWarnY - cameraY;
                                const warnPulse = 0.5 + 0.5 * Math.sin(performance.now() / 70);
                                ctx.save();
                                // Outer danger ring
                                ctx.beginPath();
                                ctx.arc(wx, wy, GOLDEN_TP_WARN_RADIUS, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(255,0,0,${0.2 * warnPulse})`;
                                ctx.fill();
                                ctx.strokeStyle = `rgba(255,50,50,0.95)`;
                                ctx.lineWidth = 4;
                                ctx.stroke();
                                // Inner ring
                                ctx.beginPath();
                                ctx.arc(wx, wy, GOLDEN_TP_WARN_RADIUS * 0.55, 0, Math.PI * 2);
                                ctx.strokeStyle = `rgba(255,100,100,0.7)`;
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                // X
                                const xs = GOLDEN_TP_WARN_RADIUS * 0.45;
                                ctx.strokeStyle = `rgba(255,50,50,${0.9 * warnPulse})`;
                                ctx.lineWidth = 3;
                                ctx.beginPath(); ctx.moveTo(wx-xs,wy-xs); ctx.lineTo(wx+xs,wy+xs); ctx.stroke();
                                ctx.beginPath(); ctx.moveTo(wx+xs,wy-xs); ctx.lineTo(wx-xs,wy+xs); ctx.stroke();
                                // "MOVE!" label
                                ctx.fillStyle = `rgba(255,80,80,${0.9 * warnPulse})`;
                                ctx.font = 'bold 14px "Courier New"';
                                ctx.fillText('MOVE!', wx, wy - GOLDEN_TP_WARN_RADIUS - 6);
                                ctx.restore();
                            }

                            // ═══ PILLAR SWEEP BEAMS ═══
                            for (const p of goldenPillars) {
                                if (p.phase === 'warn') {
                                    const pulse = 0.4 + 0.6 * Math.sin(performance.now() / 90);
                                    // Show the full horizontal warning stripe
                                    const sy2 = p.y - cameraY;
                                    ctx.save();
                                    ctx.fillStyle = `rgba(255,30,30,${0.18 * pulse})`;
                                    ctx.fillRect(0, sy2 - p.halfH, VIEW_W, p.halfH * 2);
                                    ctx.strokeStyle = `rgba(255,60,60,${0.9 * pulse})`;
                                    ctx.lineWidth = 2.5;
                                    ctx.setLineDash([12, 6]);
                                    ctx.beginPath(); ctx.moveTo(0, sy2 - p.halfH); ctx.lineTo(VIEW_W, sy2 - p.halfH); ctx.stroke();
                                    ctx.beginPath(); ctx.moveTo(0, sy2 + p.halfH); ctx.lineTo(VIEW_W, sy2 + p.halfH); ctx.stroke();
                                    ctx.setLineDash([]);
                                    // Arrow showing direction
                                    const arrowX = p.fromLeft ? 40 : VIEW_W - 40;
                                    const arrowDir = p.fromLeft ? 1 : -1;
                                    ctx.strokeStyle = `rgba(255,80,80,${0.95 * pulse})`;
                                    ctx.lineWidth = 3;
                                    ctx.beginPath(); ctx.moveTo(arrowX, sy2); ctx.lineTo(arrowX + arrowDir*30, sy2); ctx.stroke();
                                    ctx.beginPath(); ctx.moveTo(arrowX + arrowDir*30, sy2 - 8); ctx.lineTo(arrowX + arrowDir*30, sy2 + 8); ctx.stroke();
                                    ctx.restore();
                                } else if (p.phase === 'active' && !p.done) {
                                    // Sweeping golden beam
                                    const sy2 = p.y - cameraY;
                                    const bx = p.x - cameraX;
                                    ctx.save();
                                    ctx.shadowColor = '#ffd700';
                                    ctx.shadowBlur = 20;
                                    // Beam body fills from its entry edge to current x
                                    if (p.fromLeft) {
                                        ctx.fillStyle = 'rgba(255,215,0,0.85)';
                                        ctx.fillRect(-20, sy2 - p.halfH, bx + 20, p.halfH * 2);
                                        // Leading edge glow
                                        const grad = ctx.createLinearGradient(bx - 30, 0, bx + 10, 0);
                                        grad.addColorStop(0, 'rgba(255,255,200,0)');
                                        grad.addColorStop(1, 'rgba(255,255,255,0.95)');
                                        ctx.fillStyle = grad;
                                        ctx.fillRect(bx - 30, sy2 - p.halfH - 4, 50, p.halfH * 2 + 8);
                                    } else {
                                        ctx.fillStyle = 'rgba(255,215,0,0.85)';
                                        ctx.fillRect(bx, sy2 - p.halfH, VIEW_W + 20, p.halfH * 2);
                                        // Leading edge glow
                                        const grad = ctx.createLinearGradient(bx - 10, 0, bx + 30, 0);
                                        grad.addColorStop(0, 'rgba(255,255,255,0.95)');
                                        grad.addColorStop(1, 'rgba(255,255,200,0)');
                                        ctx.fillStyle = grad;
                                        ctx.fillRect(bx - 10, sy2 - p.halfH - 4, 50, p.halfH * 2 + 8);
                                    }
                                    ctx.restore();
                                }
                            }

                            // ═══ SHIELD ═══
                            if (boss.shieldActive) {
                                // Draw frozen captured bullets first
                                for (const sb of goldenShieldBullets) {
                                    const sbx = sb.x - cameraX, sby = sb.y - cameraY;
                                    ctx.save();
                                    ctx.shadowColor = '#ffd700';
                                    ctx.shadowBlur = 10;
                                    ctx.beginPath();
                                    ctx.arc(sbx, sby, 5, 0, Math.PI * 2);
                                    ctx.fillStyle = '#ffd700';
                                    ctx.fill();
                                    ctx.restore();
                                }
                                const t = performance.now();
                                const shieldR = boss.radius * GOLDEN_SHIELD_RADIUS_MULT;
                                const sp = 0.7 + 0.3 * Math.sin(t / 120);
                                ctx.save();

                                // Thick outer glow ring
                                ctx.shadowColor = '#ffd700';
                                ctx.shadowBlur = 60;
                                ctx.beginPath();
                                ctx.arc(sx, sy, shieldR, 0, Math.PI * 2);
                                ctx.strokeStyle = `rgba(255,215,0,${sp})`;
                                ctx.lineWidth = 10;
                                ctx.stroke();

                                // Second ring
                                ctx.shadowBlur = 30;
                                ctx.beginPath();
                                ctx.arc(sx, sy, shieldR * 0.85, 0, Math.PI * 2);
                                ctx.strokeStyle = `rgba(255,240,100,${sp * 0.8})`;
                                ctx.lineWidth = 4;
                                ctx.stroke();

                                // Solid fill tint so it's impossible to miss
                                ctx.beginPath();
                                ctx.arc(sx, sy, shieldR, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(255,215,0,${0.12 * sp})`;
                                ctx.fill();

                                // Rotating hexagonal segments
                                ctx.shadowBlur = 0;
                                const rot = t / 400;
                                for (let i = 0; i < 6; i++) {
                                    const a1 = rot + (i / 6) * Math.PI * 2;
                                    const a2 = rot + ((i + 0.5) / 6) * Math.PI * 2;
                                    ctx.beginPath();
                                    ctx.moveTo(sx + Math.cos(a1) * boss.radius * 0.5, sy + Math.sin(a1) * boss.radius * 0.5);
                                    ctx.lineTo(sx + Math.cos(a1) * shieldR, sy + Math.sin(a1) * shieldR);
                                    ctx.lineTo(sx + Math.cos(a2) * shieldR, sy + Math.sin(a2) * shieldR);
                                    ctx.closePath();
                                    ctx.fillStyle = `rgba(255,215,0,${0.18 * sp})`;
                                    ctx.fill();
                                    ctx.strokeStyle = `rgba(255,220,50,${0.65 * sp})`;
                                    ctx.lineWidth = 1.5;
                                    ctx.stroke();
                                }

                                // Pulsing "SHIELD" text
                                ctx.font = `bold ${14 + Math.round(2 * sp)}px "Courier New"`;
                                ctx.fillStyle = `rgba(255,240,100,${sp})`;
                                ctx.textAlign = 'center';
                                ctx.shadowColor = '#ffd700';
                                ctx.shadowBlur = 12;
                                ctx.fillText('⚡ SHIELD ACTIVE ⚡', sx, sy + shieldR + 22);
                                ctx.shadowBlur = 0;
                                ctx.restore();
                            }

                            // ═══ RAM WARNING ═══
                            if (goldenRamLine) {
                                const rx1 = goldenRamLine.x1 - cameraX, ry1 = goldenRamLine.y1 - cameraY;
                                const rx2 = goldenRamLine.x2 - cameraX, ry2 = goldenRamLine.y2 - cameraY;
                                const ramPulse = 0.5 + 0.5 * Math.sin(performance.now() / 70);
                                ctx.save();
                                const perpA = goldenRamLine.angle + Math.PI/2;
                                const hw = GOLDEN_RAM_HALF_WIDTH;
                                // Filled danger zone
                                ctx.beginPath();
                                ctx.moveTo(rx1 + Math.cos(perpA)*hw, ry1 + Math.sin(perpA)*hw);
                                ctx.lineTo(rx2 + Math.cos(perpA)*hw, ry2 + Math.sin(perpA)*hw);
                                ctx.lineTo(rx2 - Math.cos(perpA)*hw, ry2 - Math.sin(perpA)*hw);
                                ctx.lineTo(rx1 - Math.cos(perpA)*hw, ry1 - Math.sin(perpA)*hw);
                                ctx.closePath();
                                ctx.fillStyle = `rgba(255,30,30,${0.28 * ramPulse})`;
                                ctx.fill();
                                ctx.strokeStyle = `rgba(255,50,50,0.95)`;
                                ctx.lineWidth = 3;
                                ctx.setLineDash([14, 6]);
                                ctx.stroke();
                                ctx.setLineDash([]);
                                // Red centre beam
                                ctx.beginPath();
                                ctx.moveTo(rx1, ry1); ctx.lineTo(rx2, ry2);
                                ctx.strokeStyle = `rgba(255,80,80,${0.8 * ramPulse})`;
                                ctx.lineWidth = 2.5;
                                ctx.stroke();
                                // Arrow at boss showing direction
                                const arrowLen = 40;
                                ctx.beginPath();
                                ctx.moveTo(rx1, ry1);
                                ctx.lineTo(rx1 + Math.cos(goldenRamLine.angle)*arrowLen, ry1 + Math.sin(goldenRamLine.angle)*arrowLen);
                                ctx.strokeStyle = `rgba(255,100,100,0.95)`;
                                ctx.lineWidth = 4;
                                ctx.stroke();
                                // Label
                                ctx.fillStyle = `rgba(255,80,80,${ramPulse})`;
                                ctx.font = 'bold 13px "Courier New"';
                                ctx.fillText('INCOMING RAM!', rx1 + Math.cos(goldenRamLine.angle)*60, ry1 + Math.sin(goldenRamLine.angle)*60 - 12);
                                ctx.restore();
                            }
                        } else {
                            ctx.fillStyle = '#0a0a0a';
                            ctx.beginPath();
                            ctx.arc(sx, sy, boss.radius, 0, 2 * Math.PI);
                            ctx.fill();
                            ctx.strokeStyle = '#333333';
                            ctx.lineWidth = 4;
                            ctx.stroke();
                            ctx.fillStyle = '#ffaaaa';
                            ctx.font = 'bold 14px "Courier New"';
                            ctx.textAlign = 'center';
                            ctx.fillText('BLACK BOSS', sx, sy - boss.radius - 10);
                        }
                    }
                    for (const p of particles) {
                        const sx = p.x - cameraX,
                            sy = p.y - cameraY;
                        const alpha = p.life / p.maxLife;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(sx, sy, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;

                    const pScreenX = player.x - cameraX,
                        pScreenY = player.y - cameraY;
                    if (timeBubble.active) {
                        const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 150);
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(pScreenX, pScreenY, timeBubble.radius, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 200, 255, ${0.55 * pulse})`;
                        ctx.lineWidth = 3;
                        ctx.setLineDash([12, 8]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = `rgba(0, 150, 220, ${0.06 * pulse})`;
                        ctx.fill();
                        ctx.restore();
                    }
                    if (playerStompFrozen) {
                        const freezePulse = 0.5 + 0.5 * Math.sin(performance.now() / 150);
                        ctx.save();
                        ctx.globalAlpha = 0.55 * freezePulse;
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.arc(pScreenX, pScreenY, PLAYER_RADIUS + 8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#fff8dc';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.restore();
                    }
                    ctx.save();
                    ctx.translate(pScreenX, pScreenY);
                    const aimAngle2 = playerFacingAngle;
                    ctx.rotate(aimAngle2);
                    ctx.beginPath();
                    ctx.moveTo(player.radius, 0);
                    ctx.lineTo(-player.radius * 0.7, -player.radius * 0.6);
                    ctx.lineTo(-player.radius * 0.4, 0);
                    ctx.lineTo(-player.radius * 0.7, player.radius * 0.6);
                    ctx.closePath();
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#aaaacc';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();

                    if (timeStop.active) {
                        ctx.fillStyle = 'rgba(80, 80, 80, 0.4)';
                        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    }

                    if (timeScale < 1.0 && !timeStop.active) {
                        const alpha = (1 - (timeScale - 0.1) / 0.9) * 0.25;
                        ctx.fillStyle = `rgba(20, 40, 100, ${alpha})`;
                        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    }

                    if (intelMessage) {
                        const msg = intelMessage;
                        ctx.globalAlpha = msg.alpha;
                        ctx.fillStyle = 'rgba(10, 20, 30, 0.9)';
                        ctx.fillRect(msg.boxX, msg.boxY, msg.boxWidth, msg.boxHeight);
                        ctx.strokeStyle = '#33ffcc';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(msg.boxX, msg.boxY, msg.boxWidth, msg.boxHeight);
                        ctx.fillStyle = '#e0ffe0';
                        ctx.font = msg.font;
                        ctx.textAlign = 'left';
                        let drawnChars = 0;
                        for (let i = 0; i < msg.lines.length; i++) {
                            const line = msg.lines[i];
                            const charsInThisLine = Math.min(line.length, msg.currentLength - drawnChars);
                            if (charsInThisLine <= 0) break;
                            const substr = line.substring(0, charsInThisLine);
                            const y = msg.boxY + msg.boxPadding + (i * msg.lineHeight) + msg.fontSize * 0.8;
                            ctx.fillText(substr, msg.boxX + msg.boxPadding, y);
                            drawnChars += charsInThisLine;
                        }
                        ctx.globalAlpha = 1;
                    }

                    // Energy ring and ability indicators
                    const ringCenterX = VIEW_W / 2;
                    const ringCenterY = VIEW_H - 35;
                    const ringRadius = 22;
                    const energyPercent = slowEnergy / SLOW_MAX_ENERGY;
                    let ringOpacity = 0.4;
                    if (!slowMode && slowEnergy >= SLOW_MAX_ENERGY - 0.01) ringOpacity = 0.08;
                    else ringOpacity = 0.4;

                    const slotWidth = 32,
                        slotHeight = 18,
                        slotGap = 8;
                    const slotsStartX = ringCenterX - ringRadius - (3 * slotWidth + 2 * slotGap) - 12;
                    const slotsY = ringCenterY - slotHeight / 2;
                    const slotLetters = ['q', 'e', 'r'];
                    for (let i = 0; i < 3; i++) {
                        const slotX = slotsStartX + i * (slotWidth + slotGap);
                        const ab = abilities[slotLetters[i]];
                        let alpha;
                        if (ab.name === 'None') alpha = 1.0;
                        else if (!noCooldown && ab.cooldown > 0) alpha = 0.5;
                        else alpha = 1.0;
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = '#1a1a2e';
                        fillRoundedRect(slotX, slotsY, slotWidth, slotHeight, 4);
                        ctx.strokeStyle = '#4a4a7a';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.font = '10px "Courier New"';
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'center';
                        let abbr = '--';
                        if (ab.name === 'Time Stop') abbr = 'TS';
                        else if (ab.name === 'Beam Shot') abbr = 'BM';
                        else if (ab.name === 'Missile Drone') abbr = 'MD';
                        else if (ab.name === 'Time Bubble') abbr = 'TB';
                        else if (ab.name === 'Overcharge') abbr = 'Ov';
                        else if (ab.name === 'Phase Dash') abbr = 'Pd';
                        else if (ab.name === 'Flak Volley') abbr = 'Fv';
                        ctx.fillText(abbr, slotX + slotWidth / 2, slotsY + slotHeight / 2 + 4);
                        ctx.font = '9px "Courier New"';
                        ctx.fillText(slotLetters[i].toUpperCase(), slotX + slotWidth / 2, slotsY + slotHeight + 12);
                        if (!noCooldown && ab.cooldown > 0 && ab.maxCooldown > 0) {
                            const cdPercent = ab.cooldown / ab.maxCooldown;
                            ctx.fillStyle = 'rgba(0,0,0,0.7)';
                            ctx.fillRect(slotX, slotsY + slotHeight * (1 - cdPercent), slotWidth, slotHeight * cdPercent);
                        }
                    }
                    ctx.globalAlpha = 1;

                    ctx.beginPath();
                    ctx.arc(ringCenterX, ringCenterY, ringRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(128, 128, 128, ${ringOpacity * 0.6})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    if (energyPercent > 0) {
                        ctx.beginPath();
                        const endAngle = -Math.PI / 2 + (Math.PI * 2 * energyPercent);
                        ctx.arc(ringCenterX, ringCenterY, ringRadius, -Math.PI / 2, endAngle);
                        ctx.strokeStyle = slowMode ? `rgba(255, 170, 0, ${ringOpacity})` :
                            `rgba(0, 221, 255, ${ringOpacity})`;
                        ctx.lineWidth = 4;
                        ctx.stroke();
                    }

                    if (gameState === 'playing') {
                        const shotBarWidth = 50,
                            shotBarHeight = 6;
                        const shotBarX = ringCenterX - shotBarWidth / 2;
                        const shotBarY = ringCenterY - 32;
                        const shootPercent = Math.max(0, 1 - (player.shootTimer / PLAYER_SHOOT_COOLDOWN));
                        ctx.fillStyle = '#333';
                        fillRoundedRect(shotBarX, shotBarY, shotBarWidth, shotBarHeight, 3);
                        if (shootPercent > 0) {
                            ctx.fillStyle = '#ffdd44';
                            fillRoundedRect(shotBarX, shotBarY, shotBarWidth * shootPercent, shotBarHeight, 3);
                        }
                    }

                    if (bossActive && boss && !deathAnimation && !timeStop.active) {
                        const bx = boss.x - cameraX,
                            by = boss.y - cameraY;
                        const margin = 50;
                        const isOffLeft = bx < margin,
                            isOffRight = bx > VIEW_W - margin;
                        const isOffTop = by < margin,
                            isOffBottom = by > VIEW_H - margin;
                        if (isOffLeft || isOffRight || isOffTop || isOffBottom) {
                            const arrowColor = 'rgba(255, 100, 100, 0.9)';

                            function drawArrow(x, y, angle) {
                                ctx.save();
                                ctx.translate(x, y);
                                ctx.rotate(angle);
                                ctx.beginPath();
                                ctx.moveTo(0, -10);
                                ctx.lineTo(15, 0);
                                ctx.lineTo(0, 10);
                                ctx.closePath();
                                ctx.fillStyle = arrowColor;
                                ctx.fill();
                                ctx.strokeStyle = '#fff';
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                ctx.restore();
                            }
                            if (isOffLeft) drawArrow(20, clamp(by, 50, VIEW_H - 50), Math.PI * 0.0);
                            if (isOffRight) drawArrow(VIEW_W - 20, clamp(by, 50, VIEW_H - 50), Math.PI);
                            if (isOffTop) drawArrow(clamp(bx, 50, VIEW_W - 50), 20, Math.PI * 1.5);
                            if (isOffBottom) drawArrow(clamp(bx, 50, VIEW_W - 50), VIEW_H - 20, Math.PI * 0.5);
                        }
                    }
                    if (bossActive && boss && (boss.type === 'black' || boss.type === 'golden') && !deathAnimation && !
                        timeStop.active) {
                        const barWidth = 300,
                            barHeight = 20;
                        const barX = VIEW_W / 2 - barWidth / 2,
                            barY = 20;
                        const fillPercent = boss.hp / boss.maxHp;
                        ctx.fillStyle = '#222';
                        ctx.fillRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = boss.type === 'golden' ? '#ccaa22' : '#cc2222';
                        ctx.fillRect(barX, barY, barWidth * fillPercent, barHeight);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = '#fff';
                        ctx.font = '14px "Courier New"';
                        ctx.textAlign = 'center';
                        ctx.fillText(boss.type === 'golden' ? 'GOLDEN ARBITER' : 'BLACK BOSS', VIEW_W / 2, barY - 6);
                    }
                    ctx.font = '18px "Courier New"';
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'left';
                    ctx.fillText('SCORE: ' + score, 20, 60);
                    ctx.fillText('KILLS: ' + killCount + ' / 20', 20, 85);
                    ctx.fillText('TIME FLOW: ' + (timeScale * 100).toFixed(0) + '%', 20, 110);
                    ctx.fillStyle = '#90EE90';
                    ctx.fillText('$ ' + cash, 20, 135);
                    if (bossActive && !deathAnimation && !timeStop.active) {
                        ctx.fillStyle = '#ffaaaa';
                        ctx.font = 'bold 22px "Courier New"';
                        ctx.textAlign = 'center';
                        ctx.fillText('⚠ BOSS ⚠', VIEW_W / 2, 60);
                    }
                    ctx.beginPath();
                    ctx.moveTo(mouseCanvasX - 12, mouseCanvasY);
                    ctx.lineTo(mouseCanvasX + 12, mouseCanvasY);
                    ctx.moveTo(mouseCanvasX, mouseCanvasY - 12);
                    ctx.lineTo(mouseCanvasX, mouseCanvasY + 12);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    if (gameState === 'gameover') {
                        ctx.fillStyle = 'rgba(0,0,0,0.75)';
                        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                        ctx.fillStyle = '#ff4455';
                        ctx.font = 'bold 48px "Courier New"';
                        ctx.textAlign = 'center';
                        ctx.fillText("TIME'S UP", VIEW_W / 2, VIEW_H / 2 - 30);
                        ctx.fillStyle = '#fff';
                        ctx.font = '22px "Courier New"';
                        ctx.fillText('SCORE: ' + score, VIEW_W / 2, VIEW_H / 2 + 20);
                        ctx.fillText('PRESS [R] TO RESTART', VIEW_W / 2, VIEW_H / 2 + 60);
                    }
                }

                // Ability shop overlay
                if (abilityShop && abilityShop.active) {
                    const shop = abilityShop;
                    ctx.fillStyle = `rgba(0,0,0,${shop.alpha})`;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    if (shop.phase === 'shop' || shop.phase === 'assignment') {
                        const boxW = 400,
                            boxH = 300;
                        const boxX = VIEW_W / 2 - boxW / 2;
                        const boxY = VIEW_H / 2 - boxH / 2;
                        ctx.fillStyle = 'rgba(20, 20, 40, 0.95)';
                        ctx.fillRect(boxX, boxY, boxW, boxH);
                        ctx.strokeStyle = '#6699ff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(boxX, boxY, boxW, boxH);
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 20px "Courier New"';
                        ctx.textAlign = 'center';
                        if (!shop.showAssignment) {
                            ctx.fillText('SELECT ABILITY', VIEW_W / 2, boxY + 40);
                            ctx.font = '16px "Courier New"';
                            ctx.fillText('Cash: $' + cash, VIEW_W / 2, boxY + 70);
                            const btnW = 200,
                                btnH = 40;
                            const btnStartY = boxY + 100;
                            const opts = shop.options || [];
                            for (let oi = 0; oi < opts.length; oi++) {
                                const opt = opts[oi];
                                const canBuy = cash >= opt.cost;
                                ctx.fillStyle = canBuy ? '#1a3a1a' : '#333';
                                ctx.fillRect(VIEW_W / 2 - btnW / 2, btnStartY + oi * 50, btnW, btnH);
                                ctx.strokeStyle = '#90EE90';
                                ctx.strokeRect(VIEW_W / 2 - btnW / 2, btnStartY + oi * 50, btnW, btnH);
                                ctx.fillStyle = canBuy ? '#fff' : '#888';
                                ctx.fillText(`${opt.name} - $${opt.cost}`, VIEW_W / 2, btnStartY + oi * 50 + btnH / 2 +
                                    6);
