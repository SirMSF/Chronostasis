                            }
                            ctx.fillStyle = '#2a1a1a';
                            ctx.fillRect(VIEW_W / 2 - btnW / 2, btnStartY + opts.length * 50, btnW, btnH);
                            ctx.strokeStyle = '#ff6666';
                            ctx.strokeRect(VIEW_W / 2 - btnW / 2, btnStartY + opts.length * 50, btnW, btnH);
                            ctx.fillStyle = '#fff';
                            ctx.fillText('SKIP', VIEW_W / 2, btnStartY + opts.length * 50 + btnH / 2 + 6);
                        } else {
                            ctx.fillText('ASSIGN TO SLOT', VIEW_W / 2, boxY + 40);
                            const slotX = [VIEW_W / 2 - 100, VIEW_W / 2 - 25, VIEW_W / 2 + 50];
                            const slotKeys = ['q', 'e', 'r'];
                            for (let i = 0; i < 3; i++) {
                                ctx.fillStyle = '#1a1a3e';
                                ctx.fillRect(slotX[i], boxY + 80, 60, 40);
                                ctx.strokeStyle = '#aaa';
                                ctx.strokeRect(slotX[i], boxY + 80, 60, 40);
                                ctx.fillStyle = '#fff';
                                ctx.font = 'bold 18px "Courier New"';
                                ctx.fillText(slotKeys[i].toUpperCase(), slotX[i] + 30, boxY + 80 + 26);
                            }
                            ctx.font = '16px "Courier New"';
                            ctx.fillText('(overwrites existing)', VIEW_W / 2, boxY + 140);
                            ctx.fillStyle = '#ff6666';
                            ctx.font = '14px "Courier New"';
                            ctx.fillText('Press ESC to cancel assignment', VIEW_W / 2, boxY + 170);
                        }
                    }
                }

                // Debug panel
                if (debugMode) {
                    const panelH = 245;
                    const panel = { x: VIEW_W - 250, y: 10, w: 240, h: panelH };
                    ctx.fillStyle = 'rgba(20, 20, 40, 0.85)';
                    ctx.fillRect(panel.x, panel.y, panel.w, panel.h);
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(panel.x, panel.y, panel.w, panel.h);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'left';
                    ctx.fillText('DEBUG MODE', panel.x + 10, panel.y + 20);
                    ctx.font = '13px "Courier New"';
                    const labels = ['Kills:', 'Cash:', 'Score:'];
                    const dkeys = ['kills', 'cash', 'score'];
                    for (let i = 0; i < 3; i++) {
                        const y = panel.y + 40 + i * 30;
                        ctx.fillStyle = '#ccc';
                        ctx.fillText(labels[i], panel.x + 10, y + 15);
                        const inputX = panel.x + 70;
                        const inputY = y;
                        const inputW = 150;
                        const inputH = 20;
                        ctx.fillStyle = '#111';
                        ctx.fillRect(inputX, inputY, inputW, inputH);
                        ctx.strokeStyle = debugFocus === dkeys[i] ? '#90EE90' : '#444';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(inputX, inputY, inputW, inputH);
                        ctx.fillStyle = '#90EE90';
                        ctx.textAlign = 'left';
                        let displayVal = debugInputs[dkeys[i]];
                        if (debugFocus === dkeys[i]) displayVal += '_';
                        ctx.fillText(displayVal, inputX + 5, inputY + 15);
                    }
                    const btnSetX = panel.x + 60;
                    const btnSetY = panel.y + 115;
                    const btnSetW = 120,
                        btnSetH = 25;
                    ctx.fillStyle = '#2a4a2a';
                    ctx.fillRect(btnSetX, btnSetY, btnSetW, btnSetH);
                    ctx.strokeStyle = '#90EE90';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnSetX, btnSetY, btnSetW, btnSetH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('SET', btnSetX + btnSetW / 2, btnSetY + 18);
                    const btnKillX = panel.x + 30;
                    const btnKillY = panel.y + 148;
                    const btnKillW = 180,
                        btnKillH = 25;
                    ctx.fillStyle = '#4a1a1a';
                    ctx.fillRect(btnKillX, btnKillY, btnKillW, btnKillH);
                    ctx.strokeStyle = '#ff6666';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnKillX, btnKillY, btnKillW, btnKillH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('KILL ALL', btnKillX + btnKillW / 2, btnKillY + 18);
                    const btnNoCdX = panel.x + 30;
                    const btnNoCdY = panel.y + 178;
                    const btnNoCdW = 85,
                        btnNoCdH = 25;
                    ctx.fillStyle = noCooldown ? '#4a2a2a' : '#2a2a4a';
                    ctx.fillRect(btnNoCdX, btnNoCdY, btnNoCdW, btnNoCdH);
                    ctx.strokeStyle = noCooldown ? '#ffaa00' : '#6699ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnNoCdX, btnNoCdY, btnNoCdW, btnNoCdH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText(noCooldown ? 'CD OFF' : 'NO CD', btnNoCdX + btnNoCdW / 2, btnNoCdY + 18);
                    const btnAbilX = panel.x + 125;
                    const btnAbilY = panel.y + 178;
                    const btnAbilW = 85,
                        btnAbilH = 25;
                    ctx.fillStyle = '#1a2a4a';
                    ctx.fillRect(btnAbilX, btnAbilY, btnAbilW, btnAbilH);
                    ctx.strokeStyle = '#6699ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnAbilX, btnAbilY, btnAbilW, btnAbilH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('ABIL', btnAbilX + btnAbilW / 2, btnAbilY + 18);
                }

                if (abilitiesUIOpen && debugMode) {
                    const ablPanel = { x: VIEW_W - 520, y: 10, w: 260, h: 190 };
                    ctx.fillStyle = 'rgba(20, 20, 40, 0.9)';
                    ctx.fillRect(ablPanel.x, ablPanel.y, ablPanel.w, ablPanel.h);
                    ctx.strokeStyle = '#6699ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(ablPanel.x, ablPanel.y, ablPanel.w, ablPanel.h);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'left';
                    ctx.fillText('ABILITIES', ablPanel.x + 10, ablPanel.y + 20);
                    const closeX = ablPanel.x + ablPanel.w - 20;
                    const closeY = ablPanel.y + 8;
                    ctx.fillStyle = '#ff6666';
                    ctx.font = '16px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('X', closeX, closeY + 12);
                    const slotLabels = ['Q', 'E', 'R'];
                    const aslotKeys = ['q', 'e', 'r'];
                    for (let i = 0; i < 3; i++) {
                        const y = ablPanel.y + 45 + i * 40;
                        ctx.fillStyle = '#ccc';
                        ctx.font = '13px "Courier New"';
                        ctx.textAlign = 'left';
                        ctx.fillText(`${slotLabels[i]}:`, ablPanel.x + 20, y + 10);
                        const ab = abilities[aslotKeys[i]];
                        const abName = ab.name;
                        ctx.fillStyle = '#90EE90';
                        ctx.fillText(abName, ablPanel.x + 60, y + 10);
                        const cycleX = ablPanel.x + 180;
                        const cycleY = y - 5;
                        const cycleW = 20,
                            cycleH = 20;
                        ctx.fillStyle = '#2a4a2a';
                        ctx.fillRect(cycleX, cycleY, cycleW, cycleH);
                        ctx.strokeStyle = '#90EE90';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(cycleX, cycleY, cycleW, cycleH);
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'center';
                        ctx.fillText('↻', cycleX + cycleW / 2, cycleY + cycleH / 2 + 4);
                    }
                }
            }

            function gameLoop(now) {
                const realDeltaMs = Math.min(now - lastRealTime, 50);
                lastRealTime = now;
                const realDeltaSec = realDeltaMs / 1000;
                if (gameState === 'playing') {
                    if (hitStopTimer > 0) { hitStopTimer -= realDeltaSec; } else { update(realDeltaSec); }
                }
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('keydown', (e) => {
                if (abilityShop && abilityShop.active && abilityShop.showAssignment) {
                    if (e.key === 'Escape') { abilityShop.showAssignment = false;
                        abilityShop.selectedAbility = null;
                        e.preventDefault(); return; }
                }
                if (debugMode && debugFocus !== null) {
                    if (e.key === 'Backspace') { debugInputs[debugFocus] = debugInputs[debugFocus].slice(0, -1);
                        e.preventDefault(); return; }
                    if (e.key === 'Enter') { applyDebugValues();
                        e.preventDefault(); return; }
                    if (e.key === 'Escape') { debugFocus = null;
                        e.preventDefault(); return; }
                    if (/^[0-9]$/.test(e.key)) { debugInputs[debugFocus] += e.key;
                        e.preventDefault(); return; }
                    e.preventDefault();
                    return;
                }
                if (abilitiesUIOpen) { if (e.key === 'Escape') { abilitiesUIOpen = false;
                        e.preventDefault(); return; }
                    e.preventDefault(); return; }
                if (gameState === 'menu' && !debugMode) {
                    if (e.key === 'Backspace') { debugCodeString = debugCodeString.slice(0, -1);
                        e.preventDefault(); return; }
                    if (e.key === 'Enter') {
                        if (debugCodeString === '676767') { debugMode = true;
                            debugInputs.kills = killCount.toString();
                            debugInputs.cash = cash.toString();
                            debugInputs.score = score.toString();
                            debugCodeString = ''; } else { debugCodeString = ''; }
                        e.preventDefault();
                        return;
                    }
                    if (/^[0-9]$/.test(e.key)) { debugCodeString += e.key;
                        e.preventDefault(); return; }
                }
                const rawKey = e.key;
                const k = rawKey.toLowerCase();
                if (k === 'q' && gameState === 'playing' && !abilitiesUIOpen && !controlsFrozen && debugFocus === null && !
                    abilityShop && !playerStompFrozen) { activateAbility('q');
                    e.preventDefault(); return; }
                if (k === 'e' && gameState === 'playing' && !abilitiesUIOpen && !controlsFrozen && debugFocus === null && !
                    abilityShop && !playerStompFrozen) { activateAbility('e');
                    e.preventDefault(); return; }
                if (k === 'r' && gameState === 'playing' && !abilitiesUIOpen && !controlsFrozen && debugFocus === null && !
                    abilityShop && !playerStompFrozen) { activateAbility('r');
                    e.preventDefault(); return; }
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') { keys[k] = true;
                    e.preventDefault(); } else if (rawKey === 'ArrowUp' || rawKey === 'ArrowLeft' || rawKey ===
                    'ArrowDown' || rawKey === 'ArrowRight') { keys[rawKey] = true;
                    e.preventDefault(); }
                if (rawKey === 'Shift' && slowEnergy > 0 && !controlsFrozen && debugFocus === null && !abilitiesUIOpen && !
                    abilityShop && !playerStompFrozen && !timeDilationDisabled) {
                    const wasSlow = slowMode;
                    slowMode = !slowMode;
                    if (!wasSlow && slowMode) {} else if (wasSlow && !slowMode) { rechargeDelay = SLOW_RECHARGE_DELAY; }
                    e.preventDefault();
                }
                if (k === 'r' && gameState === 'gameover') { restartGame();
                    e.preventDefault(); }
                initAudio();
            });
            window.addEventListener('keyup', (e) => {
                const rawKey = e.key;
                const k = rawKey.toLowerCase();
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') { keys[k] = false;
                    e.preventDefault(); } else if (rawKey === 'ArrowUp' || rawKey === 'ArrowLeft' || rawKey ===
                    'ArrowDown' || rawKey === 'ArrowRight') { keys[rawKey] = false;
                    e.preventDefault(); }
            });
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseCanvasX = e.clientX - rect.left;
                mouseCanvasY = e.clientY - rect.top;
            });
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    const mx = mouseCanvasX,
                        my = mouseCanvasY;
                    if (abilityShop && abilityShop.active && abilityShop.phase === 'shop' && !abilityShop
                        .showAssignment) {
                        const boxW = 400,
                            boxH = 300;
                        const boxX = VIEW_W / 2 - boxW / 2;
                        const boxY = VIEW_H / 2 - boxH / 2;
                        const btnW = 200,
                            btnH = 40;
                        const btnStartY = boxY + 100;
                        const opts = abilityShop.options || [];
                        for (let oi = 0; oi < opts.length; oi++) {
                            const opt = opts[oi];
                            if (mx >= VIEW_W / 2 - btnW / 2 && mx <= VIEW_W / 2 + btnW / 2 && my >= btnStartY + oi *
                                50 && my <= btnStartY + oi * 50 + btnH) {
                                if (cash >= opt.cost) { cash -= opt.cost;
                                    abilityShop.selectedAbility = opt.name;
                                    abilityShop.showAssignment = true; }
                                return;
                            }
                        }
                        if (mx >= VIEW_W / 2 - btnW / 2 && mx <= VIEW_W / 2 + btnW / 2 && my >= btnStartY + opts.length *
                            50 && my <= btnStartY + opts.length * 50 + btnH) { abilityShop.phase = 'fadein';
                            abilityShop.alpha = 1; return; }
                        return;
                    }
                    if (abilityShop && abilityShop.active && abilityShop.showAssignment) {
                        const boxW = 400,
                            boxH = 300;
                        const boxX = VIEW_W / 2 - boxW / 2;
                        const boxY = VIEW_H / 2 - boxH / 2;
                        const slotX = [VIEW_W / 2 - 100, VIEW_W / 2 - 25, VIEW_W / 2 + 50];
                        const slotKeys = ['q', 'e', 'r'];
                        for (let i = 0; i < 3; i++) {
                            if (mx >= slotX[i] && mx <= slotX[i] + 60 && my >= boxY + 80 && my <= boxY + 120) {
                                abilities[slotKeys[i]].name = abilityShop.selectedAbility;
                                abilities[slotKeys[i]].cooldown = 0;
                                abilities[slotKeys[i]].maxCooldown = 0;
                                abilityShop.phase = 'fadein';
                                abilityShop.alpha = 1;
                                abilityShop.showAssignment = false;
                                abilityShop.selectedAbility = null;
                                return;
                            }
                        }
                        return;
                    }
                    if (debugMode && abilitiesUIOpen) {
                        const ablPanel = { x: VIEW_W - 520, y: 10, w: 260, h: 190 };
                        if (mx >= ablPanel.x && mx <= ablPanel.x + ablPanel.w && my >= ablPanel.y && my <= ablPanel.y +
                            ablPanel.h) {
                            const closeX = ablPanel.x + ablPanel.w - 20;
                            const closeY = ablPanel.y + 8;
                            if (Math.abs(mx - closeX) < 10 && Math.abs(my - closeY - 4) < 10) { abilitiesUIOpen =
                                    false; return; }
                            const slotKeys = ['q', 'e', 'r'];
                            for (let i = 0; i < 3; i++) {
                                const y = ablPanel.y + 45 + i * 40;
                                const cycleX = ablPanel.x + 180;
                                const cycleY = y - 5;
                                if (mx >= cycleX && mx <= cycleX + 20 && my >= cycleY && my <= cycleY + 20) {
                                    const currentName = abilities[slotKeys[i]].name;
                                    const currentIndex = AVAILABLE_ABILITIES.indexOf(currentName);
                                    const nextIndex = (currentIndex + 1) % AVAILABLE_ABILITIES.length;
                                    abilities[slotKeys[i]].name = AVAILABLE_ABILITIES[nextIndex];
                                    abilities[slotKeys[i]].cooldown = 0;
                                    abilities[slotKeys[i]].maxCooldown = 0;
                                    return;
                                }
                            }
                            return;
                        }
                        abilitiesUIOpen = false;
                        return;
                    }
                    if (debugMode) {
                        const panelH = 245;
                        const panelX = VIEW_W - 250,
                            panelY = 10;
                        if (mx >= panelX && mx <= panelX + 240 && my >= panelY && my <= panelY + panelH) {
                            if (mx >= panelX + 30 && mx <= panelX + 115 && my >= panelY + 178 && my <= panelY + 203) {
                                noCooldown = !noCooldown;
                                return; }
                            if (mx >= panelX + 125 && mx <= panelX + 210 && my >= panelY + 178 && my <= panelY + 203) {
                                abilitiesUIOpen = !abilitiesUIOpen;
                                return; }
                            const fieldH = 20;
                            const dkeys2 = ['kills', 'cash', 'score'];
                            let field = null;
                            for (let i = 0; i < 3; i++) {
                                const y = panelY + 40 + i * 30;
                                const inputX = panelX + 70;
                                if (mx >= inputX && mx <= inputX + 150 && my >= y && my <= y + fieldH) { field =
                                        dkeys2[i]; break; }
                            }
                            if (field) { debugFocus = field; if (debugInputs[field] === '') { if (field === 'kills')
                                        debugInputs.kills = killCount.toString(); else if (field === 'cash')
                                        debugInputs.cash = cash.toString();
                                    else if (field === 'score') debugInputs.score = score.toString(); } return; }
                            if (mx >= panelX + 60 && mx <= panelX + 180 && my >= panelY + 115 && my <= panelY + 140) {
                                applyDebugValues();
                                return; }
                            if (mx >= panelX + 30 && mx <= panelX + 210 && my >= panelY + 148 && my <= panelY + 173) {
                                killAllEnemies();
                                return; }
                            return;
                        }
                    }
                    debugFocus = null;
                    if (!controlsFrozen && debugFocus === null && !abilitiesUIOpen && !abilityShop && !
                        playerStompFrozen) mouseDown = true;
                    if (gameState === 'menu') {
                        const btnW = 200,
                            btnH = 44,
                            startY = 240,
                            gap = 16;
                        if (showUpdateLog) {
                            const logW = 620,
                                logH = 560,
                                logX = VIEW_W / 2 - logW / 2,
                                logY = VIEW_H / 2 - logH / 2;
                            const cbW = 100,
                                cbH = 32,
                                cbX = VIEW_W / 2 - cbW / 2,
                                cbY = logY + logH - 48;
                            if (mx >= cbX && mx <= cbX + cbW && my >= cbY && my <= cbY + cbH) { showUpdateLog =
                                false; }
                            return;
                        }
                        const ulBtnW = 160,
                            ulBtnH = 36,
                            ulBtnX = VIEW_W / 2 - ulBtnW / 2,
                            ulBtnY = startY + (btnH + gap) * 3 + 40;
                        if (mx >= ulBtnX && mx <= ulBtnX + ulBtnW && my >= ulBtnY && my <= ulBtnY + ulBtnH) {
                            showUpdateLog = true;
                            return; }
                        const buttons = [{ y: startY, diff: 'easy' }, { y: startY + btnH + gap, diff: 'medium' }, { y: startY +
                                (btnH + gap) * 2, diff: 'hard' }
                        ];
                        for (const btn of buttons) {
                            if (mx > VIEW_W / 2 - btnW / 2 && mx < VIEW_W / 2 + btnW / 2 && my > btn.y && my < btn.y +
                                btnH) { difficulty = btn.diff;
                                restartGame();
                                gameState = 'playing'; break; }
                        }
                    }
                }
                initAudio();
            });
            window.addEventListener('mouseup', (e) => { if (e.button === 0) mouseDown = false; });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('keydown', (e) => { if (e.key === 'Shift') e.preventDefault(); }, { passive: false });

            applyDifficulty();
            lastRealTime = performance.now();
            requestAnimationFrame(gameLoop);
        })();
    </script>
