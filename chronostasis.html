            // ---------- Helpers ----------
            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function dist(a, b) { const dx = a.x - b.x,
                    dy = a.y - b.y; return Math.sqrt(dx * dx + dy * dy); }

            function circleRectCollision(cx, cy, rad, rx, ry, rw, rh) {
                const closestX = clamp(cx, rx, rx + rw),
                    closestY = clamp(cy, ry, ry + rh);
                return (cx - closestX) ** 2 + (cy - closestY) ** 2 < rad * rad;
            }

            function lineIntersectsRect(x1, y1, x2, y2, rx, ry, rw, rh) {
                function pointInRect(px, py) { return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh; }
                if (pointInRect(x1, y1) || pointInRect(x2, y2)) return true;
                const edges = [
                    [rx, ry, rx + rw, ry],
                    [rx + rw, ry, rx + rw, ry + rh],
                    [rx + rw, ry + rh, rx, ry + rh],
                    [rx, ry + rh, rx, ry]
                ];
                for (const [ex1, ey1, ex2, ey2] of edges) {
                    const d = (x2 - x1) * (ey2 - ey1) - (y2 - y1) * (ex2 - ex1);
                    if (d === 0) continue;
                    const t = ((ex1 - x1) * (ey2 - ey1) - (ey1 - y1) * (ex2 - ex1)) / d;
                    const u = ((ex1 - x1) * (y2 - y1) - (ey1 - y1) * (x2 - x1)) / d;
                    if (t >= 0 && t <= 1 && u >= 0 && u <= 1) return true;
                }
                return false;
            }

            function hasLineOfSight(x1, y1, x2, y2) {
                for (const w of walls)
                    if (lineIntersectsRect(x1, y1, x2, y2, w.x, w.y, w.w, w.h)) return false;
                return true;
            }

            function pointInWall(x, y) {
                for (const w of walls)
                    if (x >= w.x && x <= w.x + w.w && y >= w.y && y <= w.y + w.h) return true;
                return false;
            }

            function _ptInTri(px, py, ax, ay, bx, by, cx, cy) {
                const d1 = Math.sign((px - bx) * (ay - by) - (ax - bx) * (py - by));
                const d2 = Math.sign((px - cx) * (by - cy) - (bx - cx) * (py - cy));
                const d3 = Math.sign((px - ax) * (cy - ay) - (cx - ax) * (py - ay));
                return !((d1 < 0 || d2 < 0 || d3 < 0) && (d1 > 0 || d2 > 0 || d3 > 0));
            }

            function pointInPlayerArrow(wx, wy) {
                const dx = wx - player.x,
                    dy = wy - player.y;
                const ca = Math.cos(-playerFacingAngle),
                    sa = Math.sin(-playerFacingAngle);
                const lx = dx * ca - dy * sa,
                    ly = dx * sa + dy * ca;
                const r = PLAYER_RADIUS * 1.28; // slightly enlarged hitbox
                const p0x = r,
                    p0y = 0;
                const p1x = -r * .7,
                    p1y = -r * .65;
                const p2x = -r * .35,
                    p2y = 0;
                const p3x = -r * .7,
                    p3y = r * .65;
                return _ptInTri(lx, ly, p0x, p0y, p1x, p1y, p2x, p2y) ||
                    _ptInTri(lx, ly, p0x, p0y, p2x, p2y, p3x, p3y);
            }

            function manhattan(r1, c1, r2, c2) { return Math.abs(r1 - r2) + Math.abs(c1 - c2); }

            function findPath(sx, sy, ex, ey) {
                const CELL = CELL_SIZE;
                const COLS = Math.ceil(WORLD_WIDTH / CELL),
                    ROWS = Math.ceil(WORLD_HEIGHT / CELL);
                let blocked = Array(ROWS).fill().map(() => Array(COLS).fill(false));
                for (const w of walls) {
                    const l = Math.floor(w.x / CELL),
                        r = Math.floor((w.x + w.w) / CELL);
                    const t = Math.floor(w.y / CELL),
                        b = Math.floor((w.y + w.h) / CELL);
                    for (let row = t; row <= b; row++)
                        for (let col = l; col <= r; col++)
                            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) blocked[row][col] = true;
                }
                const sc = Math.floor(sx / CELL),
                    sr = Math.floor(sy / CELL);
                const ec = Math.floor(ex / CELL),
                    er = Math.floor(ey / CELL);
                if (blocked[sr]?.[sc] || blocked[er]?.[ec]) return null;
                const key = (r, c) => r * COLS + c;
                const startKey = key(sr, sc),
                    endKey = key(er, ec);
                const openSet = new Set([startKey]),
                    gScore = new Map([
                        [startKey, 0]
                    ]),
                    fScore = new Map([
                        [startKey, manhattan(sr, sc, er, ec)]
                    ]),
                    cameFrom = new Map();
                const neighbors = [
                    [-1, 0],
                    [1, 0],
                    [0, -1],
                    [0, 1]
                ];
                while (openSet.size) {
                    let cur = null,
                        low = Infinity;
                    for (const k of openSet) { const f = fScore.get(k) || Infinity; if (f < low) { low = f;
                            cur = k; } }
                    if (cur === endKey) {
                        const path = [];
                        let c = cur;
                        while (c !== startKey) {
                            const [r, c2] = [Math.floor(c / COLS), c % COLS];
                            path.unshift({ x: c2 * CELL + CELL / 2, y: r * CELL + CELL / 2 });
                            c = cameFrom.get(c);
                        }
                        return path;
                    }
                    openSet.delete(cur);
                    const [cr, cc] = [Math.floor(cur / COLS), cur % COLS];
                    for (const [dr, dc] of neighbors) {
                        const nr = cr + dr,
                            nc = cc + dc;
                        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || blocked[nr][nc]) continue;
                        const nkey = key(nr, nc),
                            tg = (gScore.get(cur) || 0) + 1;
                        if (tg < (gScore.get(nkey) || Infinity)) {
                            cameFrom.set(nkey, cur);
                            gScore.set(nkey, tg);
                            fScore.set(nkey, tg + manhattan(nr, nc, er, ec));
                            openSet.add(nkey);
                        }
                    }
                }
                return null;
            }

            // ---------- Intel message ----------
            function wrapText(text, maxWidth, font) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                ctx.font = font;
                for (let word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);
                return lines;
            }

            function triggerIntelMessage(text) {
                const fontSize = 14;
                const font = `bold ${fontSize}px "Courier New"`;
                const boxWidth = 660;
                const boxPadding = 12;
                const maxTextWidth = boxWidth - boxPadding * 2;
                const lines = wrapText(text, maxTextWidth, font);
                const lineHeight = fontSize + 6;
                const boxHeight = lines.length * lineHeight + boxPadding * 2;
                const boxX = VIEW_W / 2 - boxWidth / 2;
                const boxY = 130;
                intelMessage = {
                    text: text,
                    lines: lines,
                    font: font,
                    fontSize: fontSize,
                    currentLength: 0,
                    totalChars: text.length,
                    timer: 0,
                    charInterval: 0.04,
                    phase: 'typing',
                    stayTimer: 2.0,
                    fadeTimer: 0.6,
                    alpha: 1,
                    boxX: boxX,
                    boxY: boxY,
                    boxWidth: boxWidth,
                    boxHeight: boxHeight,
                    boxPadding: boxPadding,
                    lineHeight: lineHeight,
                };
            }

            // ---------- Beam helpers ----------
            function pointToSegmentDist(px, py, x1, y1, x2, y2) {
                const dx = x2 - x1,
                    dy = y2 - y1;
                const lengthSq = dx * dx + dy * dy;
                if (lengthSq === 0) return Math.hypot(px - x1, py - y1);
                let t = ((px - x1) * dx + (py - y1) * dy) / lengthSq;
                t = clamp(t, 0, 1);
                const projX = x1 + t * dx,
                    projY = y1 + t * dy;
                return Math.hypot(px - projX, py - projY);
            }

            // ---------- White boss dodge helper ----------
            function triggerWhiteBossDodge(bulletVx, bulletVy) {
                if (!boss || boss.type !== 'white') return;
                const perpX = -bulletVy,
                    perpY = bulletVx;
                const len = Math.sqrt(perpX * perpX + perpY * perpY) || 1;
                let dirX = perpX / len,
                    dirY = perpY / len;
                if (Math.random() < 0.5) { dirX = -dirX;
                    dirY = -dirY; }
                boss.isDashing = true;
                boss.dashProgress = 0;
                boss.dashStartPos = { x: boss.x, y: boss.y };
                boss.dashTargetPos = {
                    x: boss.x + dirX * DODGE_DISTANCE,
                    y: boss.y + dirY * DODGE_DISTANCE
                };
                boss.dashTargetPos.x = clamp(boss.dashTargetPos.x, boss.radius, WORLD_WIDTH - boss.radius);
                boss.dashTargetPos.y = clamp(boss.dashTargetPos.y, boss.radius, WORLD_HEIGHT - boss.radius);
                const tpAudio = new Audio('tp.mp3');
                tpAudio.play().catch(() => {});
                spawnSmokeParticles(boss.x, boss.y, 10);
            }

            // ---------- Shop helpers ----------
            function computeShopOptions() {
                const allAbilities = [
                    { name: 'Time Stop', cost: 50 },
                    { name: 'Beam Shot', cost: 40 },
                    { name: 'Missile Drone', cost: 30 },
                    { name: 'Time Bubble', cost: 35 }
                ];
                if (shopVisitCount === 0) {
                    const slot2 = Math.random() < 0.5 ?
                        { name: 'Missile Drone', cost: 30 } :
                        { name: 'Time Bubble', cost: 35 };
                    return [{ name: 'Beam Shot', cost: 40 }, slot2];
                } else if (shopVisitCount === 1) {
                    const others = allAbilities.filter(a => a.name !== 'Time Stop');
                    const random = others[Math.floor(Math.random() * others.length)];
                    return [{ name: 'Time Stop', cost: 50 }, { name: random.name, cost: random.cost }];
                } else {
                    const shuffled = [...allAbilities].sort(() => Math.random() - 0.5);
                    return [{ name: shuffled[0].name, cost: shuffled[0].cost }, { name: shuffled[1].name, cost: shuffled[1]
                            .cost }];
                }
            }

            // ---------- Post‑boss shop sequence ----------
            function startAbilityShop() {
                abilityShop = {
                    active: true,
                    phase: 'fadeout',
                    alpha: 0,
                    timer: 0,
                    selectedAbility: null,
                    showAssignment: false,
                    options: computeShopOptions()
                };
                shopVisitCount++;
                controlsFrozen = true;
            }

            // ---------- Update ----------
            function update(realDeltaSec) {
                if (gameState !== 'playing') return;

                // always update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * realDeltaSec;
                    p.y += p.vy * realDeltaSec;
                    p.life -= realDeltaSec;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Update golden boss trail
                if (bossActive && boss && boss.type === 'golden') {
                    goldenBossTrail.push({ x: boss.x, y: boss.y, age: 0 });
                    if (goldenBossTrail.length > GOLDEN_TRAIL_LENGTH) goldenBossTrail.shift();
                    for (const t of goldenBossTrail) t.age += realDeltaSec;
                }

                // Player stomp frozen
                if (playerStompFrozen) {
                    playerStompFrozenTimer -= realDeltaSec;
                    if (playerStompFrozenTimer <= 0) {
                        playerStompFrozen = false;
                    }
                }

                // Post‑death delay
                if (postDeathDelay > 0) {
                    postDeathDelay -= realDeltaSec;
                    controlsFrozen = true;
                    if (postDeathDelay <= 0) {
                        postDeathDelay = 0;
                        startAbilityShop();
                    }
                    return;
                }

                // Ability shop sequence
                if (abilityShop && abilityShop.active) {
                    const shop = abilityShop;
                    if (shop.phase === 'fadeout') {
                        shop.alpha = Math.min(1, shop.alpha + realDeltaSec * 1.5);
                        if (shop.alpha >= 1) { shop.phase = 'shop'; }
                        controlsFrozen = true;
                        return;
                    }
                    if (shop.phase === 'shop' || shop.phase === 'assignment') {
                        controlsFrozen = true;
                        return;
                    }
                    if (shop.phase === 'fadein') {
                        shop.alpha = Math.max(0, shop.alpha - realDeltaSec * 1.5);
                        if (shop.alpha <= 0) {
                            shop.active = false;
                            abilityShop = null;
                            controlsFrozen = false;
                            if (pendingWaveTransition) {
                                currentWave = waveTransition.targetWave;
                                waveTransition.active = true;
                                waveTransition.t = 0;
                                pendingWaveTransition = false;
                            }
                        }
                        return;
                    }
                    return;
                }

                // Intel message
                if (intelMessage) {
                    const msg = intelMessage;
                    if (msg.phase === 'typing') {
                        msg.timer += realDeltaSec;
                        while (msg.timer >= msg.charInterval && msg.currentLength < msg.totalChars) {
                            msg.currentLength++;
                            msg.timer -= msg.charInterval;
                            playTypewriterClick();
                        }
                        if (msg.currentLength >= msg.totalChars) { msg.phase = 'done';
                            msg.stayTimer = 2.0; }
                    } else if (msg.phase === 'done') {
                        msg.stayTimer -= realDeltaSec;
                        if (msg.stayTimer <= 0) { msg.phase = 'fading';
                            msg.fadeTimer = 0.6; }
                    } else if (msg.phase === 'fading') {
                        msg.fadeTimer -= realDeltaSec;
                        msg.alpha = Math.max(0, msg.fadeTimer / 0.6);
                        if (msg.fadeTimer <= 0) intelMessage = null;
                    }
                }

                // Time Stop ability logic
                if (timeStop.active) {
                    timeStop.timer -= realDeltaSec;
                    if (timeStop.phase === 'freeze') {
                        controlsFrozen = true;
                        if (timeStop.timer <= 0) { timeStop.phase = 'stopped';
                            timeStop.timer = 10.0;
                            controlsFrozen = false; }
                    } else if (timeStop.phase === 'stopped') {
                        controlsFrozen = false;
                        if (timeStop.timer <= 0) { timeStop.phase = 'unfreeze';
                            timeStop.timer = 3.0;
                            controlsFrozen = true; }
                    } else if (timeStop.phase === 'unfreeze') {
                        controlsFrozen = true;
                        if (timeStop.timer <= 0) {
                            timeStop.active = false;
                            controlsFrozen = false;
                            if (timeStop.audio) { timeStop.audio.pause();
                                timeStop.audio = null; }
                            if (bgMusicWasPlaying && bgMusic) { bgMusic.play().catch(() => {});
                                bgMusicWasPlaying = false; }
                        }
                    }
                }

                // Time Bubble update
                if (timeBubble.active) {
                    timeBubble.timer -= realDeltaSec;
                    if (timeBubble.timer <= 0) timeBubble.active = false;
                }

                // Beam ability logic
                if (beam && beam.active) {
                    if (deathAnimation && deathAnimation.active) {
                        if (beam.audio) { beam.audio.pause();
                            beam.audio = null; }
                        beam = null;
                    } else {
                        beam.timer += realDeltaSec;
                        const totalDuration = 8.0;
                        if (beam.timer < 3.5) {
                            beam.phase = 'charge';
                            beam.aimAngle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                        } else if (beam.timer < 6.0) {
                            if (beam.phase !== 'dmg') {
                                beam.phase = 'dmg';
                                beam.hitSet = new Set();
                                beam.aimAngle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                            }
                            const targetAim = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                            let aimDiff = targetAim - beam.aimAngle;
                            while (aimDiff > Math.PI) aimDiff -= 2 * Math.PI;
                            while (aimDiff < -Math.PI) aimDiff += 2 * Math.PI;
                            beam.aimAngle += Math.sign(aimDiff) * Math.min(Math.abs(aimDiff), BEAM_DMG_TURN_RATE *
                                realDeltaSec);
                            const aimAngle = beam.aimAngle;
                            const x1 = player.x,
                                y1 = player.y;
                            const x2 = x1 + Math.cos(aimAngle) * 400;
                            const y2 = y1 + Math.sin(aimAngle) * 400;
                            const beamHalfThick = 15;
                            for (let i = enemies.length - 1; i >= 0; i--) {
                                const enemy = enemies[i];
                                if (beam.hitSet.has(enemy)) continue;
                                const distToLine = pointToSegmentDist(enemy.x, enemy.y, x1, y1, x2, y2);
                                if (distToLine < enemy.radius + beamHalfThick) {
                                    enemy.hp -= 4;
                                    beam.hitSet.add(enemy);
                                    playEnemyHit();
                                    if (enemy.hp <= 0) {
                                        cash += enemy.isDarkRed ? 5 : (enemy.specialType ? 3 : enemy.maxHp);
                                        score += 100 * enemy.maxHp;
                                        killCount++;
                                        enemies.splice(i, 1);
                                        playEnemyKill();
                                        hitStopTimer = 0.05;
                                    }
                                }
                            }
                            for (let i = bullets.length - 1; i >= 0; i--) {
                                const b = bullets[i];
                                if (b.owner !== 'enemy') continue;
                                if (pointToSegmentDist(b.x, b.y, x1, y1, x2, y2) < b.radius + beamHalfThick)
                                    bullets.splice(i, 1);
                            }
                            for (let i = missiles.length - 1; i >= 0; i--) {
                                const m = missiles[i];
                                if (pointToSegmentDist(m.x, m.y, x1, y1, x2, y2) < m.radius + beamHalfThick)
                                    missiles.splice(i, 1);
                            }
                            if (bossActive && boss && !beam.hitSet.has(boss)) {
                                const distToLine = pointToSegmentDist(boss.x, boss.y, x1, y1, x2, y2);
                                if (distToLine < boss.radius + beamHalfThick) {
                                    if (boss.type === 'white') {
                                        const angle = Math.atan2(boss.y - player.y, boss.x - player.x);
                                        const teleDist = 300;
                                        const oldX = boss.x,
                                            oldY = boss.y;
                                        boss.x = player.x - Math.cos(angle) * teleDist;
                                        boss.y = player.y - Math.sin(angle) * teleDist;
                                        boss.x = clamp(boss.x, boss.radius, WORLD_WIDTH - boss.radius);
                                        boss.y = clamp(boss.y, boss.radius, WORLD_HEIGHT - boss.radius);
                                        boss.stunnedUntil = performance.now() + 2500;
                                        const tpAudio2 = new Audio('tp.mp3');
                                        tpAudio2.play().catch(() => {});
                                        spawnSmokeParticles(oldX, oldY, 10);
                                        playEnemyHit();
                                        beam.hitSet.add(boss);
                                    } else if (boss.type === 'golden' && boss.shieldActive) {
                                        // Beam is blocked by shield
                                        beam.hitSet.add(boss);
                                    } else {
                                        boss.hp -= 4;
                                        beam.hitSet.add(boss);
                                        playEnemyHit();
                                        if (boss.hp <= 0) startBossDeathAnimation();
                                    }
                                }
                            }
                        } else if (beam.timer < 8.0) {
                            beam.phase = 'fade';
                        } else {
                            if (beam.audio) { beam.audio.pause();
                                beam.audio = null; }
                            beam = null;
                        }
                    }
                }

                // Missile Drone logic
                if (missileDrone.active && !controlsFrozen && !deathAnimation && !playerStompFrozen) {
                    missileDrone.angle += DRONE_ORBIT_SPEED * realDeltaSec;
                    const droneWorldX = player.x + Math.cos(missileDrone.angle) * DRONE_ORBIT_RADIUS;
                    const droneWorldY = player.y + Math.sin(missileDrone.angle) * DRONE_ORBIT_RADIUS;
                    if (missileDrone.missilesLeft > 0) {
                        missileDrone.fireTimer -= realDeltaSec;
                        if (missileDrone.fireTimer <= 0) {
                            let nearestTarget = null,
                                nearestDist = Infinity;
                            for (const en of enemies) {
                                const d = Math.hypot(en.x - droneWorldX, en.y - droneWorldY);
                                if (d < nearestDist) { nearestDist = d;
                                    nearestTarget = en; }
                            }
                            if (bossActive && boss) {
                                const d = Math.hypot(boss.x - droneWorldX, boss.y - droneWorldY);
                                if (d < nearestDist) { nearestTarget = boss; }
                            }
                            if (nearestTarget) {
                                const angle = Math.atan2(nearestTarget.y - droneWorldY, nearestTarget.x -
                                    droneWorldX);
                                droneMissiles.push({
                                    x: droneWorldX,
                                    y: droneWorldY,
                                    vx: Math.cos(angle) * DRONE_MISSILE_SPEED,
                                    vy: Math.sin(angle) * DRONE_MISSILE_SPEED,
                                    radius: 6,
                                    life: 4.0,
                                    age: 0,
                                    target: nearestTarget,
                                    path: [],
                                    pathIndex: 0,
                                    pathTimer: 0
                                });
                                missileDrone.missilesLeft--;
                                missileDrone.fireTimer = DRONE_FIRE_INTERVAL;
                            }
                        }
                    } else if (droneMissiles.length === 0) { missileDrone.active = false; }
                }

                // Update ability cooldowns
                for (let key of ['q', 'e', 'r']) {
                    const ab = abilities[key];
                    if (!noCooldown && ab.cooldown > 0) ab.cooldown = Math.max(0, ab.cooldown - realDeltaSec);
                }

                if (deathAnimation && deathAnimation.active) {
                    deathAnimation.timer += realDeltaSec;
                    player.vx = 0;
                    player.vy = 0;
                    controlsFrozen = true;
                    if (deathAnimation.phase === 'freeze') {
                        deathAnimation.boss.x = deathAnimation.bossStartPos.x;
                        deathAnimation.boss.y = deathAnimation.bossStartPos.y;
                        if (deathAnimation.timer >= deathAnimation.freezeDuration) {
                            deathAnimation.phase = 'shake';
                            deathAnimation.timer = 0;
                        }
                    } else if (deathAnimation.phase === 'shake') {
                        deathAnimation.shakeOffsetX = (Math.random() - 0.5) * 12;
                        deathAnimation.shakeOffsetY = (Math.random() - 0.5) * 12;
                        if (deathAnimation.timer >= deathAnimation.shakeDuration) {
                            spawnSmokeParticles(deathAnimation.boss.x, deathAnimation.boss.y, 30);
                            const bossRef = deathAnimation.boss;
                            score += (bossRef.type === 'black' ? 1500 : (bossRef.type === 'golden' ? 2000 : 500));
                            cash += 10;
                            // Wave transitions
                            if (bossRef.type === 'black' && currentWave === 1) {
                                pendingWaveTransition = true;
                                waveTransition.targetWave = 2;
                                waveTransition.fromWalls = wallsWave1;
                                waveTransition.toWalls = wallsWave2;
                            }
                            if (bossRef.type === 'white' && currentWave === 2) {
                                pendingWaveTransition = true;
                                waveTransition.targetWave = 3;
                                waveTransition.fromWalls = wallsWave2;
                                waveTransition.toWalls = wallsWave3;
                            }
                            if (bossRef.type === 'golden' && currentWave === 3) {
                                pendingWaveTransition = true;
                                waveTransition.targetWave = 1;
                                waveTransition.fromWalls = wallsWave3;
                                waveTransition.toWalls = wallsWave1;
                            }
                            bossActive = false;
                            boss = null;
                            killCount = 0;
                            bossEverDefeated = true;
                            if (bossType === 'black') bossType = 'white';
                            else if (bossType === 'white') bossType = 'golden';
                            else bossType = 'black';
                            playEnemyKill();
                            deathAnimation = null;
                            goldenMirrorStoredBullets = [];
                            goldenBossTrail = [];
                            playerStompFrozen = false;
                            postDeathDelay = 2.0;
                            controlsFrozen = true;
                            return;
                        }
                    }
                    return;
                }

                // --- Shift energy system ---
                if (timeDilationDisabled && slowMode) slowMode = false; // force off during dilation disable
                if (slowMode) {
                    slowEnergy = Math.max(0, slowEnergy - realDeltaSec);
                    rechargeDelay = 0;
                    if (slowEnergy <= 0) slowMode = false;
                } else {
                    if (slowEnergy < SLOW_MAX_ENERGY) {
                        if (rechargeDelay > 0) rechargeDelay = Math.max(0, rechargeDelay - realDeltaSec);
                        else slowEnergy = Math.min(SLOW_MAX_ENERGY, slowEnergy + SLOW_RECHARGE_RATE * realDeltaSec);
                    }
                }

                let effectiveMaxSpeed = slowMode ? PLAYER_MAX_SPEED * 0.5 : PLAYER_MAX_SPEED;
                if (beam && beam.active && beam.phase === 'dmg') effectiveMaxSpeed *= 0.35;
                if (playerStompFrozen) effectiveMaxSpeed = 0;

                // Update player facing angle
                {
                    const rawAim = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                    if (beam && beam.active && beam.phase === 'dmg') {
                        let faceDiff = rawAim - playerFacingAngle;
                        while (faceDiff > Math.PI) faceDiff -= 2 * Math.PI;
                        while (faceDiff < -Math.PI) faceDiff += 2 * Math.PI;
                        playerFacingAngle += Math.sign(faceDiff) * Math.min(Math.abs(faceDiff), BEAM_DMG_TURN_RATE *
                            realDeltaSec);
                    } else { playerFacingAngle = rawAim; }
                }
                let inputX = 0,
                    inputY = 0;
                if (!controlsFrozen && debugFocus === null && !abilitiesUIOpen && !abilityShop && !playerStompFrozen) {
                    if (keys.w || keys.ArrowUp) inputY -= 1;
                    if (keys.s || keys.ArrowDown) inputY += 1;
                    if (keys.a || keys.ArrowLeft) inputX -= 1;
                    if (keys.d || keys.ArrowRight) inputX += 1;
                }
                if (inputX || inputY) { const l = Math.sqrt(inputX * inputX + inputY * inputY);
                    inputX /= l;
                    inputY /= l; }

                if (inputX || inputY) {
                    player.vx += inputX * PLAYER_ACCEL * realDeltaSec;
                    player.vy += inputY * PLAYER_ACCEL * realDeltaSec;
                } else {
                    const s = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                    if (s > 0) {
                        const fric = PLAYER_FRICTION * realDeltaSec;
                        if (fric >= s) { player.vx = 0;
                            player.vy = 0; } else { const fac = (s - fric) / s;
                            player.vx *= fac;
                            player.vy *= fac; }
                    }
                }
                let currentSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                if (currentSpeed > effectiveMaxSpeed) {
                    const scale = effectiveMaxSpeed / currentSpeed;
                    player.vx *= scale;
                    player.vy *= scale;
                }

                // Gravity Sink force (golden boss)
                if (bossActive && boss && boss.type === 'golden' && boss.gravityActive && !playerStompFrozen) {
                    const gDist = Math.hypot(player.x - boss.x, player.y - boss.y);
                    if (gDist > GOLDEN_GRAVITY_PULL_DIST && gDist > 0) {
                        const force = GOLDEN_GRAVITY_FORCE;
                        const nx = (boss.x - player.x) / gDist;
                        const ny = (boss.y - player.y) / gDist;
                        player.vx += nx * force * realDeltaSec;
                        player.vy += ny * force * realDeltaSec;
                    } else if (gDist < GOLDEN_GRAVITY_PUSH_DIST && gDist > 0) {
                        const force = GOLDEN_GRAVITY_FORCE * 1.3;
                        const nx = (player.x - boss.x) / gDist;
                        const ny = (player.y - boss.y) / gDist;
                        player.vx += nx * force * realDeltaSec;
                        player.vy += ny * force * realDeltaSec;
                    }
                }

                player.x += player.vx * realDeltaSec;
                player.y += player.vy * realDeltaSec;

                // Wall collision
                let playerTouchingWall = false;
                for (const w of walls) {
                    if (circleRectCollision(player.x, player.y, player.radius, w.x, w.y, w.w, w.h)) {
                        playerTouchingWall = true;
                        const cx = clamp(player.x, w.x, w.x + w.w);
                        const cy = clamp(player.y, w.y, w.y + w.h);
                        const dx = player.x - cx;
                        const dy = player.y - cy;
                        const d = Math.sqrt(dx * dx + dy * dy) || 1;
                        player.x += (dx / d) * (player.radius - d);
                        player.y += (dy / d) * (player.radius - d);
                        if (Math.abs(dx) > Math.abs(dy)) { player.vx = 0; } else { player.vy = 0; }
                    }
                }
                const bnd = player.radius;
                if (player.x < bnd) { player.x = bnd;
                    player.vx = 0; }
                if (player.x > WORLD_WIDTH - bnd) { player.x = WORLD_WIDTH - bnd;
                    player.vx = 0; }
                if (player.y < bnd) { player.y = bnd;
                    player.vy = 0; }
                if (player.y > WORLD_HEIGHT - bnd) { player.y = WORLD_HEIGHT - bnd;
                    player.vy = 0; }

                currentSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                const speedRatio = clamp(currentSpeed / PLAYER_MAX_SPEED, 0, 1);

                if (playerTouchingWall || timeDilationDisabled) { timeScale = 1.0; } else { timeScale = timeStop.active ? 1.0 : (slowMode ? 0.5 : (0.1 + 0.9 * speedRatio)); }

                const gameDelta = realDeltaSec * timeScale;
                updateAmbient(speedRatio);

                const freezeEnemies = timeStop.active && (timeStop.phase === 'freeze' || timeStop.phase === 'stopped' ||
                    timeStop.phase === 'unfreeze');
                const freezeBullets = timeStop.active && (timeStop.phase === 'freeze' || timeStop.phase === 'unfreeze');

                if (bossActive && boss) {
                    if (!freezeEnemies) {
                        const bossDelta = realDeltaSec * timeScale;
                        const b = boss;

                        // Golden boss AI cycle
                        if (b.type === 'golden') {
                            // --- Trail echoes ---
                            goldenBossTrail.push({ x: b.x, y: b.y, age: 0 });
                            if (goldenBossTrail.length > GOLDEN_TRAIL_LENGTH) goldenBossTrail.shift();
                            for (const t of goldenBossTrail) t.age += realDeltaSec;

                            // --- Time dilation disable timer ---
                            if (timeDilationDisabled) {
                                timeDilationDisabledTimer -= bossDelta;
                                if (timeDilationDisabledTimer <= 0) timeDilationDisabled = false;
                            }

                            // --- Player stun timer ---
                            if (playerStompFrozen) {
                                playerStompFrozenTimer -= bossDelta;
                                if (playerStompFrozenTimer <= 0) playerStompFrozen = false;
                            }

                            // ===== PHASE STATE MACHINE =====
                            if (!deathAnimation) {
                                goldenPhaseTimer -= bossDelta;

                                switch (goldenPhase) {

                                    // ---- 0. INITIAL GRACE PERIOD ----
                                    case 'idle_start':
                                        // Boss just roams for 2s before first attack
                                        if (goldenPhaseTimer <= 0) {
                                            goldenPhase = 'tp_warn';
                                            goldenPhaseTimer = GOLDEN_TP_WARN_DURATION;
                                            _goldenStartTeleportWarn();
                                        }
                                        break;

                                    // ---- 1. TELEPORT WARNING ----
                                    case 'tp_warn':
                                        if (goldenPhaseTimer <= 0) {
                                            b.x = b.tpWarnX; b.y = b.tpWarnY;
                                            const tpAudio = new Audio('tp.mp3');
                                            tpAudio.play().catch(()=>{});
                                            spawnSmokeParticles(b.x, b.y, 10);
                                            if (Math.hypot(player.x - b.x, player.y - b.y) < GOLDEN_TP_WARN_RADIUS) {
                                                // Stun player
                                                playerStompFrozen = true;
                                                playerStompFrozenTimer = GOLDEN_TP_STUN_DURATION;
                                                // Dilation disabled for stun duration + 5 extra seconds
                                                timeDilationDisabled = true;
                                                timeDilationDisabledTimer = GOLDEN_TP_STUN_DURATION + GOLDEN_TP_DILATION_DISABLE;
                                            }
                                            goldenPhase = 'tp_stun';
                                            // Boss can't shoot for 2.3s after teleport regardless of hit
                                            goldenPhaseTimer = GOLDEN_SHOOT_DELAY_AFTER_TP;
                                        }
                                        break;

                                    // ---- Wait after teleport, then resume shooting ----
                                    case 'tp_stun':
                                        if (goldenPhaseTimer <= 0) {
                                            goldenPhase = 'shoot';
                                            goldenPhaseTimer = 2.2; // shoot for 2.2s then pillars
                                            b.shootTimer = GOLDEN_SHOOT_DELAY_AFTER_TP;
                                        }
                                        break;

                                    // ---- 2. NORMAL SHOOTING WINDOW ----
                                    case 'shoot':
                                        if (goldenPhaseTimer <= 0) {
                                            goldenPhase = 'pillar_warn';
                                            b.shootTimer = 9999;
                                            _goldenStartPillars();
                                            goldenPhaseTimer = GOLDEN_PILLAR_WARN_DURATION;
                                        }
                                        break;

                                    // ---- 3A. PILLAR WARNING → SWEEP ----
                                    case 'pillar_warn':
                                        // Activate beams after warning
                                        if (goldenPhaseTimer <= 0) {
                                            for (const p of goldenPillars) p.phase = 'active';
                                            goldenPhase = 'pillar_active';
                                            goldenPhaseTimer = 2.2; // max sweep time
                                        }
                                        break;

                                    // ---- 3B. PILLAR SWEEP (beams move across) ----
                                    case 'pillar_active': {
                                        let allDone = true;
                                        for (const p of goldenPillars) {
                                            if (p.phase !== 'active') continue;
                                            p.x += (p.fromLeft ? 1 : -1) * p.speed * bossDelta;
                                            // Kill if player is in the swept lane
                                            if (Math.abs(player.y - p.y) < p.halfH + player.radius) {
                                                const inBeam = p.fromLeft ? player.x < p.x : player.x > p.x;
                                                if (inBeam) { gameState = 'gameover'; playPlayerDeath(); return; }
                                            }
                                            if (p.fromLeft && p.x > WORLD_WIDTH + 100) p.done = true;
                                            if (!p.fromLeft && p.x < -100) p.done = true;
                                            if (!p.done) allDone = false;
                                        }
                                        if (allDone || goldenPhaseTimer <= 0) {
                                            goldenPillars = [];
                                            goldenPhase = 'shield';
                                            b.shieldActive = true;
                                            b.shieldTimer = GOLDEN_SHIELD_DURATION;
                                            goldenShieldBullets = [];
                                            goldenPhaseTimer = GOLDEN_SHIELD_DURATION + 0.5;
                                        }
                                        break;
                                    }

                                    // ---- 4. SHIELD ----
                                    case 'shield':
                                        if (goldenPhaseTimer <= 0) {
                                            b.shieldActive = false;
                                            // Release ALL stored bullets at once as homing missiles
                                            for (const sb of goldenShieldBullets) {
                                                const mAngle = Math.atan2(player.y - sb.y, player.x - sb.x);
                                                missiles.push({
                                                    x: sb.x, y: sb.y,
                                                    vx: Math.cos(mAngle) * BBLACK_MISSILE_START_SPEED,
                                                    vy: Math.sin(mAngle) * BBLACK_MISSILE_START_SPEED,
                                                    radius: BBLACK_MISSILE_RADIUS, owner: 'enemy',
                                                    turnRate: BBLACK_MISSILE_TURN_RATE,
                                                    life: BBLACK_MISSILE_LIFESPAN + 1.5, age: 0,
                                                    startSpeed: BBLACK_MISSILE_START_SPEED,
                                                    endSpeed: BBLACK_MISSILE_END_SPEED,
                                                    accelTime: BBLACK_MISSILE_ACCEL_TIME,
                                                    accelerating: true, isGolden: true
                                                });
                                            }
                                            goldenShieldBullets = [];
                                            goldenPhase = 'ram_warn';
                                            _goldenStartRamWarn();
                                            goldenPhaseTimer = GOLDEN_RAM_WARN_DURATION;
                                        }
                                        break;

                                    // ---- 5A. RAM WARNING ----
                                    case 'ram_warn':
                                        if (goldenPhaseTimer <= 0) {
                                            // Launch ram
                                            goldenPhase = 'ram_active';
                                            b.ramming = true;
                                            b.shootTimer = 9999;
                                            goldenPhaseTimer = 1.3;
                                        }
                                        break;

                                    // ---- 5B. RAM ACTIVE ----
                                    case 'ram_active':
                                        if (!b.ramming || goldenPhaseTimer <= 0) {
                                            b.ramming = false;
                                            goldenRamLine = null;
                                            goldenPhase = 'cooldown';
                                            goldenPhaseTimer = 0.6;
                                        }
                                        break;

                                    // ---- COOLDOWN → repeat ----
                                    case 'cooldown':
                                        if (goldenPhaseTimer <= 0) {
                                            goldenPhase = 'tp_warn';
                                            goldenPhaseTimer = GOLDEN_TP_WARN_DURATION;
                                            _goldenStartTeleportWarn();
                                        }
                                        break;
                                }
                            }

                            // ===== SHIELD update: reflect bullets as missiles =====
                            if (b.shieldActive) {
                                b.shieldTimer -= bossDelta;
                                if (b.shieldTimer <= 0) b.shieldActive = false;
                            }

                            // ===== RAM movement =====
                            if (b.ramming) {
                                b.x += b.ramVx * bossDelta;
                                b.y += b.ramVy * bossDelta;
                                // Check player hit
                                if (Math.hypot(player.x - b.x, player.y - b.y) < b.radius + player.radius) {
                                    gameState = 'gameover'; playPlayerDeath(); return;
                                }
                                // Stop on world edge or wall
                                if (b.x < b.radius || b.x > WORLD_WIDTH - b.radius ||
                                    b.y < b.radius || b.y > WORLD_HEIGHT - b.radius) {
                                    b.ramming = false; goldenRamLine = null;
                                    b.x = clamp(b.x, b.radius, WORLD_WIDTH - b.radius);
                                    b.y = clamp(b.y, b.radius, WORLD_HEIGHT - b.radius);
                                }
                                for (const w of walls) {
                                    if (circleRectCollision(b.x, b.y, b.radius, w.x, w.y, w.w, w.h)) {
                                        b.ramming = false; goldenRamLine = null;
                                    }
                                }
                            }

                            // ===== NORMAL SHOOTING — passive, paused during abilities =====
                            const abilityActive = goldenPhase === 'tp_warn' || goldenPhase === 'pillar_warn' ||
                                goldenPhase === 'pillar_active' || goldenPhase === 'shield' ||
                                goldenPhase === 'ram_warn' || goldenPhase === 'ram_active' ||
                                goldenPhase === 'idle_start' || goldenPhase === 'tp_stun';
                            if (!abilityActive && !playerStompFrozen) {
                                b.shootTimer -= bossDelta;
                                if (b.shootTimer <= 0 && hasLineOfSight(b.x, b.y, player.x, player.y)) {
                                    const base = Math.atan2(player.y - b.y, player.x - b.x);
                                    const spread = (Math.random() - 0.5) * 0.12;
                                    bullets.push({ x: b.x, y: b.y,
                                        vx: Math.cos(base + spread) * ENEMY_BULLET_SPEED * 0.9,
                                        vy: Math.sin(base + spread) * ENEMY_BULLET_SPEED * 0.9,
                                        radius: BULLET_RADIUS, owner: 'enemy', isGolden: true });
                                    b.shootTimer = GOLDEN_SHOOT_COOLDOWN;
                                }
                            } else {
                                b.shootTimer = Math.max(b.shootTimer, GOLDEN_SHOOT_COOLDOWN);
                            }

                            // ===== MOVEMENT (when not ramming or in tp_warn) =====
                            if (!b.ramming && goldenPhase !== 'tp_warn' && goldenPhase !== 'pillar_warn' && goldenPhase !== 'pillar_active') {
                                const toPlayerX = player.x - b.x, toPlayerY = player.y - b.y;
                                const distToPlayer = Math.hypot(toPlayerX, toPlayerY);
                                let steerX = 0, steerY = 0;
                                if (distToPlayer > 0) {
                                    const normX = toPlayerX / distToPlayer, normY = toPlayerY / distToPlayer;
                                    if (distToPlayer < BOSS_MIN_DIST) { steerX -= normX * 1.8; steerY -= normY * 1.8; }
                                    else if (distToPlayer > BOSS_MAX_DIST) { steerX += normX * 1.3; steerY += normY * 1.3; }
                                    else {
                                        const perpX = -normY, perpY = normX;
                                        if (Math.random() < 0.008) b.orbitDir = (b.orbitDir || 1) * -1;
                                        steerX += perpX * b.orbitDir; steerY += perpY * b.orbitDir;
                                    }
                                }
                                const wallAvoidDist = 90;
                                for (const w of walls) {
                                    const cx2 = clamp(b.x, w.x, w.x+w.w), cy2 = clamp(b.y, w.y, w.y+w.h);
                                    const dx2 = b.x-cx2, dy2 = b.y-cy2, d2 = Math.hypot(dx2,dy2);
                                    if (d2 < wallAvoidDist && d2 > 0) { const f = (wallAvoidDist-d2)/wallAvoidDist*2.2; steerX += dx2/d2*f; steerY += dy2/d2*f; }
                                }
                                const sl = Math.hypot(steerX, steerY);
                                if (sl > 0) { steerX /= sl; steerY /= sl; }
                                b.x += steerX * b.speed * bossDelta;
                                b.y += steerY * b.speed * bossDelta;
                                for (const w of walls) {
                                    if (circleRectCollision(b.x, b.y, b.radius, w.x, w.y, w.w, w.h)) {
                                        const cx2 = clamp(b.x, w.x, w.x+w.w), cy2 = clamp(b.y, w.y, w.y+w.h);
                                        const dx2 = b.x-cx2, dy2 = b.y-cy2, d2 = Math.hypot(dx2,dy2)||1;
                                        b.x += dx2/d2*(b.radius-d2); b.y += dy2/d2*(b.radius-d2);
                                    }
                                }
                                b.x = clamp(b.x, b.radius, WORLD_WIDTH - b.radius);
                                b.y = clamp(b.y, b.radius, WORLD_HEIGHT - b.radius);
                            } // end golden movement

                        } // end b.type === 'golden'

                        if (b.type === 'white') {
                            const wb = b;
                            if (wb.isDashing) {
                                wb.dashProgress += bossDelta;
                                const t = clamp(wb.dashProgress / DODGE_DURATION, 0, 1);
                                wb.x = wb.dashStartPos.x + (wb.dashTargetPos.x - wb.dashStartPos.x) * t;
                                wb.y = wb.dashStartPos.y + (wb.dashTargetPos.y - wb.dashStartPos.y) * t;
                                for (const w of walls) {
                                    if (circleRectCollision(wb.x, wb.y, wb.radius, w.x, w.y, w.w, w.h)) {
                                        const cx = clamp(wb.x, w.x, w.x + w.w),
                                            cy = clamp(wb.y, w.y, w.y + w.h);
                                        const dx = wb.x - cx,
                                            dy = wb.y - cy,
                                            d = Math.sqrt(dx * dx + dy * dy) || 1;
                                        wb.x += (dx / d) * (wb.radius - d);
                                        wb.y += (dy / d) * (wb.radius - d);
                                    }
                                }
                                wb.x = clamp(wb.x, wb.radius, WORLD_WIDTH - wb.radius);
                                wb.y = clamp(wb.y, wb.radius, WORLD_HEIGHT - wb.radius);
                                if (t >= 1) wb.isDashing = false;
                            } else {
                                const stunned = wb.stunnedUntil && performance.now() < wb.stunnedUntil;
                                if (!stunned) {
                                    if (wb.specialActive) {
                                        if (wb.specialType === 0) {
                                            wb.specialTimer -= bossDelta;
                                            while (wb.specialTimer <= 0 && wb.specialStep < WBOSS_RAPID_FIRE_COUNT) {
                                                if (hasLineOfSight(wb.x, wb.y, player.x, player.y)) {
                                                    const base = Math.atan2(player.y - wb.y, player.x - wb.x);
                                                    const spread = (Math.random() - 0.5) * 2 * WBOSS_RAPID_SPREAD;
                                                    bullets.push({
                                                        x: wb.x,
                                                        y: wb.y,
                                                        vx: Math.cos(base + spread) * ENEMY_BULLET_SPEED *
                                                            1.0,
                                                        vy: Math.sin(base + spread) * ENEMY_BULLET_SPEED *
                                                            1.0,
                                                        radius: BULLET_RADIUS,
                                                        owner: 'enemy'
                                                    });
                                                }
                                                wb.specialStep++;
                                                wb.specialTimer += WBOSS_RAPID_FIRE_DELAY;
                                            }
                                            if (wb.specialStep >= WBOSS_RAPID_FIRE_COUNT) {
                                                wb.specialActive = false;
                                                wb.shotCount = 0;
                                                wb.shootTimer = WBOSS_NORMAL_COOLDOWN;
                                            }
                                        } else {
                                            if (wb.specialStep === 0 && hasLineOfSight(wb.x, wb.y, player.x, player.y)) {
                                                const base = Math.atan2(player.y - wb.y, player.x - wb.x);
                                                const startAngle = base - WBOSS_SHOTGUN_SPREAD / 2;
                                                for (let i = 0; i < WBOSS_SHOTGUN_COUNT; i++) {
                                                    const a = startAngle + (i / (WBOSS_SHOTGUN_COUNT - 1)) *
                                                        WBOSS_SHOTGUN_SPREAD;
                                                    bullets.push({
                                                        x: wb.x,
                                                        y: wb.y,
                                                        vx: Math.cos(a) * ENEMY_BULLET_SPEED * 0.8,
                                                        vy: Math.sin(a) * ENEMY_BULLET_SPEED * 0.8,
                                                        radius: BULLET_RADIUS,
                                                        owner: 'enemy'
                                                    });
                                                }
                                                wb.specialStep = 1;
                                                wb.specialActive = false;
                                                wb.shotCount = 0;
                                                wb.shootTimer = WBOSS_NORMAL_COOLDOWN;
                                            }
                                        }
                                    } else {
                                        wb.shootTimer -= bossDelta;
                                        if (wb.shootTimer <= 0 && hasLineOfSight(wb.x, wb.y, player.x, player.y)) {
                                            const shotIndex = wb.shotCount;
                                            const isFourth = (shotIndex === 3);
                                            const cooldown = isFourth ? WBOSS_FAST_COOLDOWN :
                                                WBOSS_NORMAL_COOLDOWN;
                                            const base = Math.atan2(player.y - wb.y, player.x - wb.x);
                                            const spread = (Math.random() - 0.5) * 0.08;
                                            bullets.push({
                                                x: wb.x,
                                                y: wb.y,
                                                vx: Math.cos(base + spread) * ENEMY_BULLET_SPEED * 0.85,
                                                vy: Math.sin(base + spread) * ENEMY_BULLET_SPEED * 0.85,
                                                radius: BULLET_RADIUS,
                                                owner: 'enemy'
                                            });
                                            wb.shotCount++;
                                            if (wb.shotCount >= 4) {
                                                wb.specialActive = true;
                                                wb.specialStep = 0;
                                                wb.specialTimer = 0;
                                                wb.specialType = (wb.specialType === 0) ? 1 : 0;
                                                wb.shootTimer = 999;
                                            } else { wb.shootTimer = cooldown; }
                                        }
                                    }
                                }
                            }
                        } else if (b.type === 'black') {
                            b.missileTimer -= bossDelta;
                            if (b.missileTimer <= 0) {
                                b.missileCount = (b.missileCount || 0) + 1;
                                if (b.missileCount % 5 === 0) {
                                    const baseAngle = Math.atan2(player.y - b.y, player.x - b.x);
                                    for (let i = 0; i < 2; i++) {
                                        const angle = baseAngle + Math.PI * i;
                                        missiles.push({
                                            x: b.x,
                                            y: b.y,
                                            vx: Math.cos(angle) * BBLACK_MISSILE_START_SPEED,
                                            vy: Math.sin(angle) * BBLACK_MISSILE_START_SPEED,
                                            radius: BBLACK_MISSILE_RADIUS,
                                            life: BBLACK_MISSILE_LIFESPAN,
                                            age: 0,
                                            accelerating: true,
                                            startSpeed: BBLACK_MISSILE_START_SPEED,
                                            endSpeed: BBLACK_MISSILE_END_SPEED,
                                            accelTime: BBLACK_MISSILE_ACCEL_TIME,
                                            turnRate: BBLACK_MISSILE_TURN_RATE
                                        });
                                    }
                                } else if (b.missileCount % 3 === 0) {
                                    const ringAngle = Math.atan2(player.y - b.y, player.x - b.x);
                                    for (let i = 0; i < BULLET_RING_COUNT; i++) {
                                        const angle = ringAngle + (i / BULLET_RING_COUNT) * Math.PI * 2;
                                        bullets.push({
                                            x: b.x,
                                            y: b.y,
                                            vx: Math.cos(angle) * BULLET_RING_SPEED,
                                            vy: Math.sin(angle) * BULLET_RING_SPEED,
                                            radius: BULLET_RADIUS,
                                            owner: 'enemy'
                                        });
                                    }
                                } else {
                                    const perpAngle = Math.atan2(player.y - b.y, player.x - b.x) + (Math.random() <
                                        0.5 ? Math.PI / 2 : -Math.PI / 2);
                                    missiles.push({
                                        x: b.x,
                                        y: b.y,
                                        vx: Math.cos(perpAngle) * BBLACK_MISSILE_START_SPEED,
                                        vy: Math.sin(perpAngle) * BBLACK_MISSILE_START_SPEED,
                                        radius: BBLACK_MISSILE_RADIUS,
                                        life: BBLACK_MISSILE_LIFESPAN,
                                        age: 0,
                                        accelerating: true,
                                        startSpeed: BBLACK_MISSILE_START_SPEED,
                                        endSpeed: BBLACK_MISSILE_END_SPEED,
                                        accelTime: BBLACK_MISSILE_ACCEL_TIME,
                                        turnRate: BBLACK_MISSILE_TURN_RATE
                                    });
                                }
                                b.missileTimer = BBLACK_MISSILE_COOLDOWN;
                            }
                        }

                        // ===== SHARED MOVEMENT for white + black boss =====
                        if (b.type === 'white' || b.type === 'black') {
                            const toPlayerX = player.x - b.x;
                            const toPlayerY = player.y - b.y;
                            const distToPlayer = Math.sqrt(toPlayerX * toPlayerX + toPlayerY * toPlayerY);
                            let steerX = 0, steerY = 0;
                            if (distToPlayer > 0) {
                                const normX = toPlayerX / distToPlayer;
                                const normY = toPlayerY / distToPlayer;
                                if (distToPlayer < BOSS_MIN_DIST) { steerX -= normX * 2.0; steerY -= normY * 2.0; }
                                else if (distToPlayer > BOSS_MAX_DIST) { steerX += normX * 1.5; steerY += normY * 1.5; }
                                else {
                                    const perpX = -normY, perpY = normX;
                                    if (Math.random() < 0.01) b.orbitDir = (b.orbitDir || 1) * -1;
                                    steerX += perpX * (b.orbitDir || 1) * 1.2;
                                    steerY += perpY * (b.orbitDir || 1) * 1.2;
                                }
                            }
                            const wallAvoidDist = 80;
                            for (const w of walls) {
                                const cx = clamp(b.x, w.x, w.x+w.w), cy = clamp(b.y, w.y, w.y+w.h);
                                const dx = b.x-cx, dy = b.y-cy, d = Math.sqrt(dx*dx+dy*dy);
                                if (d < wallAvoidDist && d > 0) { steerX += (dx/d)*(wallAvoidDist-d)/wallAvoidDist*2.5; steerY += (dy/d)*(wallAvoidDist-d)/wallAvoidDist*2.5; }
                            }
                            const sl = Math.sqrt(steerX*steerX + steerY*steerY);
                            if (sl > 0) { steerX /= sl; steerY /= sl; }
                            b.x += steerX * b.speed * bossDelta;
                            b.y += steerY * b.speed * bossDelta;
                            for (const w of walls) {
                                if (circleRectCollision(b.x, b.y, b.radius, w.x, w.y, w.w, w.h)) {
                                    const cx = clamp(b.x, w.x, w.x+w.w), cy = clamp(b.y, w.y, w.y+w.h);
                                    const dx = b.x-cx, dy = b.y-cy, d = Math.sqrt(dx*dx+dy*dy)||1;
                                    b.x += (dx/d)*(b.radius-d); b.y += (dy/d)*(b.radius-d);
                                }
                            }
                            b.x = clamp(b.x, b.radius, WORLD_WIDTH - b.radius);
                            b.y = clamp(b.y, b.radius, WORLD_HEIGHT - b.radius);
                        }
                    } // end !freezeEnemies
                } // end bossActive && boss

                if (gameDelta > 0) {
                    if (!controlsFrozen && debugFocus === null && !abilitiesUIOpen && !abilityShop && !
                        playerStompFrozen) {
                        if (player.shootTimer > 0) player.shootTimer -= gameDelta;
                        if (mouseDown && player.shootTimer <= 0) {
                            const baseAngle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                            const spreadAngle = (Math.random() - 0.5) * 2 * PLAYER_SPREAD;
                            bullets.push({
                                x: player.x,
                                y: player.y,
                                vx: Math.cos(baseAngle + spreadAngle) * PLAYER_BULLET_SPEED,
                                vy: Math.sin(baseAngle + spreadAngle) * PLAYER_BULLET_SPEED,
                                radius: BULLET_RADIUS,
                                owner: 'player'
                            });
                            player.shootTimer = PLAYER_SHOOT_COOLDOWN;
                            playPlayerShoot();
                        }
                    }

                    if (!freezeBullets || timeStop.phase === 'stopped') {
                        for (let i = bullets.length - 1; i >= 0; i--) {
                            const b = bullets[i];
                            if (timeStop.active && timeStop.phase === 'stopped' && b.owner === 'enemy') continue;
                            let bDelta = gameDelta;
                            if (timeBubble.active && b.owner === 'enemy') {
                                const distToBubble = Math.hypot(b.x - player.x, b.y - player.y);
                                if (distToBubble < timeBubble.radius) bDelta *= 0.05;
                            }
                            b.x += b.vx * bDelta;
                            b.y += b.vy * bDelta;
                            if (b.x < -50 || b.x > WORLD_WIDTH + 50 || b.y < -50 || b.y > WORLD_HEIGHT + 50) {
                                bullets.splice(i, 1);
                                continue;
                            }
                            for (const w of walls) {
                                if (circleRectCollision(b.x, b.y, b.radius, w.x, w.y, w.w, w.h)) { bullets.splice(i,
                                        1); break; }
                            }
                        }
                    }

                    if (!freezeEnemies) {
                        for (let i = missiles.length - 1; i >= 0; i--) {
                            const m = missiles[i];
                            let mDelta = gameDelta;
                            if (timeBubble.active) {
                                const distToBubble = Math.hypot(m.x - player.x, m.y - player.y);
                                if (distToBubble < timeBubble.radius) mDelta *= 0.05;
                            }
                            m.age += mDelta;
                            if (m.age >= m.life) { missiles.splice(i, 1); continue; }
                            if (m.accelerating) {
                                const accelProgress = Math.min(m.age / m.accelTime, 1);
                                const currentSpeed = m.startSpeed + (m.endSpeed - m.startSpeed) * accelProgress;
                                const currentDir = Math.atan2(m.vy, m.vx);
                                m.vx = Math.cos(currentDir) * currentSpeed;
                                m.vy = Math.sin(currentDir) * currentSpeed;
                                if (accelProgress >= 1) m.accelerating = false;
                            }
                            const desiredAngle = Math.atan2(player.y - m.y, player.x - m.x);
                            let currentAngle = Math.atan2(m.vy, m.vx);
                            let angleDiff = desiredAngle - currentAngle;
                            while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
                            while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
                            const maxTurn = m.turnRate * mDelta;
                            if (Math.abs(angleDiff) > maxTurn) angleDiff = Math.sign(angleDiff) * maxTurn;
                            const newAngle = currentAngle + angleDiff;
                            const speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
                            m.vx = Math.cos(newAngle) * speed;
                            m.vy = Math.sin(newAngle) * speed;
                            m.x += m.vx * mDelta;
                            m.y += m.vy * mDelta;
                            if (m.x < -50 || m.x > WORLD_WIDTH + 50 || m.y < -50 || m.y > WORLD_HEIGHT + 50) {
                                missiles.splice(i, 1);
                                continue;
                            }
                            for (const w of walls) {
                                if (circleRectCollision(m.x, m.y, m.radius, w.x, w.y, w.w, w.h)) { missiles.splice(i,
                                        1); break; }
                            }
                        }
                    }

                    for (let b = bullets.length - 1; b >= 0; b--) {
                        const bullet = bullets[b];
                        if (bullet.owner !== 'player') continue;
                        for (let i = missiles.length - 1; i >= 0; i--) {
                            if (circleRectCollision(bullet.x, bullet.y, bullet.radius,
                                    missiles[i].x - missiles[i].radius, missiles[i].y - missiles[i].radius,
                                    missiles[i].radius * 2, missiles[i].radius * 2)) {
                                missiles.splice(i, 1);
                                bullets.splice(b, 1);
                                break;
                            }
                        }
                    }

                    // Update drone missiles
                    for (let i = droneMissiles.length - 1; i >= 0; i--) {
                        const dm = droneMissiles[i];
                        dm.age += realDeltaSec;
                        if (dm.age >= dm.life) { droneMissiles.splice(i, 1); continue; }
                        const targetValid = dm.target && (
                            (enemies.includes(dm.target) && dm.target.hp > 0) ||
                            (dm.target === boss && bossActive && boss)
                        );
                        if (!targetValid) {
                            let nearest = null,
                                nearestDist = Infinity;
                            for (const en of enemies) {
                                const d = Math.hypot(en.x - dm.x, en.y - dm.y);
                                if (d < nearestDist) { nearestDist = d;
                                    nearest = en; }
                            }
                            if (bossActive && boss) {
                                const d = Math.hypot(boss.x - dm.x, boss.y - dm.y);
                                if (d < nearestDist) { nearest = boss; }
                            }
                            dm.target = nearest;
                            dm.path = [];
                            dm.pathIndex = 0;
                            dm.pathTimer = 0;
                        }
                        if (dm.target) {
                            const tgt = dm.target;
                            dm.pathTimer -= realDeltaSec;
                            if (dm.pathTimer <= 0 || dm.pathIndex >= dm.path.length) {
                                if (hasLineOfSight(dm.x, dm.y, tgt.x, tgt.y)) {
                                    dm.path = [];
                                    dm.pathIndex = 0;
                                } else {
                                    const p = findPath(dm.x, dm.y, tgt.x, tgt.y);
                                    dm.path = p || [];
                                    dm.pathIndex = 0;
                                }
                                dm.pathTimer = 0.25;
                            }
                            let steerX = tgt.x,
                                steerY = tgt.y;
                            if (dm.path.length > 0 && dm.pathIndex < dm.path.length) {
                                const wp = dm.path[dm.pathIndex];
                                steerX = wp.x;
                                steerY = wp.y;
                                if (Math.hypot(dm.x - wp.x, dm.y - wp.y) < 30) dm.pathIndex++;
                            }
                            const desiredAngle = Math.atan2(steerY - dm.y, steerX - dm.x);
                            let curAngle = Math.atan2(dm.vy, dm.vx);
                            let aDiff = desiredAngle - curAngle;
                            while (aDiff > Math.PI) aDiff -= 2 * Math.PI;
                            while (aDiff < -Math.PI) aDiff += 2 * Math.PI;
                            const maxT = DRONE_MISSILE_TURN_RATE * realDeltaSec;
                            curAngle += Math.sign(aDiff) * Math.min(Math.abs(aDiff), maxT);
                            dm.vx = Math.cos(curAngle) * DRONE_MISSILE_SPEED;
                            dm.vy = Math.sin(curAngle) * DRONE_MISSILE_SPEED;
                        }
                        dm.x += dm.vx * realDeltaSec;
                        dm.y += dm.vy * realDeltaSec;
                        if (dm.x < -50 || dm.x > WORLD_WIDTH + 50 || dm.y < -50 || dm.y > WORLD_HEIGHT + 50) {
                            droneMissiles.splice(i, 1);
                            continue;
                        }
                        for (const w of walls) {
                            if (circleRectCollision(dm.x, dm.y, dm.radius, w.x, w.y, w.w, w.h)) {
                                const cx = clamp(dm.x, w.x, w.x + w.w),
                                    cy = clamp(dm.y, w.y, w.y + w.h);
                                const dx = dm.x - cx,
                                    dy = dm.y - cy;
                                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                                dm.x += (dx / d) * (dm.radius - d + 1);
                                dm.y += (dy / d) * (dm.radius - d + 1);
                            }
                        }
                        let dmHit = false;
                        for (let e = enemies.length - 1; e >= 0; e--) {
                            const en = enemies[e];
                            if (dist(dm, en) < dm.radius + en.radius) {
