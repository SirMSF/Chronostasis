                    ctx.fillText('CHRONOSTASIS', VIEW_W/2, 120);
                    ctx.font = '22px "Courier New"';
                    ctx.fillText('Select Difficulty', VIEW_W/2, 200);
                    const btnW = 200, btnH = 44, startY = 240, gap = 16;
                    const buttons = [
                        { text:'EASY', diff:'easy', y:startY },
                        { text:'MODERATE', diff:'medium', y:startY+btnH+gap },
                        { text:'HARD', diff:'hard', y:startY+(btnH+gap)*2 }
                    ];
                    for (const btn of buttons) {
                        const x = VIEW_W/2 - btnW/2;
                        ctx.fillStyle = '#2a2a4a'; ctx.fillRect(x, btn.y, btnW, btnH);
                        ctx.strokeStyle = '#4a4a7a'; ctx.lineWidth = 3; ctx.strokeRect(x, btn.y, btnW, btnH);
                        ctx.fillStyle = '#ffffff'; ctx.font = '20px "Courier New"';
                        ctx.fillText(btn.text, VIEW_W/2, btn.y+btnH/2+7);
                    }
                    ctx.fillStyle = '#aaa'; ctx.font = '14px "Courier New"';
                    ctx.fillText('Click difficulty to start', VIEW_W/2, startY+(btnH+gap)*3+20);

                    // Update Log button
                    const ulBtnW = 160, ulBtnH = 36, ulBtnX = VIEW_W/2 - ulBtnW/2, ulBtnY = startY+(btnH+gap)*3+40;
                    ctx.fillStyle = '#1a2a1a'; ctx.fillRect(ulBtnX, ulBtnY, ulBtnW, ulBtnH);
                    ctx.strokeStyle = '#4a8a4a'; ctx.lineWidth = 2; ctx.strokeRect(ulBtnX, ulBtnY, ulBtnW, ulBtnH);
                    ctx.fillStyle = '#90ee90'; ctx.font = '14px "Courier New"';
                    ctx.fillText('📋 UPDATE LOG', VIEW_W/2, ulBtnY + ulBtnH/2 + 5);

                    const controlsX = VIEW_W - 260, controlsY = VIEW_H - 140;
                    ctx.fillStyle = 'rgba(20,20,40,0.85)';
                    ctx.fillRect(controlsX, controlsY, 250, 120);
                    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
                    ctx.strokeRect(controlsX, controlsY, 250, 120);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '14px "Courier New"';
                    ctx.textAlign = 'left';
                    let cy = controlsY + 20;
                    ctx.fillText('WASD = Movement', controlsX + 10, cy); cy += 22;
                    ctx.fillText('MB1 = Shoot', controlsX + 10, cy); cy += 22;
                    ctx.fillText('Shift = Slow ability', controlsX + 10, cy); cy += 22;
                    ctx.fillText('Q, E, R = Extra', controlsX + 10, cy);

                    if (!debugMode) {
                        ctx.fillStyle = '#444';
                        ctx.font = '12px "Courier New"';
                        ctx.textAlign = 'left';
                        ctx.fillText('Debug: ' + debugCodeString + '_', 10, 20);
                    }

                    // Update Log overlay
                    if (showUpdateLog) {
                        const logW = 620, logH = 560;
                        const logX = VIEW_W/2 - logW/2, logY = VIEW_H/2 - logH/2;
                        ctx.fillStyle = 'rgba(0,0,0,0.92)'; ctx.fillRect(logX, logY, logW, logH);
                        ctx.strokeStyle = '#90ee90'; ctx.lineWidth = 2; ctx.strokeRect(logX, logY, logW, logH);
                        ctx.textAlign = 'center';
                        ctx.fillStyle = '#90ee90'; ctx.font = 'bold 20px "Courier New"';
                        ctx.fillText('📋 UPDATE LOG', VIEW_W/2, logY + 34);
                        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(logX+20, logY+46); ctx.lineTo(logX+logW-20, logY+46); ctx.stroke();

                        const entries = [
                            { tag: 'NEW',  color: '#90ee90', text: 'Beam Shot ability — charge-up laser, kills in one hit' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Missile Drone ability — orbiting drone fires 5 homing missiles (2 HP dmg)' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Time Bubble ability — slows all enemy projectiles to 5% inside a radius' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Post-boss ability shop with dynamic pool per visit' },
                            { tag: 'TWEAK',color: '#ffd700', text: 'Shop 1: Beam Shot + Missile Drone or Time Bubble (50/50)' },
                            { tag: 'TWEAK',color: '#ffd700', text: 'Shop 2: Time Stop + random; Shop 3+: both random' },
                            { tag: 'TWEAK',color: '#ffd700', text: 'Beam Shot: reduces player speed to 35% and turns slowly during fire' },
                            { tag: 'TWEAK',color: '#ffd700', text: 'Beam Shot: White Boss stun raised from 1s → 2.5s on deflect' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Hit-stop: 0.05s freeze on every Beam Shot kill' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Drone missiles path-find around walls using A*' },
                            { tag: 'TWEAK',color: '#ffd700', text: 'Drone missiles retarget automatically on kill' },
                            { tag: 'NEW',  color: '#90ee90', text: 'White Boss: 93% dodge chance on all attacks incl. missiles & beam' },
                            { tag: 'NEW',  color: '#90ee90', text: 'White Boss: plays tp.mp3 + smoke burst on every dodge' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Wave 2: completely redesigned fortress/arena layout' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Dynamic wave transition: walls slide + colors lerp smoothly' },
                            { tag: 'NEW',  color: '#90ee90', text: 'Grid background transitions blue → dark red on wave change' },
                            { tag: 'TWEAK',color: '#ffd700', text: 'Player hitbox is now the actual arrow polygon (more accurate)' },
                        ];

                        ctx.textAlign = 'left';
                        ctx.font = '12px "Courier New"';
                        let ey = logY + 66;
                        const lineH = 28;
                        for (const e of entries) {
                            if (ey + lineH > logY + logH - 30) break;
                            // Tag badge
                            const tagW = e.tag === 'NEW' ? 42 : 58;
                            ctx.fillStyle = e.color + '33';
                            ctx.fillRect(logX + 18, ey - 13, tagW, 18);
                            ctx.strokeStyle = e.color;
                            ctx.lineWidth = 1;
                            ctx.strokeRect(logX + 18, ey - 13, tagW, 18);
                            ctx.fillStyle = e.color;
                            ctx.font = 'bold 11px "Courier New"';
                            ctx.fillText(e.tag, logX + 21, ey);
                            // Entry text
                            ctx.fillStyle = '#cccccc';
                            ctx.font = '12px "Courier New"';
                            ctx.fillText(e.text, logX + 22 + tagW, ey);
                            ey += lineH;
                        }

                        // Close button
                        const cbW = 100, cbH = 32;
                        const cbX = VIEW_W/2 - cbW/2, cbY = logY + logH - 48;
                        ctx.fillStyle = '#2a1a1a'; ctx.fillRect(cbX, cbY, cbW, cbH);
                        ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 1.5; ctx.strokeRect(cbX, cbY, cbW, cbH);
                        ctx.fillStyle = '#ff9999'; ctx.font = '13px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('✕  CLOSE', VIEW_W/2, cbY + cbH/2 + 5);
                    }
                }

                if (gameState === 'playing' || gameState === 'gameover') {
                    // Compute lerp factor (0 = wave1 blue, 1 = wave2 dark-red)
                    const colorT = waveTransition.active
                        ? (waveTransition.t < 0.5 ? 2*waveTransition.t*waveTransition.t : 1 - Math.pow(-2*waveTransition.t+2,2)/2)
                        : (currentWave === 2 ? 1 : 0);

                    // Grid color: lerp #1a1a2e → #2e1a1a
                    const gr = Math.round(0x1a + (0x2e - 0x1a) * colorT);
                    const gg = 0x1a;
                    const gb = Math.round(0x2e + (0x1a - 0x2e) * colorT);
                    const gridSize = CELL_SIZE;
                    ctx.strokeStyle = `rgb(${gr},${gg},${gb})`; ctx.lineWidth = 1;
                    const startX = Math.floor(cameraX / gridSize) * gridSize;
                    const startY = Math.floor(cameraY / gridSize) * gridSize;
                    for (let wx = startX; wx < cameraX+VIEW_W+gridSize; wx += gridSize) {
                        const sx = wx - cameraX; ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,VIEW_H); ctx.stroke();
                    }
                    for (let wy = startY; wy < cameraY+VIEW_H+gridSize; wy += gridSize) {
                        const sy = wy - cameraY; ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(VIEW_W,sy); ctx.stroke();
                    }

                    // Wall fill: lerp #2a2a4a → #4a1a1a | stroke: #4a4a7a → #7a3a3a
                    const wfR = Math.round(0x2a + (0x4a - 0x2a) * colorT);
                    const wfG = Math.round(0x2a + (0x1a - 0x2a) * colorT);
                    const wfB = Math.round(0x4a + (0x1a - 0x4a) * colorT);
                    const wsR = Math.round(0x4a + (0x7a - 0x4a) * colorT);
                    const wsG = Math.round(0x4a + (0x3a - 0x4a) * colorT);
                    const wsB = Math.round(0x7a + (0x3a - 0x7a) * colorT);
                    ctx.fillStyle   = `rgb(${wfR},${wfG},${wfB})`;
                    ctx.strokeStyle = `rgb(${wsR},${wsG},${wsB})`;
                    ctx.lineWidth = 2;
                    for (const w of walls) {
                        const sx = w.x - cameraX, sy = w.y - cameraY;
                        if (sx+w.w < 0 || sx > VIEW_W || sy+w.h < 0 || sy > VIEW_H) continue;
                        ctx.fillRect(sx, sy, w.w, w.h);
                        ctx.strokeRect(sx, sy, w.w, w.h);
                    }

                    if (beam && beam.active) {
                        const aimAngle = (beam.phase === 'dmg' || beam.phase === 'fade') ? beam.aimAngle : Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                        const x1 = player.x - cameraX;
                        const y1 = player.y - cameraY;
                        const beamRange = 400;
                        const x2 = x1 + Math.cos(aimAngle) * beamRange;
                        const y2 = y1 + Math.sin(aimAngle) * beamRange;
                        if (beam.phase === 'charge') {
                            const hue = (performance.now() / 10) % 360;
                            ctx.beginPath();
                            ctx.moveTo(x1, y1);
                            ctx.lineTo(x2, y2);
                            ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                            ctx.lineWidth = 3;
                            ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                            ctx.shadowBlur = 10;
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                            ctx.beginPath();
                            ctx.arc(x2, y2, 1.5, 0, Math.PI * 2);
                            ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                            ctx.fill();
                        } else if (beam.phase === 'dmg') {
                            for (let i = -2; i <= 2; i++) {
                                const hue = (performance.now() / 10 + i * 20) % 360;
                                ctx.beginPath();
                                ctx.moveTo(x1, y1);
                                ctx.lineTo(x2, y2);
                                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                                ctx.lineWidth = 12 + i * 4;
                                ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                                ctx.shadowBlur = 15;
                                ctx.stroke();
                            }
                            ctx.shadowBlur = 0;
                            const tipHue = (performance.now() / 10 + 40) % 360;
                            ctx.beginPath();
                            ctx.arc(x2, y2, 10, 0, Math.PI * 2);
                            ctx.fillStyle = `hsl(${tipHue}, 100%, 70%)`;
                            ctx.fill();
                        } else if (beam.phase === 'fade') {
                            const fadeProgress = (beam.timer - 6.0) / 2.0;
                            const alpha = 1 - fadeProgress;
                            ctx.globalAlpha = alpha;
                            for (let i = -2; i <= 2; i++) {
                                const hue = (performance.now() / 10 + i * 20) % 360;
                                ctx.beginPath();
                                ctx.moveTo(x1, y1);
                                ctx.lineTo(x2, y2);
                                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                                ctx.lineWidth = 12 + i * 4;
                                ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                                ctx.shadowBlur = 15;
                                ctx.stroke();
                            }
                            ctx.shadowBlur = 0;
                            ctx.globalAlpha = 1;
                            const tipHueFade = (performance.now() / 10 + 40) % 360;
                            ctx.beginPath();
                            ctx.arc(x2, y2, 10, 0, Math.PI * 2);
                            ctx.fillStyle = `hsl(${tipHueFade}, 100%, 70%)`;
                            ctx.fill();
                        }
                    }

                    for (const b of bullets) {
                        const sx = b.x - cameraX, sy = b.y - cameraY;
                        if (sx<-20||sx>VIEW_W+20||sy<-20||sy>VIEW_H+20) continue;
                        ctx.beginPath(); ctx.arc(sx,sy,b.radius,0,Math.PI*2);
                        ctx.fillStyle = b.owner==='player'?'#ffdd44':'#ff3366'; ctx.fill();
                    }
                    for (const m of missiles) {
                        const sx = m.x - cameraX, sy = m.y - cameraY;
                        if (sx<-20||sx>VIEW_W+20||sy<-20||sy>VIEW_H+20) continue;
                        ctx.beginPath(); ctx.arc(sx,sy,m.radius,0,Math.PI*2);
                        ctx.fillStyle = '#ff6600';
                        ctx.fill();
                        ctx.beginPath(); ctx.arc(sx - m.vx * 0.02, sy - m.vy * 0.02, m.radius * 0.6, 0, Math.PI*2);
                        ctx.fillStyle = '#ff9933'; ctx.fill();
                    }
                    // Draw drone missiles (player's)
                    for (const dm of droneMissiles) {
                        const sx = dm.x - cameraX, sy = dm.y - cameraY;
                        if (sx<-20||sx>VIEW_W+20||sy<-20||sy>VIEW_H+20) continue;
                        ctx.beginPath(); ctx.arc(sx, sy, dm.radius, 0, Math.PI*2);
                        ctx.fillStyle = '#00ffaa'; ctx.fill();
                        ctx.beginPath(); ctx.arc(sx - dm.vx*0.025, sy - dm.vy*0.025, dm.radius*0.55, 0, Math.PI*2);
                        ctx.fillStyle = '#00cc88'; ctx.fill();
                    }
                    // Draw drone
                    if (missileDrone.active) {
                        const droneScreenX = player.x - cameraX + Math.cos(missileDrone.angle) * DRONE_ORBIT_RADIUS;
                        const droneScreenY = player.y - cameraY + Math.sin(missileDrone.angle) * DRONE_ORBIT_RADIUS;
                        // Orbit line (faint)
                        ctx.beginPath();
                        ctx.arc(player.x - cameraX, player.y - cameraY, DRONE_ORBIT_RADIUS, 0, Math.PI*2);
                        ctx.strokeStyle = 'rgba(0,255,170,0.12)'; ctx.lineWidth = 1; ctx.stroke();
                        // Drone body
                        ctx.save();
                        ctx.translate(droneScreenX, droneScreenY);
                        ctx.rotate(missileDrone.angle + Math.PI/4);
                        ctx.fillStyle = '#00ffaa';
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.rect(-6, -6, 12, 12);
                        ctx.fill(); ctx.stroke();
                        ctx.restore();
                        // Missile count
                        ctx.font = 'bold 10px "Courier New"';
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'center';
                        ctx.fillText(missileDrone.missilesLeft, droneScreenX, droneScreenY - 12);
                    }
                    for (const en of enemies) {
                        const sx = en.x - cameraX, sy = en.y - cameraY;
                        if (sx<-40||sx>VIEW_W+40||sy<-40||sy>VIEW_H+40) continue;
                        let bodyColor;
                        if (en.isDarkRed) bodyColor = '#5a1a1a';
                        else if (en.specialType === 'green') bodyColor = '#00cc44';
                        else if (en.specialType === 'blue') bodyColor = '#3366ff';
                        else {
                            switch(Math.max(0, en.hp)) {
                                case 3: bodyColor = '#ff3333'; break;
                                case 2: bodyColor = '#ff9933'; break;
                                case 1: bodyColor = '#ffdd44'; break;
                                default: bodyColor = '#fff';
                            }
                        }
                        ctx.beginPath(); ctx.arc(sx, sy, en.radius, 0, Math.PI*2);
                        ctx.fillStyle = bodyColor; ctx.fill();
                        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.font = 'bold 12px "Courier New"'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                        ctx.fillText('●'.repeat(Math.max(0, en.hp)), sx, sy - en.radius - 6);
                    }
                    if (bossActive && boss) {
                        let sx = boss.x - cameraX;
                        let sy = boss.y - cameraY;
                        if (deathAnimation && deathAnimation.active && deathAnimation.phase === 'shake') {
                            sx += deathAnimation.shakeOffsetX;
                            sy += deathAnimation.shakeOffsetY;
                        }
                        if (boss.type === 'white') {
                            ctx.save();
                            ctx.shadowColor='rgba(255,255,255,0.9)'; ctx.shadowBlur=18;
                            ctx.beginPath(); ctx.arc(sx, sy, boss.radius, 0, 2*Math.PI);
                            ctx.fillStyle='#ffffff'; ctx.fill();
                            ctx.restore();
                            ctx.strokeStyle='#cccccc'; ctx.lineWidth=3; ctx.stroke();
                            ctx.font='bold 12px "Courier New"'; ctx.fillStyle='#000'; ctx.textAlign='center';
                            ctx.fillText('WHITE BOSS', sx, sy-14);
                        } else {
                            ctx.fillStyle = '#0a0a0a';
                            ctx.beginPath(); ctx.arc(sx, sy, boss.radius, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.strokeStyle = '#333333'; ctx.lineWidth = 4; ctx.stroke();
                            ctx.fillStyle = '#ffaaaa'; ctx.font = 'bold 14px "Courier New"'; ctx.textAlign = 'center';
                            ctx.fillText('BLACK BOSS', sx, sy - boss.radius - 10);
                        }
                    }
                    for (const p of particles) {
                        const sx = p.x - cameraX, sy = p.y - cameraY;
                        const alpha = p.life / p.maxLife;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(sx, sy, p.radius, 0, Math.PI*2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;

                    const pScreenX = player.x - cameraX, pScreenY = player.y - cameraY;
                    // Time Bubble visual
                    if (timeBubble.active) {
                        const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 150);
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(pScreenX, pScreenY, timeBubble.radius, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 200, 255, ${0.55 * pulse})`;
                        ctx.lineWidth = 3;
                        ctx.setLineDash([12, 8]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = `rgba(0, 150, 220, ${0.06 * pulse})`;
                        ctx.fill();
                        ctx.restore();
                    }
                    ctx.save(); ctx.translate(pScreenX, pScreenY);
                    const aimAngle2 = playerFacingAngle;
                    ctx.rotate(aimAngle2);
                    ctx.beginPath(); ctx.moveTo(player.radius,0); ctx.lineTo(-player.radius*0.7,-player.radius*0.6);
                    ctx.lineTo(-player.radius*0.4,0); ctx.lineTo(-player.radius*0.7,player.radius*0.6);
                    ctx.closePath(); ctx.fillStyle='#ffffff'; ctx.fill(); ctx.strokeStyle='#aaaacc'; ctx.lineWidth=2; ctx.stroke();
                    ctx.restore();

                    if (timeStop.active) {
                        ctx.fillStyle = 'rgba(80, 80, 80, 0.4)';
                        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    }

                    if (timeScale < 1.0 && !timeStop.active) {
                        const alpha = (1 - (timeScale - 0.1) / 0.9) * 0.25;
                        ctx.fillStyle = `rgba(20, 40, 100, ${alpha})`;
                        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    }

                    if (intelMessage) {
                        const msg = intelMessage;
                        ctx.globalAlpha = msg.alpha;
                        ctx.fillStyle = 'rgba(10, 20, 30, 0.9)';
                        ctx.fillRect(msg.boxX, msg.boxY, msg.boxWidth, msg.boxHeight);
                        ctx.strokeStyle = '#33ffcc';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(msg.boxX, msg.boxY, msg.boxWidth, msg.boxHeight);
                        ctx.fillStyle = '#e0ffe0';
                        ctx.font = msg.font;
                        ctx.textAlign = 'left';
                        let drawnChars = 0;
                        for (let i = 0; i < msg.lines.length; i++) {
                            const line = msg.lines[i];
                            const charsInThisLine = Math.min(line.length, msg.currentLength - drawnChars);
                            if (charsInThisLine <= 0) break;
                            const substr = line.substring(0, charsInThisLine);
                            const y = msg.boxY + msg.boxPadding + (i * msg.lineHeight) + msg.fontSize * 0.8;
                            ctx.fillText(substr, msg.boxX + msg.boxPadding, y);
                            drawnChars += charsInThisLine;
                        }
                        ctx.globalAlpha = 1;
                    }

                    // Energy ring and ability indicators
                    const ringCenterX = VIEW_W / 2;
                    const ringCenterY = VIEW_H - 35;
                    const ringRadius = 22;
                    const energyPercent = slowEnergy / SLOW_MAX_ENERGY;
                    let ringOpacity = 0.4;
                    if (!slowMode && slowEnergy >= SLOW_MAX_ENERGY - 0.01) {
                        ringOpacity = 0.08;
                    } else {
                        ringOpacity = 0.4;
                    }

                    const slotWidth = 32, slotHeight = 18, slotGap = 8;
                    const slotsStartX = ringCenterX - ringRadius - (3 * slotWidth + 2 * slotGap) - 12;
                    const slotsY = ringCenterY - slotHeight / 2;
                    const slotLetters = ['q','e','r'];

                    for (let i = 0; i < 3; i++) {
                        const slotX = slotsStartX + i * (slotWidth + slotGap);
                        const ab = abilities[slotLetters[i]];
                        let alpha;
                        if (ab.name === 'None') {
                            alpha = 1.0;
                        } else if (!noCooldown && ab.cooldown > 0) {
                            alpha = 0.5;
                        } else {
                            alpha = 1.0;
                        }
                        ctx.globalAlpha = alpha;

                        ctx.fillStyle = '#1a1a2e';
                        fillRoundedRect(slotX, slotsY, slotWidth, slotHeight, 4);
                        ctx.strokeStyle = '#4a4a7a';
                        ctx.lineWidth = 1;
                        ctx.stroke();

                        ctx.font = '10px "Courier New"';
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'center';
                        let abbr = '--';
                        if (ab.name === 'Time Stop') abbr = 'TS';
                        else if (ab.name === 'Beam Shot') abbr = 'BM';
                        else if (ab.name === 'Missile Drone') abbr = 'MD';
                        else if (ab.name === 'Time Bubble') abbr = 'TB';
                        else if (ab.name === 'Overcharge') abbr = 'Ov';
                        else if (ab.name === 'Phase Dash') abbr = 'Pd';
                        else if (ab.name === 'Flak Volley') abbr = 'Fv';
                        ctx.fillText(abbr, slotX + slotWidth/2, slotsY + slotHeight/2 + 4);

                        ctx.font = '9px "Courier New"';
                        ctx.fillText(slotLetters[i].toUpperCase(), slotX + slotWidth/2, slotsY + slotHeight + 12);

                        if (!noCooldown && ab.cooldown > 0 && ab.maxCooldown > 0) {
                            const cdPercent = ab.cooldown / ab.maxCooldown;
                            ctx.fillStyle = 'rgba(0,0,0,0.7)';
                            ctx.fillRect(slotX, slotsY + slotHeight * (1 - cdPercent), slotWidth, slotHeight * cdPercent);
                        }
                    }
                    ctx.globalAlpha = 1;

                    ctx.beginPath();
                    ctx.arc(ringCenterX, ringCenterY, ringRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(128, 128, 128, ${ringOpacity * 0.6})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    if (energyPercent > 0) {
                        ctx.beginPath();
                        const endAngle = -Math.PI/2 + (Math.PI * 2 * energyPercent);
                        ctx.arc(ringCenterX, ringCenterY, ringRadius, -Math.PI/2, endAngle);
                        ctx.strokeStyle = slowMode ? `rgba(255, 170, 0, ${ringOpacity})` : `rgba(0, 221, 255, ${ringOpacity})`;
                        ctx.lineWidth = 4;
                        ctx.stroke();
                    }

                    if (gameState === 'playing') {
                        const shotBarWidth = 50, shotBarHeight = 6;
                        const shotBarX = ringCenterX - shotBarWidth/2;
                        const shotBarY = ringCenterY - 32;
                        const shootPercent = Math.max(0, 1 - (player.shootTimer / PLAYER_SHOOT_COOLDOWN));
                        ctx.fillStyle = '#333';
                        fillRoundedRect(shotBarX, shotBarY, shotBarWidth, shotBarHeight, 3);
                        if (shootPercent > 0) {
                            ctx.fillStyle = '#ffdd44';
                            fillRoundedRect(shotBarX, shotBarY, shotBarWidth * shootPercent, shotBarHeight, 3);
                        }
                    }

                    if (bossActive && boss && !deathAnimation && !timeStop.active) {
                        const bx = boss.x - cameraX, by = boss.y - cameraY;
                        const margin = 50;
                        const isOffLeft = bx < margin, isOffRight = bx > VIEW_W - margin;
                        const isOffTop = by < margin, isOffBottom = by > VIEW_H - margin;
                        if (isOffLeft || isOffRight || isOffTop || isOffBottom) {
                            const arrowColor = 'rgba(255, 100, 100, 0.9)';
                            function drawArrow(x, y, angle) {
                                ctx.save();
                                ctx.translate(x, y);
                                ctx.rotate(angle);
                                ctx.beginPath();
                                ctx.moveTo(0, -10);
                                ctx.lineTo(15, 0);
                                ctx.lineTo(0, 10);
                                ctx.closePath();
                                ctx.fillStyle = arrowColor;
                                ctx.fill();
                                ctx.strokeStyle = '#fff';
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                ctx.restore();
                            }
                            if (isOffLeft) drawArrow(20, clamp(by, 50, VIEW_H-50), Math.PI*0.0);
                            if (isOffRight) drawArrow(VIEW_W-20, clamp(by, 50, VIEW_H-50), Math.PI);
                            if (isOffTop) drawArrow(clamp(bx, 50, VIEW_W-50), 20, Math.PI*1.5);
                            if (isOffBottom) drawArrow(clamp(bx, 50, VIEW_W-50), VIEW_H-20, Math.PI*0.5);
                        }
                    }
                    if (bossActive && boss && boss.type === 'black' && !deathAnimation && !timeStop.active) {
                        const barWidth = 300, barHeight = 20;
                        const barX = VIEW_W/2 - barWidth/2, barY = 20;
                        const fillPercent = boss.hp / boss.maxHp;
                        ctx.fillStyle = '#222';
                        ctx.fillRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = '#cc2222';
                        ctx.fillRect(barX, barY, barWidth * fillPercent, barHeight);
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                        ctx.strokeRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = '#fff'; ctx.font = '14px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('BLACK BOSS', VIEW_W/2, barY - 6);
                    }
                    ctx.font = '18px "Courier New"'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
                    ctx.fillText('SCORE: ' + score, 20, 60);
                    ctx.fillText('KILLS: ' + killCount + ' / 20', 20, 85);
                    ctx.fillText('TIME FLOW: ' + (timeScale*100).toFixed(0) + '%', 20, 110);
                    ctx.fillStyle = '#90EE90';
                    ctx.fillText('$ ' + cash, 20, 135);

                    if (bossActive && !deathAnimation && !timeStop.active) {
                        ctx.fillStyle = '#ffaaaa'; ctx.font = 'bold 22px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('⚠ BOSS ⚠', VIEW_W/2, 60);
                    }
                    ctx.beginPath();
                    ctx.moveTo(mouseCanvasX-12, mouseCanvasY); ctx.lineTo(mouseCanvasX+12, mouseCanvasY);
                    ctx.moveTo(mouseCanvasX, mouseCanvasY-12); ctx.lineTo(mouseCanvasX, mouseCanvasY+12);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    if (gameState === 'gameover') {
                        ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,VIEW_W,VIEW_H);
                        ctx.fillStyle = '#ff4455'; ctx.font = 'bold 48px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('TIME\'S UP', VIEW_W/2, VIEW_H/2-30);
                        ctx.fillStyle = '#fff'; ctx.font = '22px "Courier New"';
                        ctx.fillText('SCORE: ' + score, VIEW_W/2, VIEW_H/2+20);
                        ctx.fillText('PRESS [R] TO RESTART', VIEW_W/2, VIEW_H/2+60);
                    }
                }

                // Ability shop overlay
                if (abilityShop && abilityShop.active) {
                    const shop = abilityShop;
                    ctx.fillStyle = `rgba(0,0,0,${shop.alpha})`;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

                    if (shop.phase === 'shop' || shop.phase === 'assignment') {
                        const boxW = 400, boxH = 300;
                        const boxX = VIEW_W/2 - boxW/2;
                        const boxY = VIEW_H/2 - boxH/2;
                        ctx.fillStyle = 'rgba(20, 20, 40, 0.95)';
                        ctx.fillRect(boxX, boxY, boxW, boxH);
                        ctx.strokeStyle = '#6699ff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(boxX, boxY, boxW, boxH);

                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 20px "Courier New"';
                        ctx.textAlign = 'center';
                        if (!shop.showAssignment) {
                            ctx.fillText('SELECT ABILITY', VIEW_W/2, boxY + 40);
                            ctx.font = '16px "Courier New"';
                            ctx.fillText('Cash: $' + cash, VIEW_W/2, boxY + 70);

                            const btnW = 200, btnH = 40;
                            const btnStartY = boxY + 100;
                            const opts = shop.options || [];
                            for (let oi = 0; oi < opts.length; oi++) {
                                const opt = opts[oi];
                                const canBuy = cash >= opt.cost;
                                ctx.fillStyle = canBuy ? '#1a3a1a' : '#333';
                                ctx.fillRect(VIEW_W/2 - btnW/2, btnStartY + oi * 50, btnW, btnH);
                                ctx.strokeStyle = '#90EE90';
                                ctx.strokeRect(VIEW_W/2 - btnW/2, btnStartY + oi * 50, btnW, btnH);
                                ctx.fillStyle = canBuy ? '#fff' : '#888';
                                ctx.fillText(`${opt.name} - $${opt.cost}`, VIEW_W/2, btnStartY + oi * 50 + btnH/2 + 6);
                            }

                            ctx.fillStyle = '#2a1a1a';
                            ctx.fillRect(VIEW_W/2 - btnW/2, btnStartY + opts.length * 50, btnW, btnH);
                            ctx.strokeStyle = '#ff6666';
                            ctx.strokeRect(VIEW_W/2 - btnW/2, btnStartY + opts.length * 50, btnW, btnH);
                            ctx.fillStyle = '#fff';
                            ctx.fillText('SKIP', VIEW_W/2, btnStartY + opts.length * 50 + btnH/2 + 6);
                        } else {
                            ctx.fillText('ASSIGN TO SLOT', VIEW_W/2, boxY + 40);
                            const slotX = [VIEW_W/2 - 100, VIEW_W/2 - 25, VIEW_W/2 + 50];
                            const slotKeys = ['q','e','r'];
                            for (let i = 0; i < 3; i++) {
                                ctx.fillStyle = '#1a1a3e';
                                ctx.fillRect(slotX[i], boxY + 80, 60, 40);
                                ctx.strokeStyle = '#aaa';
                                ctx.strokeRect(slotX[i], boxY + 80, 60, 40);
                                ctx.fillStyle = '#fff';
                                ctx.font = 'bold 18px "Courier New"';
                                ctx.fillText(slotKeys[i].toUpperCase(), slotX[i] + 30, boxY + 80 + 26);
                            }
                            ctx.font = '16px "Courier New"';
                            ctx.fillText('(overwrites existing)', VIEW_W/2, boxY + 140);
                            ctx.fillStyle = '#ff6666';
                            ctx.font = '14px "Courier New"';
                            ctx.fillText('Press ESC to cancel assignment', VIEW_W/2, boxY + 170);
                        }
                    }
                }

                // Debug panel
                if (debugMode) {
                    const panelH = 245;
                    const panel = { x: VIEW_W - 250, y: 10, w: 240, h: panelH };
                    ctx.fillStyle = 'rgba(20, 20, 40, 0.85)';
                    ctx.fillRect(panel.x, panel.y, panel.w, panel.h);
                    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
                    ctx.strokeRect(panel.x, panel.y, panel.w, panel.h);

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'left';
                    ctx.fillText('DEBUG MODE', panel.x + 10, panel.y + 20);

                    ctx.font = '13px "Courier New"';
                    const labels = ['Kills:', 'Cash:', 'Score:'];
                    const keys = ['kills', 'cash', 'score'];
                    for (let i = 0; i < 3; i++) {
                        const y = panel.y + 40 + i * 30;
                        ctx.fillStyle = '#ccc';
                        ctx.fillText(labels[i], panel.x + 10, y + 15);
                        const inputX = panel.x + 70;
                        const inputY = y;
                        const inputW = 150;
                        const inputH = 20;

                        ctx.fillStyle = '#111';
                        ctx.fillRect(inputX, inputY, inputW, inputH);
                        ctx.strokeStyle = debugFocus === keys[i] ? '#90EE90' : '#444';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(inputX, inputY, inputW, inputH);

                        ctx.fillStyle = '#90EE90';
                        ctx.textAlign = 'left';
                        let displayVal = debugInputs[keys[i]];
                        if (debugFocus === keys[i]) displayVal += '_';
                        ctx.fillText(displayVal, inputX + 5, inputY + 15);
                    }

                    const btnSetX = panel.x + 60;
                    const btnSetY = panel.y + 115;
                    const btnSetW = 120, btnSetH = 25;
                    ctx.fillStyle = '#2a4a2a';
                    ctx.fillRect(btnSetX, btnSetY, btnSetW, btnSetH);
                    ctx.strokeStyle = '#90EE90';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnSetX, btnSetY, btnSetW, btnSetH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('SET', btnSetX + btnSetW/2, btnSetY + 18);

                    const btnKillX = panel.x + 30;
                    const btnKillY = panel.y + 148;
                    const btnKillW = 180, btnKillH = 25;
                    ctx.fillStyle = '#4a1a1a';
                    ctx.fillRect(btnKillX, btnKillY, btnKillW, btnKillH);
                    ctx.strokeStyle = '#ff6666';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnKillX, btnKillY, btnKillW, btnKillH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('KILL ALL', btnKillX + btnKillW/2, btnKillY + 18);

                    const btnNoCdX = panel.x + 30;
                    const btnNoCdY = panel.y + 178;
                    const btnNoCdW = 85, btnNoCdH = 25;
                    ctx.fillStyle = noCooldown ? '#4a2a2a' : '#2a2a4a';
                    ctx.fillRect(btnNoCdX, btnNoCdY, btnNoCdW, btnNoCdH);
                    ctx.strokeStyle = noCooldown ? '#ffaa00' : '#6699ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnNoCdX, btnNoCdY, btnNoCdW, btnNoCdH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText(noCooldown ? 'CD OFF' : 'NO CD', btnNoCdX + btnNoCdW/2, btnNoCdY + 18);

                    const btnAbilX = panel.x + 125;
                    const btnAbilY = panel.y + 178;
                    const btnAbilW = 85, btnAbilH = 25;
                    ctx.fillStyle = '#1a2a4a';
                    ctx.fillRect(btnAbilX, btnAbilY, btnAbilW, btnAbilH);
                    ctx.strokeStyle = '#6699ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnAbilX, btnAbilY, btnAbilW, btnAbilH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('ABIL', btnAbilX + btnAbilW/2, btnAbilY + 18);
                }

                if (abilitiesUIOpen && debugMode) {
                    const ablPanel = { x: VIEW_W - 520, y: 10, w: 260, h: 190 };
                    ctx.fillStyle = 'rgba(20, 20, 40, 0.9)';
                    ctx.fillRect(ablPanel.x, ablPanel.y, ablPanel.w, ablPanel.h);
                    ctx.strokeStyle = '#6699ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(ablPanel.x, ablPanel.y, ablPanel.w, ablPanel.h);

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'left';
                    ctx.fillText('ABILITIES', ablPanel.x + 10, ablPanel.y + 20);

                    const closeX = ablPanel.x + ablPanel.w - 20;
                    const closeY = ablPanel.y + 8;
                    ctx.fillStyle = '#ff6666';
                    ctx.font = '16px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('X', closeX, closeY + 12);

                    const slotLabels = ['Q', 'E', 'R'];
                    const slotKeys = ['q','e','r'];
                    for (let i = 0; i < 3; i++) {
                        const y = ablPanel.y + 45 + i * 40;
                        ctx.fillStyle = '#ccc';
                        ctx.font = '13px "Courier New"';
                        ctx.textAlign = 'left';
                        ctx.fillText(`${slotLabels[i]}:`, ablPanel.x + 20, y + 10);

                        const ab = abilities[slotKeys[i]];
                        const abName = ab.name;
                        ctx.fillStyle = '#90EE90';
                        ctx.fillText(abName, ablPanel.x + 60, y + 10);

                        const cycleX = ablPanel.x + 180;
                        const cycleY = y - 5;
                        const cycleW = 20, cycleH = 20;
                        ctx.fillStyle = '#2a4a2a';
                        ctx.fillRect(cycleX, cycleY, cycleW, cycleH);
                        ctx.strokeStyle = '#90EE90';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(cycleX, cycleY, cycleW, cycleH);
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'center';
                        ctx.fillText('↻', cycleX + cycleW/2, cycleY + cycleH/2 + 4);
                    }
                }
            }

            function gameLoop(now) {
                const realDeltaMs = Math.min(now - lastRealTime, 50);
                lastRealTime = now;
                const realDeltaSec = realDeltaMs / 1000;
                if (gameState === 'playing') {
                    if (hitStopTimer > 0) {
                        hitStopTimer -= realDeltaSec;
                        // Still draw but skip update during hit-stop
                    } else {
                        update(realDeltaSec);
                    }
                }
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('keydown', (e) => {
                if (abilityShop && abilityShop.active && abilityShop.showAssignment) {
                    if (e.key === 'Escape') {
                        abilityShop.showAssignment = false;
                        abilityShop.selectedAbility = null;
                        e.preventDefault();
                        return;
                    }
                }
                if (debugMode && debugFocus !== null) {
                    if (e.key === 'Backspace') { debugInputs[debugFocus] = debugInputs[debugFocus].slice(0, -1); e.preventDefault(); return; }
                    if (e.key === 'Enter') { applyDebugValues(); e.preventDefault(); return; }
                    if (e.key === 'Escape') { debugFocus = null; e.preventDefault(); return; }
                    if (/^[0-9]$/.test(e.key)) { debugInputs[debugFocus] += e.key; e.preventDefault(); return; }
                    e.preventDefault(); return;
                }

                if (abilitiesUIOpen) {
                    if (e.key === 'Escape') { abilitiesUIOpen = false; e.preventDefault(); return; }
                    e.preventDefault();
                    return;
                }

                if (gameState === 'menu' && !debugMode) {
                    if (e.key === 'Backspace') { debugCodeString = debugCodeString.slice(0, -1); e.preventDefault(); return; }
                    if (e.key === 'Enter') {
                        if (debugCodeString === '676767') {
                            debugMode = true;
                            debugInputs.kills = killCount.toString();
                            debugInputs.cash = cash.toString();
                            debugInputs.score = score.toString();
                            debugCodeString = '';
                        } else { debugCodeString = ''; }
                        e.preventDefault(); return;
                    }
                    if (/^[0-9]$/.test(e.key)) { debugCodeString += e.key; e.preventDefault(); return; }
                }

                const rawKey = e.key;
                const k = rawKey.toLowerCase();

                if (k === 'q' && gameState === 'playing' && !abilitiesUIOpen && !controlsFrozen && debugFocus === null && !abilityShop) {
                    activateAbility('q');
                    e.preventDefault();
                    return;
                }
                if (k === 'e' && gameState === 'playing' && !abilitiesUIOpen && !controlsFrozen && debugFocus === null && !abilityShop) {
                    activateAbility('e');
                    e.preventDefault();
                    return;
                }
                if (k === 'r' && gameState === 'playing' && !abilitiesUIOpen && !controlsFrozen && debugFocus === null && !abilityShop) {
                    activateAbility('r');
                    e.preventDefault();
                    return;
                }

                if (k === 'w' || k === 'a' || k === 's' || k === 'd') { keys[k] = true; e.preventDefault(); }
                else if (rawKey === 'ArrowUp' || rawKey === 'ArrowLeft' || rawKey === 'ArrowDown' || rawKey === 'ArrowRight') { keys[rawKey] = true; e.preventDefault(); }
                if (rawKey === 'Shift' && slowEnergy > 0 && !controlsFrozen && debugFocus === null && !abilitiesUIOpen && !abilityShop) {
                    const wasSlow = slowMode;
                    slowMode = !slowMode;
                    if (!wasSlow && slowMode) {}
                    else if (wasSlow && !slowMode) { rechargeDelay = SLOW_RECHARGE_DELAY; }
                    e.preventDefault();
                }
                if (k === 'r' && gameState === 'gameover') { restartGame(); e.preventDefault(); }
                initAudio();
            });
            window.addEventListener('keyup', (e) => {
                const rawKey = e.key;
                const k = rawKey.toLowerCase();
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') { keys[k] = false; e.preventDefault(); }
                else if (rawKey === 'ArrowUp' || rawKey === 'ArrowLeft' || rawKey === 'ArrowDown' || rawKey === 'ArrowRight') { keys[rawKey] = false; e.preventDefault(); }
            });
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseCanvasX = e.clientX - rect.left;
                mouseCanvasY = e.clientY - rect.top;
            });
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    const mx = mouseCanvasX, my = mouseCanvasY;

                    if (abilityShop && abilityShop.active && abilityShop.phase === 'shop' && !abilityShop.showAssignment) {
                        const boxW = 400, boxH = 300;
                        const boxX = VIEW_W/2 - boxW/2;
                        const boxY = VIEW_H/2 - boxH/2;
                        const btnW = 200, btnH = 40;
                        const btnStartY = boxY + 100;
                        const opts = abilityShop.options || [];
                        for (let oi = 0; oi < opts.length; oi++) {
                            const opt = opts[oi];
                            if (mx >= VIEW_W/2 - btnW/2 && mx <= VIEW_W/2 + btnW/2 && my >= btnStartY + oi * 50 && my <= btnStartY + oi * 50 + btnH) {
                                if (cash >= opt.cost) {
                                    cash -= opt.cost;
                                    abilityShop.selectedAbility = opt.name;
                                    abilityShop.showAssignment = true;
                                }
                                return;
                            }
                        }
                        if (mx >= VIEW_W/2 - btnW/2 && mx <= VIEW_W/2 + btnW/2 && my >= btnStartY + opts.length * 50 && my <= btnStartY + opts.length * 50 + btnH) {
                            abilityShop.phase = 'fadein';
                            abilityShop.alpha = 1;
                            return;
                        }
                        return;
                    }
                    if (abilityShop && abilityShop.active && abilityShop.showAssignment) {
                        const boxW = 400, boxH = 300;
                        const boxX = VIEW_W/2 - boxW/2;
                        const boxY = VIEW_H/2 - boxH/2;
                        const slotX = [VIEW_W/2 - 100, VIEW_W/2 - 25, VIEW_W/2 + 50];
                        const slotKeys = ['q','e','r'];
                        for (let i = 0; i < 3; i++) {
                            if (mx >= slotX[i] && mx <= slotX[i] + 60 && my >= boxY + 80 && my <= boxY + 120) {
                                abilities[slotKeys[i]].name = abilityShop.selectedAbility;
                                abilities[slotKeys[i]].cooldown = 0;
                                abilities[slotKeys[i]].maxCooldown = 0;
                                abilityShop.phase = 'fadein';
                                abilityShop.alpha = 1;
                                abilityShop.showAssignment = false;
                                abilityShop.selectedAbility = null;
                                return;
                            }
                        }
                        return;
                    }

                    if (debugMode && abilitiesUIOpen) {
                        const ablPanel = { x: VIEW_W - 520, y: 10, w: 260, h: 190 };
                        if (mx >= ablPanel.x && mx <= ablPanel.x + ablPanel.w && my >= ablPanel.y && my <= ablPanel.y + ablPanel.h) {
                            const closeX = ablPanel.x + ablPanel.w - 20;
                            const closeY = ablPanel.y + 8;
                            if (Math.abs(mx - closeX) < 10 && Math.abs(my - closeY - 4) < 10) {
                                abilitiesUIOpen = false;
                                return;
                            }
                            const slotKeys = ['q','e','r'];
                            for (let i = 0; i < 3; i++) {
                                const y = ablPanel.y + 45 + i * 40;
                                const cycleX = ablPanel.x + 180;
                                const cycleY = y - 5;
                                if (mx >= cycleX && mx <= cycleX + 20 && my >= cycleY && my <= cycleY + 20) {
                                    const currentName = abilities[slotKeys[i]].name;
                                    const currentIndex = AVAILABLE_ABILITIES.indexOf(currentName);
                                    const nextIndex = (currentIndex + 1) % AVAILABLE_ABILITIES.length;
                                    abilities[slotKeys[i]].name = AVAILABLE_ABILITIES[nextIndex];
                                    abilities[slotKeys[i]].cooldown = 0;
                                    abilities[slotKeys[i]].maxCooldown = 0;
                                    return;
                                }
                            }
                            return;
                        }
                        abilitiesUIOpen = false;
                        return;
                    }

                    if (debugMode) {
                        const panelH = 245;
                        const panelX = VIEW_W - 250, panelY = 10;
                        if (mx >= panelX && mx <= panelX + 240 && my >= panelY && my <= panelY + panelH) {
                            if (mx >= panelX + 30 && mx <= panelX + 115 && my >= panelY + 178 && my <= panelY + 203) {
                                noCooldown = !noCooldown;
                                return;
                            }
                            if (mx >= panelX + 125 && mx <= panelX + 210 && my >= panelY + 178 && my <= panelY + 203) {
                                abilitiesUIOpen = !abilitiesUIOpen;
                                return;
                            }
                            const fieldH = 20;
                            const keys = ['kills', 'cash', 'score'];
                            let field = null;
                            for (let i = 0; i < 3; i++) {
                                const y = panelY + 40 + i * 30;
                                const inputX = panelX + 70;
                                if (mx >= inputX && mx <= inputX + 150 && my >= y && my <= y + fieldH) {
                                    field = keys[i];
                                    break;
                                }
                            }
                            if (field) {
                                debugFocus = field;
                                if (debugInputs[field] === '') {
                                    if (field === 'kills') debugInputs.kills = killCount.toString();
                                    else if (field === 'cash') debugInputs.cash = cash.toString();
                                    else if (field === 'score') debugInputs.score = score.toString();
                                }
                                return;
                            }
                            if (mx >= panelX + 60 && mx <= panelX + 180 && my >= panelY + 115 && my <= panelY + 140) {
                                applyDebugValues();
                                return;
                            }
                            if (mx >= panelX + 30 && mx <= panelX + 210 && my >= panelY + 148 && my <= panelY + 173) {
                                killAllEnemies();
                                return;
                            }
                            return;
                        }
                    }

                    debugFocus = null;
                    if (!controlsFrozen && debugFocus === null && !abilitiesUIOpen && !abilityShop) mouseDown = true;
                    if (gameState === 'menu') {
                        const btnW = 200, btnH = 44, startY = 240, gap = 16;

                        // Update Log overlay interactions
                        if (showUpdateLog) {
                            const logW = 620, logH = 560, logX = VIEW_W/2-logW/2, logY = VIEW_H/2-logH/2;
                            const cbW = 100, cbH = 32, cbX = VIEW_W/2-cbW/2, cbY = logY+logH-48;
                            if (mx >= cbX && mx <= cbX+cbW && my >= cbY && my <= cbY+cbH) {
                                showUpdateLog = false;
                            }
                            return;
                        }

                        // Update Log button
                        const ulBtnW = 160, ulBtnH = 36, ulBtnX = VIEW_W/2-ulBtnW/2, ulBtnY = startY+(btnH+gap)*3+40;
                        if (mx >= ulBtnX && mx <= ulBtnX+ulBtnW && my >= ulBtnY && my <= ulBtnY+ulBtnH) {
                            showUpdateLog = true;
                            return;
                        }

                        const buttons = [{y:startY,diff:'easy'},{y:startY+btnH+gap,diff:'medium'},{y:startY+(btnH+gap)*2,diff:'hard'}];
                        for (const btn of buttons) {
                            if (mx > VIEW_W/2-btnW/2 && mx < VIEW_W/2+btnW/2 && my > btn.y && my < btn.y+btnH) {
                                difficulty = btn.diff; restartGame(); gameState = 'playing'; break;
                            }
                        }
                    }
                }
                initAudio();
            });
            window.addEventListener('mouseup', (e) => { if (e.button === 0) mouseDown = false; });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('keydown', (e) => { if (e.key === 'Shift') e.preventDefault(); }, {passive: false});

            applyDifficulty();
            lastRealTime = performance.now();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
