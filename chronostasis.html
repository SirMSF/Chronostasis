                            ctx.restore();
                            ctx.strokeStyle='#cccccc'; ctx.lineWidth=3; ctx.stroke();
                            ctx.font='bold 12px "Courier New"'; ctx.fillStyle='#000'; ctx.textAlign='center';
                            ctx.fillText('WHITE BOSS', sx, sy-14);
                        } else {
                            ctx.fillStyle = '#0a0a0a';
                            ctx.beginPath(); ctx.arc(sx, sy, boss.radius, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.strokeStyle = '#333333'; ctx.lineWidth = 4; ctx.stroke();
                            ctx.fillStyle = '#ffaaaa'; ctx.font = 'bold 14px "Courier New"'; ctx.textAlign = 'center';
                            ctx.fillText('BLACK BOSS', sx, sy - boss.radius - 10);
                        }
                    }
                    for (const p of particles) {
                        const sx = p.x - cameraX, sy = p.y - cameraY;
                        const alpha = p.life / p.maxLife;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(sx, sy, p.radius, 0, Math.PI*2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;

                    const pScreenX = player.x - cameraX, pScreenY = player.y - cameraY;
                    ctx.save(); ctx.translate(pScreenX, pScreenY);
                    const aimAngle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
                    ctx.rotate(aimAngle);
                    ctx.beginPath(); ctx.moveTo(player.radius,0); ctx.lineTo(-player.radius*0.7,-player.radius*0.6);
                    ctx.lineTo(-player.radius*0.4,0); ctx.lineTo(-player.radius*0.7,player.radius*0.6);
                    ctx.closePath(); ctx.fillStyle='#ffffff'; ctx.fill(); ctx.strokeStyle='#aaaacc'; ctx.lineWidth=2; ctx.stroke();
                    ctx.restore();

                    if (timeScale < 1.0) {
                        const alpha = (1 - (timeScale - 0.1) / 0.9) * 0.25;
                        ctx.fillStyle = `rgba(20, 40, 100, ${alpha})`;
                        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    }

                    // Intel message box (now lower at Y=130)
                    if (intelMessage) {
                        const msg = intelMessage;
                        ctx.globalAlpha = msg.alpha;
                        ctx.fillStyle = 'rgba(10, 20, 30, 0.9)';
                        ctx.fillRect(msg.boxX, msg.boxY, msg.boxWidth, msg.boxHeight);
                        ctx.strokeStyle = '#33ffcc';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(msg.boxX, msg.boxY, msg.boxWidth, msg.boxHeight);
                        ctx.fillStyle = '#e0ffe0';
                        ctx.font = msg.font;
                        ctx.textAlign = 'left';
                        let drawnChars = 0;
                        for (let i = 0; i < msg.lines.length; i++) {
                            const line = msg.lines[i];
                            const charsInThisLine = Math.min(line.length, msg.currentLength - drawnChars);
                            if (charsInThisLine <= 0) break;
                            const substr = line.substring(0, charsInThisLine);
                            const y = msg.boxY + msg.boxPadding + (i * msg.lineHeight) + msg.fontSize * 0.8;
                            ctx.fillText(substr, msg.boxX + msg.boxPadding, y);
                            drawnChars += charsInThisLine;
                        }
                        ctx.globalAlpha = 1;
                    }

                    // Energy ring
                    const ringCenterX = VIEW_W / 2;
                    const ringCenterY = VIEW_H - 35;
                    const ringRadius = 22;
                    const energyPercent = slowEnergy / SLOW_MAX_ENERGY;
                    let ringOpacity = 0.4;
                    if (!slowMode && slowEnergy >= SLOW_MAX_ENERGY - 0.01) {
                        ringOpacity = 0.08;
                    } else {
                        ringOpacity = 0.4;
                    }
                    ctx.beginPath();
                    ctx.arc(ringCenterX, ringCenterY, ringRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(128, 128, 128, ${ringOpacity * 0.6})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    if (energyPercent > 0) {
                        ctx.beginPath();
                        const endAngle = -Math.PI/2 + (Math.PI * 2 * energyPercent);
                        ctx.arc(ringCenterX, ringCenterY, ringRadius, -Math.PI/2, endAngle);
                        ctx.strokeStyle = slowMode ? `rgba(255, 170, 0, ${ringOpacity})` : `rgba(0, 221, 255, ${ringOpacity})`;
                        ctx.lineWidth = 4;
                        ctx.stroke();
                    }

                    // Shot cooldown indicator (RPM) with rounded edges
                    if (gameState === 'playing') {
                        const shotBarWidth = 50, shotBarHeight = 6;
                        const shotBarX = ringCenterX - shotBarWidth/2;
                        const shotBarY = ringCenterY - 32;
                        const shootPercent = Math.max(0, 1 - (player.shootTimer / PLAYER_SHOOT_COOLDOWN));
                        ctx.fillStyle = '#333';
                        fillRoundedRect(shotBarX, shotBarY, shotBarWidth, shotBarHeight, 3);
                        if (shootPercent > 0) {
                            ctx.fillStyle = '#ffdd44';
                            fillRoundedRect(shotBarX, shotBarY, shotBarWidth * shootPercent, shotBarHeight, 3);
                        }
                    }

                    if (bossActive && boss && !deathAnimation) {
                        const bx = boss.x - cameraX, by = boss.y - cameraY;
                        const margin = 50;
                        const isOffLeft = bx < margin, isOffRight = bx > VIEW_W - margin;
                        const isOffTop = by < margin, isOffBottom = by > VIEW_H - margin;
                        if (isOffLeft || isOffRight || isOffTop || isOffBottom) {
                            const arrowColor = 'rgba(255, 100, 100, 0.9)';
                            function drawArrow(x, y, angle) {
                                ctx.save();
                                ctx.translate(x, y);
                                ctx.rotate(angle);
                                ctx.beginPath();
                                ctx.moveTo(0, -10);
                                ctx.lineTo(15, 0);
                                ctx.lineTo(0, 10);
                                ctx.closePath();
                                ctx.fillStyle = arrowColor;
                                ctx.fill();
                                ctx.strokeStyle = '#fff';
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                ctx.restore();
                            }
                            if (isOffLeft) drawArrow(20, clamp(by, 50, VIEW_H-50), Math.PI*0.0);
                            if (isOffRight) drawArrow(VIEW_W-20, clamp(by, 50, VIEW_H-50), Math.PI);
                            if (isOffTop) drawArrow(clamp(bx, 50, VIEW_W-50), 20, Math.PI*1.5);
                            if (isOffBottom) drawArrow(clamp(bx, 50, VIEW_W-50), VIEW_H-20, Math.PI*0.5);
                        }
                    }
                    if (bossActive && boss && boss.type === 'black' && !deathAnimation) {
                        const barWidth = 300, barHeight = 20;
                        const barX = VIEW_W/2 - barWidth/2, barY = 20;
                        const fillPercent = boss.hp / boss.maxHp;
                        ctx.fillStyle = '#222';
                        ctx.fillRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = '#cc2222';
                        ctx.fillRect(barX, barY, barWidth * fillPercent, barHeight);
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                        ctx.strokeRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = '#fff'; ctx.font = '14px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('BLACK BOSS', VIEW_W/2, barY - 6);
                    }
                    ctx.font = '18px "Courier New"'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
                    ctx.fillText('SCORE: ' + score, 20, 60);
                    ctx.fillText('KILLS: ' + killCount + ' / 20', 20, 85);
                    ctx.fillText('TIME FLOW: ' + (timeScale*100).toFixed(0) + '%', 20, 110);
                    ctx.fillStyle = '#90EE90';
                    ctx.fillText('$ ' + cash, 20, 135);

                    if (bossActive && !deathAnimation) {
                        ctx.fillStyle = '#ffaaaa'; ctx.font = 'bold 22px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('⚠ BOSS ⚠', VIEW_W/2, 60);
                    }
                    ctx.beginPath();
                    ctx.moveTo(mouseCanvasX-12, mouseCanvasY); ctx.lineTo(mouseCanvasX+12, mouseCanvasY);
                    ctx.moveTo(mouseCanvasX, mouseCanvasY-12); ctx.lineTo(mouseCanvasX, mouseCanvasY+12);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    if (gameState === 'gameover') {
                        ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,VIEW_W,VIEW_H);
                        ctx.fillStyle = '#ff4455'; ctx.font = 'bold 48px "Courier New"'; ctx.textAlign = 'center';
                        ctx.fillText('TIME\'S UP', VIEW_W/2, VIEW_H/2-30);
                        ctx.fillStyle = '#fff'; ctx.font = '22px "Courier New"';
                        ctx.fillText('SCORE: ' + score, VIEW_W/2, VIEW_H/2+20);
                        ctx.fillText('PRESS [R] TO RESTART', VIEW_W/2, VIEW_H/2+60);
                    }
                }

                // debug panel on top
                if (debugMode) {
                    const panel = { x: VIEW_W - 250, y: 10, w: 240, h: 180 };
                    ctx.fillStyle = 'rgba(20, 20, 40, 0.85)';
                    ctx.fillRect(panel.x, panel.y, panel.w, panel.h);
                    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
                    ctx.strokeRect(panel.x, panel.y, panel.w, panel.h);

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'left';
                    ctx.fillText('DEBUG MODE', panel.x + 10, panel.y + 20);

                    ctx.font = '13px "Courier New"';
                    const labels = ['Kills:', 'Cash:', 'Score:'];
                    const keys = ['kills', 'cash', 'score'];
                    for (let i = 0; i < 3; i++) {
                        const y = panel.y + 40 + i * 30;
                        ctx.fillStyle = '#ccc';
                        ctx.fillText(labels[i], panel.x + 10, y + 15);
                        const inputX = panel.x + 70;
                        const inputY = y;
                        const inputW = 150;
                        const inputH = 20;

                        ctx.fillStyle = '#111';
                        ctx.fillRect(inputX, inputY, inputW, inputH);
                        ctx.strokeStyle = debugFocus === keys[i] ? '#90EE90' : '#444';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(inputX, inputY, inputW, inputH);

                        ctx.fillStyle = '#90EE90';
                        ctx.textAlign = 'left';
                        let displayVal = debugInputs[keys[i]];
                        if (debugFocus === keys[i]) displayVal += '_';
                        ctx.fillText(displayVal, inputX + 5, inputY + 15);
                    }

                    const btnSetX = panel.x + 60;
                    const btnSetY = panel.y + 115;
                    const btnSetW = 120, btnSetH = 25;
                    ctx.fillStyle = '#2a4a2a';
                    ctx.fillRect(btnSetX, btnSetY, btnSetW, btnSetH);
                    ctx.strokeStyle = '#90EE90';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnSetX, btnSetY, btnSetW, btnSetH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('SET', btnSetX + btnSetW/2, btnSetY + 18);

                    const btnKillX = panel.x + 30;
                    const btnKillY = panel.y + 148;
                    const btnKillW = 180, btnKillH = 25;
                    ctx.fillStyle = '#4a1a1a';
                    ctx.fillRect(btnKillX, btnKillY, btnKillW, btnKillH);
                    ctx.strokeStyle = '#ff6666';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnKillX, btnKillY, btnKillW, btnKillH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('KILL ALL', btnKillX + btnKillW/2, btnKillY + 18);
                }
            }

            function gameLoop(now) {
                const realDeltaMs = Math.min(now - lastRealTime, 50);
                lastRealTime = now;
                const realDeltaSec = realDeltaMs / 1000;
                if (gameState === 'playing') update(realDeltaSec);
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('keydown', (e) => {
                if (debugMode && debugFocus !== null) {
                    if (e.key === 'Backspace') { debugInputs[debugFocus] = debugInputs[debugFocus].slice(0, -1); e.preventDefault(); return; }
                    if (e.key === 'Enter') { applyDebugValues(); e.preventDefault(); return; }
                    if (e.key === 'Escape') { debugFocus = null; e.preventDefault(); return; }
                    if (/^[0-9]$/.test(e.key)) { debugInputs[debugFocus] += e.key; e.preventDefault(); return; }
                    e.preventDefault(); return;
                }

                if (gameState === 'menu' && !debugMode) {
                    if (e.key === 'Backspace') { debugCodeString = debugCodeString.slice(0, -1); e.preventDefault(); return; }
                    if (e.key === 'Enter') {
                        if (debugCodeString === '676767') {
                            debugMode = true;
                            debugInputs.kills = killCount.toString();
                            debugInputs.cash = cash.toString();
                            debugInputs.score = score.toString();
                            debugCodeString = '';
                        } else { debugCodeString = ''; }
                        e.preventDefault(); return;
                    }
                    if (/^[0-9]$/.test(e.key)) { debugCodeString += e.key; e.preventDefault(); return; }
                }

                const rawKey = e.key;
                const k = rawKey.toLowerCase();
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') { keys[k] = true; e.preventDefault(); }
                else if (rawKey === 'ArrowUp' || rawKey === 'ArrowLeft' || rawKey === 'ArrowDown' || rawKey === 'ArrowRight') { keys[rawKey] = true; e.preventDefault(); }
                if (rawKey === 'Shift' && slowEnergy > 0 && !controlsFrozen && debugFocus === null) {
                    const wasSlow = slowMode;
                    slowMode = !slowMode;
                    if (!wasSlow && slowMode) {}
                    else if (wasSlow && !slowMode) { rechargeDelay = SLOW_RECHARGE_DELAY; }
                    e.preventDefault();
                }
                if (k === 'r' && gameState === 'gameover') { restartGame(); e.preventDefault(); }
                initAudio();
            });
            window.addEventListener('keyup', (e) => {
                const rawKey = e.key;
                const k = rawKey.toLowerCase();
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') { keys[k] = false; e.preventDefault(); }
                else if (rawKey === 'ArrowUp' || rawKey === 'ArrowLeft' || rawKey === 'ArrowDown' || rawKey === 'ArrowRight') { keys[rawKey] = false; e.preventDefault(); }
            });
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseCanvasX = e.clientX - rect.left;
                mouseCanvasY = e.clientY - rect.top;
            });
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    const mx = mouseCanvasX, my = mouseCanvasY;
                    if (debugMode && mx >= VIEW_W - 250 && mx <= VIEW_W - 10 && my >= 10 && my <= 190) {
                        const field = (mx >= VIEW_W - 190 && mx <= VIEW_W - 40 && my >= 50 && my <= 70) ? 'kills' :
                                     (mx >= VIEW_W - 190 && mx <= VIEW_W - 40 && my >= 80 && my <= 100) ? 'cash' :
                                     (mx >= VIEW_W - 190 && mx <= VIEW_W - 40 && my >= 110 && my <= 130) ? 'score' : null;
                        if (field) {
                            debugFocus = field;
                            if (debugInputs[field] === '') {
                                if (field === 'kills') debugInputs.kills = killCount.toString();
                                else if (field === 'cash') debugInputs.cash = cash.toString();
                                else if (field === 'score') debugInputs.score = score.toString();
                            }
                        } else if (mx >= VIEW_W - 190 && mx <= VIEW_W - 70 && my >= 125 && my <= 150) {
                            applyDebugValues();
                        } else if (mx >= VIEW_W - 220 && mx <= VIEW_W - 40 && my >= 158 && my <= 183) {
                            killAllEnemies();
                            debugFocus = null;
                        }
                        return;
                    }
                    debugFocus = null;
                    if (!controlsFrozen && debugFocus === null) mouseDown = true;
                    if (gameState === 'menu') {
                        const btnW = 200, btnH = 50, startY = 300, gap = 30;
                        const buttons = [{y:startY,diff:'easy'},{y:startY+btnH+gap,diff:'medium'},{y:startY+(btnH+gap)*2,diff:'hard'}];
                        for (const btn of buttons) {
                            if (mx > VIEW_W/2-btnW/2 && mx < VIEW_W/2+btnW/2 && my > btn.y && my < btn.y+btnH) {
                                difficulty = btn.diff; restartGame(); gameState = 'playing'; break;
                            }
                        }
                    }
                }
                initAudio();
            });
            window.addEventListener('mouseup', (e) => { if (e.button === 0) mouseDown = false; });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('keydown', (e) => { if (e.key === 'Shift') e.preventDefault(); }, {passive: false});

            applyDifficulty();
            lastRealTime = performance.now();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
